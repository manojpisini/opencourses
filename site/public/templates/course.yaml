            # sample_solution: see solutions.yaml → ctest-ch-03-s-02-q-01

  # Add more chapter tests by duplicating a chapter test block above.


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 11 — CHAPTER ASSIGNMENTS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Practical work attached to specific chapters.
# More open-ended than tests — reviewed manually by maintainers.

chapter_assignments:

  # ── CHAPTER ASSIGNMENT TEMPLATE ───────────────────────────────────────────

  - id: cassign-ch-01                       # [REQUIRED] matches chapter.chapter_assignment_id
    title: "<Chapter N — Assignment Title>" # [REQUIRED]
    attached_to: ch-01                      # [REQUIRED] chapter id
    required_for_progress: <true | false>   # [REQUIRED] block next chapter until submitted?
    submission_type: <github_url | file_upload | text | gist_url>  # [REQUIRED]
    due_after_enrollment_days: <N>          # [OPTIONAL] soft deadline in days from enrollment
    max_resubmissions: <N>                  # [REQUIRED]

    content:
      text:                                 # [REQUIRED] full assignment brief
        format: markdown
        body: |
          ## <Assignment Title>

          <Assignment description. What must the student build or produce?>

          ### Requirements

          | Requirement | Detail |
          |---|---|
          | <Requirement 1> | <Detail> |
          | <Requirement 2> | <Detail> |

          ### Getting Started

          ```bash
          <Setup commands>
          ```

          ### <Additional Section — e.g. Rules, Constraints, Checklist>

          - [ ] <Checklist item 1>
          - [ ] <Checklist item 2>

          ### Submission

          <How and where to submit. Be specific about format.>

      links:                               # [OPTIONAL]
        - label: "<Link label>"
          url: "<https://...>"
          type: <documentation | repo | article>

      files:                               # [OPTIONAL] downloadable files
        - label: "<File label>"
          file: <assets/docs/filename.pdf>
          type: pdf

    rubric:                                # [REQUIRED]
      - criterion: "<Criterion 1>"
        points: <N>
      - criterion: "<Criterion 2>"
        points: <N>
      - criterion: "<Criterion 3>"
        points: <N>
      - criterion: "<Criterion 4>"
        points: <N>
    total_points: <N>                      # [REQUIRED] must equal sum of criterion points
    passing_score: <N>                     # [REQUIRED] minimum points to pass

    review:
      type: <maintainer | peer | auto>    # [REQUIRED]
      sla_days: <N>                        # [OPTIONAL] expected review turnaround in days
      feedback_required: <true | false>   # [REQUIRED]

  - id: cassign-ch-02
    title: "<Chapter N — Assignment Title>"
    attached_to: ch-02
    required_for_progress: <true | false>
    submission_type: <github_url | file_upload | text | gist_url>
    due_after_enrollment_days: <N>
    max_resubmissions: <N>

    content:
      text:
        format: markdown
        body: |
          ## <Assignment Title>

          <Assignment description.>

          ### Requirements
          - <Requirement 1>
          - <Requirement 2>

    rubric:
      - criterion: "<Criterion 1>"
        points: <N>
      - criterion: "<Criterion 2>"
        points: <N>
    total_points: <N>
    passing_score: <N>

    review:
      type: maintainer
      sla_days: <N>
      feedback_required: true

  - id: cassign-ch-03
    title: "<Chapter N — Assignment Title>"
    attached_to: ch-03
    required_for_progress: <true | false>
    submission_type: <github_url | file_upload | text | gist_url>
    due_after_enrollment_days: <N>
    max_resubmissions: <N>

    content:
      text:
        format: markdown
        body: |
          ## <Assignment Title>

          <Assignment description.>

          ### Requirements
          - <Requirement 1>
          - <Requirement 2>

    rubric:
      - criterion: "<Criterion 1>"
        points: <N>
      - criterion: "<Criterion 2>"
        points: <N>
    total_points: <N>
    passing_score: <N>

    review:
      type: maintainer
      sla_days: <N>
      feedback_required: true

  # Add more chapter assignments by duplicating a block above.


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 12 — FINAL TEST
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Comprehensive test covering all chapters.
# Required for certificate eligibility.
# Answers are in solutions.yaml.
#
# QUESTION ID CONVENTION
# ──────────────────────
# ft-<section-id>-q-<NN>
# e.g. ft-s-01-q-01

final_test:
  id: final-test                            # [REQUIRED]
  title: "<Final Test — Full Course Assessment>"  # [REQUIRED]
  attached_to: final                        # [REQUIRED] always "final"
  unlocks: final-assignment                 # [REQUIRED] what passing this unlocks
  passing_score: <0-100>                    # [REQUIRED]
  max_attempts: <N>                         # [REQUIRED]
  time_limit_minutes: <N>                   # [OPTIONAL] null = unlimited
  randomize_questions: <true | false>       # [REQUIRED]
  randomize_options: <true | false>         # [REQUIRED]
  show_answers_after: never                 # [REQUIRED] final tests: always never
  required_for_certificate: true            # [REQUIRED]
  coverage:                                 # [REQUIRED] list of chapter ids covered
    - ch-01
    - ch-02
    - ch-03

  sections:

    - id: ft-s-01
      title: "<Section Title, e.g. Core Theory>"
      weight: <N>                           # percentage of final test score

      questions:

        - id: ft-s-01-q-01
          type: mcq
          points: <N>
          difficulty: <easy | medium | hard>
          chapter: <ch-id>
          topic: <topic-slug>
          question: "<Question text?>"
          options:
            - "<Option A>"
            - "<Option B>"
            - "<Option C>"
            - "<Option D>"
          # answer: see solutions.yaml → ft-s-01-q-01

        - id: ft-s-01-q-02
          type: multi
          points: <N>
          difficulty: <easy | medium | hard>
          chapter: <ch-id>
          topic: <topic-slug>
          question: "<Question text? (Select all that apply)>"
          options:
            - "<Option A>"
            - "<Option B>"
            - "<Option C>"
            - "<Option D>"
            - "<Option E>"
          # answers: see solutions.yaml → ft-s-01-q-02

        - id: ft-s-01-q-03
          type: truefalse
          points: <N>
          difficulty: <easy | medium | hard>
          chapter: <ch-id>
          topic: <topic-slug>
          question: "<Statement.>"
          # answer: see solutions.yaml → ft-s-01-q-03

    - id: ft-s-02
      title: "<Section Title, e.g. Code Reading & Debugging>"
      weight: <N>

      questions:

        - id: ft-s-02-q-01
          type: code_output
          points: <N>
          difficulty: <easy | medium | hard>
          chapter: <ch-id>
          topic: <topic-slug>
          question: "<What does this code log?>"
          code:
            language: <language>
            snippet: |
              <code>
          options:
            - "<Option A>"
            - "<Option B>"
            - "<Option C>"
            - "<Option D>"
          # answer: see solutions.yaml → ft-s-02-q-01

        - id: ft-s-02-q-02
          type: code_fix
          points: <N>
          difficulty: <easy | medium | hard>
          chapter: <ch-id>
          topic: <topic-slug>
          question: "<Fix the bug(s) in this code.>"
          code:
            language: <language>
            snippet: |
              <buggy code>
          grading: <diff | manual>
          # answer: see solutions.yaml → ft-s-02-q-02

        - id: ft-s-02-q-03
          type: code_reading
          points: <N>
          difficulty: <easy | medium | hard>
          chapter: <ch-id>
          topic: <topic-slug>
          question: "<Conceptual question about the code.>"
          code:
            language: <language>
            snippet: |
              <code>
          options:
            - "<Option A>"
            - "<Option B>"
            - "<Option C>"
            - "<Option D>"
          # answer: see solutions.yaml → ft-s-02-q-03

    - id: ft-s-03
      title: "<Section Title, e.g. Open Ended>"
      weight: <N>

      questions:

        - id: ft-s-03-q-01
          type: short
          points: <N>
          difficulty: <easy | medium | hard>
          chapter: <ch-id>
          topic: <topic-slug>
          question: |
            <Open-ended question requiring a written explanation.
            Be specific about what you want the student to address.>
          grading: manual
          keywords:
            - <keyword-1>
            - <keyword-2>
            - <keyword-3>
          # sample_answer: see solutions.yaml → ft-s-03-q-01

        - id: ft-s-03-q-02
          type: code_write
          points: <N>
          difficulty: <easy | medium | hard>
          chapter: <ch-id>
          topic: <topic-slug>
          question: |
            <Describe exactly what function or program the student must write.
            Specify inputs, outputs, and edge cases clearly.>
          language: <language>
          starter: |
            <// Starter code / function signature>
          grading: manual
          # sample_solution: see solutions.yaml → ft-s-03-q-02

  # Add more final test sections as needed.


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 13 — FINAL ASSIGNMENT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Capstone-level project. Unlocked only after passing final_test.
# Required for certificate alongside final_test.

final_assignment:
  id: final-assignment                      # [REQUIRED]
  title: "<Final Assignment — Capstone Project Title>"  # [REQUIRED]
  attached_to: final                        # [REQUIRED] always "final"
  unlocked_by: final-test                   # [REQUIRED] must pass final_test first
  required_for_certificate: true            # [REQUIRED]
  submission_type: <github_url | file_upload | text>  # [REQUIRED]
  due_after_unlock_days: <N>               # [OPTIONAL] soft deadline after final test pass
  max_resubmissions: <N>                   # [REQUIRED]

  content:
    text:                                   # [REQUIRED] full project brief
      format: markdown
      body: |
        ## <Capstone Project Title>

        <Overview paragraph. What must students build? Why does it matter?>

        ---

        ## Requirements

        ### Must Have
        - [ ] <Requirement 1>
        - [ ] <Requirement 2>
        - [ ] <Requirement 3>
        - [ ] <Requirement 4>
        - [ ] <Requirement 5>

        ### Nice to Have
        - [ ] <Optional enhancement 1>
        - [ ] <Optional enhancement 2>

        ---

        ## <Optional Section — e.g. Project Ideas, Constraints, Scope Guide>

        | <Column 1> | <Column 2> |
        |---|---|
        | <Row 1 A> | <Row 1 B> |
        | <Row 2 A> | <Row 2 B> |

        ---

        ## Milestone Schedule

        | Day | Deliverable |
        |---|---|
        | <N> | <Milestone 1> |
        | <N> | <Milestone 2> |
        | <N> | <Milestone 3 — Final Submission> |

        ---

        ## Submission

        <Where and how to submit. Be specific.>

    files:                                  # [OPTIONAL]
      - label: "<File label>"
        file: <assets/docs/filename.pdf>
        type: pdf

    links:                                  # [OPTIONAL]
      - label: "<Link label>"
        url: "<https://...>"
        type: documentation

  milestones:                               # [OPTIONAL] structured progress checkpoints
    - id: ms-01
      title: "<Milestone Title>"
      due_day: <N>
    - id: ms-02
      title: "<Milestone Title>"
      due_day: <N>
    - id: ms-03
      title: "<Final Submission>"
      due_day: <N>

  rubric:                                   # [REQUIRED]
    - criterion: "<Criterion 1>"
      points: <N>
    - criterion: "<Criterion 2>"
      points: <N>
    - criterion: "<Criterion 3>"
      points: <N>
    - criterion: "<Criterion 4>"
      points: <N>
    - criterion: "<Criterion 5>"
      points: <N>
  total_points: <N>                         # [REQUIRED] must equal sum of criterion points
  passing_score: <N>                        # [REQUIRED]

  review:
    type: maintainer                        # [REQUIRED]
    sla_days: <N>                           # [OPTIONAL]
    feedback_required: true                 # [REQUIRED]


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 14 — CERTIFICATE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

certificate:
  enabled: <true | false>                   # [REQUIRED]
  title: "Certificate of Completion"        # [REQUIRED]
  subtitle: "OpenCourses — <Course Title>"  # [REQUIRED]
  requirements:                             # [REQUIRED] all must be met to unlock certificate
    - type: final_test
      id: final-test
      min_score: <N>
    - type: final_assignment
      id: final-assignment
      min_score: <N>
  template: default                         # [REQUIRED] default | minimal | custom
  custom_template: null                     # [OPTIONAL] assets/cert-template.svg if template: custom


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 15 — ASSETS MANIFEST
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# All paths relative to the course root (the directory containing course.yaml).
# Add every file referenced anywhere in this course.yaml.

assets:
  images:
    - assets/images/<lesson-diagram>.png    # [OPTIONAL] lesson/resource images only
  code:                                     # [OPTIONAL] list all code snippet files
    - <assets/code/chXX/filename.ext>
  docs:                                     # [OPTIONAL] list all document files
    - <assets/docs/filename.pdf>
  data:                                     # [OPTIONAL] list all dataset files
    - <assets/data/filename.csv>
  slides:                                   # [OPTIONAL] list all slide files
    - <assets/slides/filename.pdf>


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 16 — AUTOMATION TRIGGERS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Controls which GitHub Actions workflows this course activates.
# Workflow names must match actual workflow files in .github/workflows/.

triggers:
  on_publish:
    - build-course-page
    - update-sitemap
    - notify-enrolled-students
  on_enrollment:
    - create-student-issue
    - assign-enrolled-label
    - send-welcome-comment
  on_chapter_complete:
    - unlock-chapter-test
  on_test_submit:
    - grade-test
    - update-progress
    - check-gate
  on_assignment_submit:
    - flag-for-review
    - notify-maintainer
  on_final_test_pass:
    - unlock-final-assignment
  on_certificate_earn:
    - generate-certificate
    - assign-certified-label
    - post-congratulations-comment
  on_update:
    - rebuild-course-page
    - bump-version
    - notify-enrolled-students


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 17 — DISCUSSION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

discussion:
  enabled: <true | false>                   # [REQUIRED]
  category: Courses                         # [REQUIRED] GitHub Discussions category name
  per_chapter: <true | false>               # [OPTIONAL] create a thread per chapter?
  pinned_resources:                         # [OPTIONAL] pinned to the course discussion
    - title: "<Resource title>"
      file: <assets/docs/faq.md>            # use file OR url, not both
    - title: "<Community link>"
      url: "<https://...>"


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 18 — CHANGELOG
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Add an entry every time metadata.version is bumped.

changelog:
  - version: "1.0.0"
    date: "<YYYY-MM-DD>"
    author: <github-username>
    changes:
      - Initial release
