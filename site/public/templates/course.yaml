# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 10 — CHAPTER TESTS
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Triggered after a student marks a chapter complete.
# Answers and solutions are in solutions.yaml — referenced by question id.
# This file contains ONLY questions, never answers.
#
# QUESTION ID CONVENTION
# ──────────────────────
# ctest-<chapter-id>-<section-id>-q-<NN>
# e.g. ctest-ch-01-s-01-q-01
# Must be globally unique across course.yaml and solutions.yaml.

chapter_tests:

  # ── CHAPTER TEST TEMPLATE ─────────────────────────────────────────────────

  - id: ctest-ch-01                          # [REQUIRED] matches chapter.chapter_test_id
    title: "<Chapter N — Knowledge Check>"   # [REQUIRED]
    attached_to: ch-01                       # [REQUIRED] chapter id this test belongs to
    gates_next_chapter: <true | false>       # [REQUIRED] block next chapter until passed?
    passing_score: <0-100>                   # [REQUIRED] percentage required to pass
    max_attempts: <N>                        # [REQUIRED]
    time_limit_minutes: <N>                  # [OPTIONAL] null = unlimited
    randomize_questions: <true | false>      # [REQUIRED]
    randomize_options: <true | false>        # [REQUIRED]
    show_answers_after: <passed | attempted | never>  # [REQUIRED]

    sections:

      # ── TEST SECTION TEMPLATE ──────────────────────────────────────────

      - id: ctest-ch-01-s-01                # [REQUIRED] unique
        title: "<Section Title, e.g. Conceptual Understanding>"
        weight: <N>                         # [REQUIRED] percentage of test score (all sections must sum to 100)

        questions:

          # ── QUESTION: mcq ───────────────────────────────────────────────

          - id: ctest-ch-01-s-01-q-01       # [REQUIRED] globally unique
            type: mcq
            points: <N>
            difficulty: <easy | medium | hard>
            topic: <topic-slug>             # [OPTIONAL] for analytics
            question: "<Question text?>"
            options:
              - "<Option A>"
              - "<Option B>"
              - "<Option C>"
              - "<Option D>"
            hint: "<Optional hint shown after a failed attempt.>"  # [OPTIONAL]
            # answer: see solutions.yaml → ctest-ch-01-s-01-q-01

          # ── QUESTION: multi ─────────────────────────────────────────────

          - id: ctest-ch-01-s-01-q-02
            type: multi
            points: <N>
            difficulty: <easy | medium | hard>
            topic: <topic-slug>
            question: "<Question text? (Select all that apply)>"
            options:
              - "<Option A>"
              - "<Option B>"
              - "<Option C>"
              - "<Option D>"
              - "<Option E>"
            hint: "<Optional hint.>"
            # answers: see solutions.yaml → ctest-ch-01-s-01-q-02

          # ── QUESTION: truefalse ─────────────────────────────────────────

          - id: ctest-ch-01-s-01-q-03
            type: truefalse
            points: <N>
            difficulty: <easy | medium | hard>
            topic: <topic-slug>
            question: "<Statement — is it true or false?>"
            # answer: see solutions.yaml → ctest-ch-01-s-01-q-03

      - id: ctest-ch-01-s-02
        title: "<Section Title, e.g. Code Reading>"
        weight: <N>

        questions:

          # ── QUESTION: code_output ───────────────────────────────────────

          - id: ctest-ch-01-s-02-q-01
            type: code_output
            points: <N>
            difficulty: <easy | medium | hard>
            topic: <topic-slug>
            question: "<What does this code log to the console?>"
            code:
              language: <javascript | python | other>
              snippet: |
                <// Paste the code snippet here.>
                <// Keep it short and focused on one concept.>
            options:
              - "<Option A>"
              - "<Option B>"
              - "<Option C>"
              - "<Option D>"
            # answer: see solutions.yaml → ctest-ch-01-s-02-q-01

          # ── QUESTION: code_fix ──────────────────────────────────────────

          - id: ctest-ch-01-s-02-q-02
            type: code_fix
            points: <N>
            difficulty: <easy | medium | hard>
            topic: <topic-slug>
            question: "<Describe the bug. Ask student to fix it.>"
            code:
              language: <language>
              snippet: |
                <// Buggy code here.>
            grading: <diff | manual>
            # answer: see solutions.yaml → ctest-ch-01-s-02-q-02

          # ── QUESTION: code_write ────────────────────────────────────────

          - id: ctest-ch-01-s-02-q-03
            type: code_write
            points: <N>
            difficulty: <easy | medium | hard>
            topic: <topic-slug>
            question: |
              <Describe exactly what function or code the student must write.
              Include input/output contract and edge cases.>
            language: <language>
            starter: |
              <// Starter code / function signature here.>
            grading: <auto | manual>
            keywords:                        # [OPTIONAL] for keyword-based scoring
              - <keyword-1>
              - <keyword-2>
            # sample_solution: see solutions.yaml → ctest-ch-01-s-02-q-03

          # ── QUESTION: short ─────────────────────────────────────────────

          - id: ctest-ch-01-s-02-q-04
            type: short
            points: <N>
            difficulty: <easy | medium | hard>
            topic: <topic-slug>
            question: "<Open-ended question requiring a written answer.>"
            grading: <manual | keywords>
            keywords:                        # [OPTIONAL]
              - <keyword-1>
              - <keyword-2>
            # sample_answer: see solutions.yaml → ctest-ch-01-s-02-q-04

          # ── QUESTION: code_reading ──────────────────────────────────────

          - id: ctest-ch-01-s-02-q-05
            type: code_reading
            points: <N>
            difficulty: <easy | medium | hard>
            topic: <topic-slug>
            question: "<Conceptual question about the code below.>"
            code:
              language: <language>
              snippet: |
                <// Code to read and reason about.>
            options:
              - "<Option A>"
              - "<Option B>"
              - "<Option C>"
              - "<Option D>"
            # answer: see solutions.yaml → ctest-ch-01-s-02-q-05

