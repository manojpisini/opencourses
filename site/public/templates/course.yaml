# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║                     OPENCOURSES — COURSE MANIFEST                            ║
# ║                     course.yaml  |  Schema v3.0                              ║
# ║                                                                              ║
# ║  Single source of truth for every course in OpenCourses.                     ║
# ║  The automation engine reads this file top-to-bottom and fires               ║
# ║  GitHub Actions for: build · enroll · grade · certify · notify.              ║
# ║                                                                              ║
# ║  COMPANION FILE: solutions.yaml (same directory, private branch)             ║
# ║                                                                              ║
# ║  Validate locally:                                                           ║
# ║    python -c "import yaml,sys; yaml.safe_load(sys.stdin)" < course.yaml      ║
# ║                                                                              ║
# ║  INSTRUCTIONS                                                                ║
# ║  ─────────────────────────────────────────────────────────────────────────  ║
# ║  • Replace every <PLACEHOLDER> with real content.                            ║
# ║  • Fields marked [REQUIRED] must be filled before status: review.            ║
# ║  • Fields marked [OPTIONAL] may be removed if not needed.                   ║
# ║  • Delete all instruction comments before publishing.                        ║
# ║  • Keep structural comments (TYPE LABELS, SCHEMA notes) — they drive         ║
# ║    the parser and IDE autocomplete.                                          ║
# ║                                                                              ║
# ║  CONTENT NODE HIERARCHY                                                      ║
# ║    course                                                                    ║
# ║      chapter                                                                 ║
# ║        section          (optional grouping inside a chapter)                 ║
# ║          subsection     (optional deeper grouping)                           ║
# ║            lesson       (leaf — one learning unit)                           ║
# ║                                                                              ║
# ║  LESSON TYPES                                                                ║
# ║    video      curated video with timestamps and curator notes                ║
# ║    reading    curated article, doc page, or book chapter                     ║
# ║    code       annotated runnable code walkthrough                            ║
# ║    exercise   hands-on task with starter repo and rubric                     ║
# ║    reference  cheatsheet, table, or quick-reference card                     ║
# ║    quiz       ungraded formative check (instant feedback)                    ║
# ║    discussion open-ended prompt for GitHub Discussions                        ║
# ║    project    multi-lesson deliverable (used inside a chapter)               ║
# ║                                                                              ║
# ║  TEXT FORMAT LABELS  (content.text.format)                                   ║
# ║    markdown   GitHub Flavored Markdown — headers, bold, italic,              ║
# ║               tables, blockquotes, lists, inline code, fenced blocks         ║
# ║    plain      plain text, no formatting                                      ║
# ║    html       raw HTML (use sparingly)                                       ║
# ║                                                                              ║
# ║  LINK TYPE LABELS  (links[].type)                                            ║
# ║    documentation  article  video  repo  tool  dataset                        ║
# ║    book  podcast  course  forum  playground  download                        ║
# ║                                                                              ║
# ║  FILE TYPE LABELS  (files[].type)                                            ║
# ║    pdf  image  video  zip  csv  json  yaml  diagram                          ║
# ║    spreadsheet  slide  notebook  other                                       ║
# ║                                                                              ║
# ║  QUESTION TYPES  (questions[].type)                                          ║
# ║    mcq          single correct answer, multiple choice                       ║
# ║    multi        multiple correct answers                                     ║
# ║    truefalse    true or false                                                ║
# ║    short        free-text written answer                                     ║
# ║    code_output  "what does this code log?" with options                      ║
# ║    code_fix     fix the bug in provided code                                 ║
# ║    code_write   write code from scratch                                      ║
# ║    code_reading read code and answer a conceptual question                   ║
# ║                                                                              ║
# ║  GRADING LABELS  (grading)                                                   ║
# ║    auto      exact match                                                     ║
# ║    diff      structural code diff                                            ║
# ║    keywords  keyword presence scoring                                        ║
# ║    manual    maintainer reviews and scores                                   ║
# ║                                                                              ║
# ║  DIFFICULTY LABELS  (difficulty)                                             ║
# ║    easy  medium  hard                                                        ║
# ║                                                                              ║
# ║  SUBMISSION TYPE LABELS  (submission_type)                                   ║
# ║    github_url  file_upload  text  gist_url  none                             ║
# ║                                                                              ║
# ║  REVIEW TYPE LABELS  (review.type)                                           ║
# ║    maintainer  peer  auto                                                    ║
# ║                                                                              ║
# ║  STATUS LABELS  (metadata.status)                                            ║
# ║    draft  review  published  archived  deprecated                            ║
# ║                                                                              ║
# ║  SHOW ANSWERS LABELS  (show_answers_after)                                   ║
# ║    passed  attempted  never                                                  ║
# ║                                                                              ║
# ║  CONTENT BLUEPRINT FLOW STAGES  (content_blueprint.flow)                     ║
# ║    foundations  environment-setup  guided-fundamentals                       ║
# ║    incremental-challenges  production-engineering                            ║
# ║    open-source-exploration  capstone-project  contribution-path              ║
# ╚══════════════════════════════════════════════════════════════════════════════╝


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 1 — METADATA
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

metadata:
  id: <course-slug>                           # [REQUIRED] kebab-case, globally unique, used in URLs
  version: "1.0.0"                            # [REQUIRED] semver — bump on every meaningful change
  schema_version: "3.0"                       # [REQUIRED] do not change — course.yaml schema version
  status: draft                               # [REQUIRED] draft | review | published | archived | deprecated
  visibility: public                          # [REQUIRED] public | unlisted | private
  created_at: "<YYYY-MM-DD>"                  # [REQUIRED] ISO 8601
  updated_at: "<YYYY-MM-DD>"                  # [REQUIRED] update on every change
  published_at: null                          # set automatically by automation on publish
  language: <ISO-639-1>                       # [REQUIRED] e.g. en, hi, ta, te
  locale: <locale>                            # [OPTIONAL] e.g. en-IN, en-US
  slug_aliases:                               # [OPTIONAL] old slugs that redirect here
    - <old-slug-1>
    - <old-slug-2>
  solutions_file: solutions.yaml              # [REQUIRED] path to companion solutions file


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 2 — IDENTITY
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

identity:
  title: "<Course Title>"                     # [REQUIRED] shown everywhere
  tagline: "<One sentence that sells this course>"  # [REQUIRED] shown on cards and search

  description:
    short: >                                  # [REQUIRED] 2–3 sentences for search results and cards
      <Short description of the course. What is it about?
      Who is it for? What makes it worth taking?>
    full: |                                   # [REQUIRED] full markdown description for the course page
      <First paragraph: what the course covers and why it matters.>

      <Second paragraph: who this is for and what prior knowledge is assumed.>

      **What makes this course different:**
      - <Differentiator 1>
      - <Differentiator 2>
      - <Differentiator 3>

      **Who this is for:**
      - <Audience 1>
      - <Audience 2>

  cover:
    color_primary: "<#HEXCODE>"               # [OPTIONAL] course accent color
    color_secondary: "<#HEXCODE>"             # [OPTIONAL] secondary accent color
    # Course artwork is generated by the site from classification.category.
    # Add images only when a lesson or resource needs them.


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 3 — CLASSIFICATION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

classification:
  category: <category-slug>                   # [REQUIRED] single primary category, kebab-case
  subcategory: <subcategory-slug>             # [OPTIONAL] kebab-case
  tags:                                       # [REQUIRED] 3–8 searchable tags, kebab-case
    - <tag-1>
    - <tag-2>
    - <tag-3>
  topics:                                     # [REQUIRED] granular topics covered, kebab-case
    - <topic-1>
    - <topic-2>
    - <topic-3>
  level: <level>                              # [REQUIRED] beginner | intermediate | advanced | mixed
  target_audience:                            # [OPTIONAL] human-readable audience descriptions
    - <Audience description 1>
    - <Audience description 2>
  skills_gained:                              # [REQUIRED] shown as tags on the certificate
    - <Skill 1>
    - <Skill 2>
    - <Skill 3>


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 4 — EFFORT & PACE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

effort:
  video_hours: <N>                            # [REQUIRED] total curated video hours (approximate)
  reading_hours: <N>                          # [OPTIONAL] estimated reading time in hours
  exercise_hours: <N>                         # [OPTIONAL] estimated hands-on time in hours
  total_hours: <N>                            # [REQUIRED] shown on course card
  pace: self-paced                            # [REQUIRED] self-paced | scheduled
  weekly_commitment_hours: <N>               # [OPTIONAL] suggested hours per week
  completion_weeks: <N>                       # [OPTIONAL] estimated weeks at weekly commitment


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 5 — PEOPLE
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

people:
  curator:                                    # [REQUIRED] person who built this course.yaml
    name: <Full Name>
    github: <github-username>
    role: <Role, e.g. Curator & Maintainer>
    bio: "<Optional one-sentence bio shown on the course page.>"
    avatar: null                              # null = auto-pulled from GitHub

  contributors:                               # [OPTIONAL] others who helped
    - name: <Full Name>
      github: <github-username>
      role: <Role, e.g. Content Reviewer>
      contributions:
        - <What they contributed>

  reviewers:                                  # [OPTIONAL] subject-matter experts
    - name: <Full Name>
      github: <github-username>
      expertise: <Area of expertise>


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 6 — CREDITS & ATTRIBUTION
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Every external resource used anywhere in this course MUST have an entry here.
# Reference by id (e.g. credit_id: src-01) inside lessons.
# Types: video | repo | article | book | tool | dataset | course | podcast

credits:

  - id: src-01                               # [REQUIRED] unique, referenced inside lessons
    type: <type>                             # [REQUIRED] see TYPE LABELS above
    title: "<Resource Title>"
    author: "<Author or Channel Name>"
    organization: "<Organization Name>"      # [OPTIONAL]
    url: "<https://...>"
    license: "<License Name, e.g. MIT / CC BY 4.0 / YouTube ToS>"
    license_url: "<https://...>"             # [OPTIONAL] link to full license text
    accessed_at: "<YYYY-MM-DD>"              # [OPTIONAL] date you verified the link
    notes: "<Which parts of this resource are used and how>"  # [OPTIONAL]
    archived_url: null                       # [OPTIONAL] Wayback Machine backup URL

  - id: src-02
    type: <type>
    title: "<Resource Title>"
    author: "<Author Name>"
    organization: "<Organization>"           # [OPTIONAL]
    url: "<https://...>"
    license: "<License>"
    license_url: "<https://...>"
    accessed_at: "<YYYY-MM-DD>"
    notes: null
    archived_url: null

  # Add more credits as needed — one entry per unique external source.


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 7 — PREREQUISITES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

prerequisites:
  knowledge:                                 # [OPTIONAL] human-readable knowledge requirements
    - <Knowledge requirement 1>
    - <Knowledge requirement 2>

  courses:                                   # [OPTIONAL] other OpenCourses IDs required first
    - <prerequisite-course-slug>

  tools:                                     # [OPTIONAL] software students need installed
    - name: <Tool Name>
      url: "<https://...>"
      required: true                         # true | false
      install_guide: "<https://...>"         # [OPTIONAL]
      version_minimum: "<X.Y.Z>"            # [OPTIONAL] e.g. "20.0.0"

  accounts:                                  # [OPTIONAL] external accounts required
    - service: <Service Name>
      url: "<https://signup-url>"
      required: true
      reason: "<Why this account is needed>"


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 8 — OUTCOMES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

outcomes:
  by_completion:                             # [REQUIRED] what students can do after finishing
    - <Outcome 1 — start with an action verb>
    - <Outcome 2>
    - <Outcome 3>
    - <Outcome 4>

  by_chapter:                               # [OPTIONAL] micro-outcomes per chapter
    <ch-id>:
      - <Chapter-level outcome 1>
      - <Chapter-level outcome 2>


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# OPEN SOURCE CONTENT BLUEPRINT ALIGNMENT
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# This optional but strongly recommended section improves course CONTENT.
# It does not replace the course.yaml structure. Use it to prove that the
# lessons, tests, resources, projects, and contribution path follow the
# OpenCourses open-source-first course blueprint.

content_blueprint:
  philosophy: >                              # [RECOMMENDED]
    Using open-source knowledge, tooling, infrastructure, and communities to
    create world-class education for everyone.

  principles:                                # [RECOMMENDED] choose the concrete principles this course proves
    - Uses open-source tooling whenever possible
    - References open-source implementations
    - Teaches through real repositories
    - Includes production-grade engineering practices
    - Is reproducible locally
    - Encourages reading source code
    - Uses transparent evaluation systems

  flow:                                      # [RECOMMENDED] keep all stages unless the course has a documented reason
    - foundations
    - environment-setup
    - guided-fundamentals
    - incremental-challenges
    - production-engineering
    - open-source-exploration
    - capstone-project
    - contribution-path

  chapter_structure:                         # [RECOMMENDED] checklist for every chapter
    - Learning Objectives
    - Concepts
    - Mental Models
    - Examples
    - Walkthroughs
    - Common Mistakes
    - Performance Notes
    - Security Notes
    - Debugging Tips
    - Production Insights
    - Exercises
    - Mini Project
    - Quiz
    - References
    - Further Reading

  resource_strategy:
    repositories:
      - <https://github.com/org/repo>
    open_books:
      - <Book title or URL>
    papers:
      - <Paper title or URL>
    rfcs_and_specs:
      - <RFC/spec title or URL>

  testing:
    philosophy:
      - Validate correctness
      - Cover edge cases
      - Include performance and security checks where relevant
    types:
      - deterministic
      - randomized
      - fuzz
      - property-based
      - benchmark
    generators:
      - assets/tests/<generator-file>

  capstone:
    level: <beginner | intermediate | advanced | expert | elite | frontier>
    type: <mini application | production feature | scalable service | distributed platform | research-grade system | experimental prototype>
    requirements:
      - Production-ready
      - Deployable
      - Documented
      - Tested
      - Secure
      - Open-source licensed

  contribution_path:
    - Open issues
    - Submit pull requests
    - Improve documentation
    - Fix bugs
    - Extend the ecosystem


# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 9 — CURRICULUM
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

curriculum:

  chapters:

  # ══════════════════════════════════════════════════════════════════════════
  # CHAPTER TEMPLATE
  # Duplicate this block for each chapter. Remove sections/subsections if
  # you only need flat lessons directly inside a chapter.
  # ══════════════════════════════════════════════════════════════════════════

    - id: ch-01                              # [REQUIRED] unique chapter id, kebab-case
      title: "<Chapter Title>"              # [REQUIRED]
      description: >                        # [REQUIRED] 1–2 sentences shown in the curriculum index
        <What this chapter covers and why it matters to the overall course.>
      duration_minutes: <N>                 # [REQUIRED] total estimated minutes for this chapter
      free_preview: true                    # [REQUIRED] true = visible before enrollment

      outcomes:                             # [OPTIONAL] chapter-level learning outcomes
        - <Outcome 1>
        - <Outcome 2>

      # ── SECTIONS (optional grouping layer) ──────────────────────────────
      # Remove the `sections` key and add `lessons` directly if you don't
      # need sections inside this chapter.

      sections:

        # ── SECTION TEMPLATE ──────────────────────────────────────────────

        - id: ch-01-s-01                   # [REQUIRED] unique, kebab-case
          title: "<Section Title>"
          description: "<What this section covers in one sentence.>"

          # ── SUBSECTIONS (optional deeper grouping) ────────────────────
          # Remove `subsections` and add `lessons` directly if not needed.

          subsections:

