<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-labelledby="title desc">
  <title id="title">OpenCourses</title>
  <desc id="desc">OpenCourses brand image with the cyan course icon and wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061313"/>
      <stop offset="1" stop-color="#0a1e1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="260" y1="0" x2="940" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="0.28" stop-color="#38BDF8" stop-opacity="0.85"/>
      <stop offset="0.72" stop-color="#2DD4BF" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="43%" r="48%">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#1a3030" opacity="0.72"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="600" cy="270" rx="470" ry="230" fill="url(#glow)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)" opacity="0.45"/>

  <g opacity="0.18" fill="none" stroke-width="2">
    <path d="M76 132 H132 V76" stroke="#38BDF8"/>
    <path d="M1124 132 H1068 V76" stroke="#2DD4BF"/>
    <path d="M76 498 H132 V554" stroke="#2DD4BF"/>
    <path d="M1124 498 H1068 V554" stroke="#38BDF8"/>
  </g>

  <g transform="translate(332 204)">
    <g transform="scale(2)">
      <rect width="56" height="56" rx="12" fill="#38BDF8"/>
      <rect x="8" y="8" width="40" height="40" rx="7" fill="#0a1e1e"/>
      <rect x="14" y="16" width="28" height="3.5" rx="1.75" fill="#38BDF8"/>
      <rect x="14" y="23" width="19" height="3.5" rx="1.75" fill="#2DD4BF"/>
      <rect x="14" y="30" width="23" height="3.5" rx="1.75" fill="#38BDF8" opacity="0.6"/>
      <rect x="14" y="37" width="12" height="3.5" rx="1.75" fill="#2DD4BF" opacity="0.5"/>
      <rect x="33" y="32" width="12" height="12" rx="3.5" fill="#38BDF8"/>
      <path d="M36 35 L38.5 37.5 M38.5 35 L36 37.5" fill="none" stroke="#0a1e1e" stroke-width="1.6" stroke-linecap="round"/>
    </g>
    <text x="140" y="72" font-family="'Sora','DM Sans',system-ui,sans-serif" font-size="78" letter-spacing="0">
      <tspan font-weight="700" fill="#38BDF8">Open</tspan><tspan font-weight="400" fill="#ffffff">Courses</tspan>
    </text>
  </g>

  <text x="600" y="382" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="24" fill="#aab7b7">
    Free, open-source developer education built on GitHub.
  </text>
  <rect x="410" y="420" width="380" height="2" fill="url(#accent)" opacity="0.6"/>

  <g font-family="'JetBrains Mono',ui-monospace,monospace" font-size="18" text-anchor="middle">
    <g transform="translate(326 472)">
      <rect x="-82" y="-30" width="164" height="64" rx="8" fill="#0d2525" stroke="#1f4545"/>
      <text y="-4" fill="#ffffff" font-weight="700">16+</text>
      <text y="20" fill="#4a7070" font-size="13">COURSES</text>
    </g>
    <g transform="translate(508 472)">
      <rect x="-82" y="-30" width="164" height="64" rx="8" fill="#0d2525" stroke="#1f4545"/>
      <text y="-4" fill="#ffffff" font-weight="700">12</text>
      <text y="20" fill="#4a7070" font-size="13">TRACKS</text>
    </g>
    <g transform="translate(690 472)">
      <rect x="-82" y="-30" width="164" height="64" rx="8" fill="#0d2525" stroke="#1f4545"/>
      <text y="-4" fill="#ffffff" font-weight="700">GIT</text>
      <text y="20" fill="#4a7070" font-size="13">NATIVE</text>
    </g>
    <g transform="translate(872 472)">
      <rect x="-82" y="-30" width="164" height="64" rx="8" fill="#0d2525" stroke="#1f4545"/>
      <text y="-4" fill="#2DD4BF" font-weight="700">$0</text>
      <text y="20" fill="#4a7070" font-size="13">FOREVER</text>
    </g>
  </g>
</svg>
