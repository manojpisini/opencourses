<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-labelledby="title desc">
  <title id="title">OpenCourses</title>
  <desc id="desc">OpenCourses README banner using the official purple open-book logo suite.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0D0F12"/>
      <stop offset="1" stop-color="#15111F"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4C1BC9" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#4C1BC9" stop-opacity="0.92"/>
      <stop offset="0.7" stop-color="#7C3AED" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="52%">
      <stop offset="0" stop-color="#4C1BC9" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#4C1BC9" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <path d="M28 0H0v28" fill="none" stroke="#2A2636" stroke-width="1" opacity="0.5"/>
    </pattern>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#grid)"/>
  <ellipse cx="600" cy="128" rx="470" ry="190" fill="url(#glow)"/>
  <rect width="1200" height="3" fill="url(#accent)"/>
  <rect y="337" width="1200" height="3" fill="url(#accent)" opacity="0.46"/>

  <g opacity="0.2">
    <path d="M44 62 H66 M44 62 V132" stroke="#4C1BC9" stroke-width="2" fill="none"/>
    <path d="M1156 62 H1134 M1156 62 V132" stroke="#7C3AED" stroke-width="2" fill="none"/>
    <path d="M44 278 H66 M44 278 V208" stroke="#7C3AED" stroke-width="2" fill="none"/>
    <path d="M1156 278 H1134 M1156 278 V208" stroke="#4C1BC9" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(386 72)">
    <g transform="scale(1.55)">
      <path d="M10 8 27 17.4v28.9L9.8 36.6 10 8Z" fill="#4C1BC9" stroke="#4C1BC9" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M51 8 34 17.4v28.9l17.2-9.7L51 8Z" fill="#4C1BC9" stroke="#4C1BC9" stroke-width="2.4" stroke-linejoin="round"/>
      <path d="M8.6 39.2 30.5 51 52 38.9" fill="none" stroke="#4C1BC9" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="88" y="52" font-family="Geist, Sora, Inter, system-ui, sans-serif" font-size="48" letter-spacing="0">
      <tspan font-weight="800" fill="#4C1BC9">Open</tspan><tspan font-weight="400" fill="#F7F7FB">Courses</tspan>
    </text>
  </g>

  <text x="600" y="198" text-anchor="middle" font-family="DM Sans, Inter, system-ui, sans-serif" font-size="17" fill="#C9C5D8">
    Free, open-source developer education. Version-controlled and community-built.
  </text>
  <rect x="478" y="220" width="244" height="1" fill="url(#accent)" opacity="0.72"/>

  <g font-family="JetBrains Mono, ui-monospace, monospace" font-size="12" text-anchor="middle">
    <g transform="translate(354 264)">
      <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#15111F" stroke="#342753"/>
      <text y="-2" fill="#F7F7FB" font-size="17" font-weight="700">OPEN</text>
      <text y="14" fill="#8F85AC">SOURCE</text>
    </g>
    <g transform="translate(518 264)">
      <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#15111F" stroke="#342753"/>
      <text y="-2" fill="#F7F7FB" font-size="17" font-weight="700">SELF</text>
      <text y="14" fill="#8F85AC">PACED</text>
    </g>
    <g transform="translate(682 264)">
      <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#15111F" stroke="#342753"/>
      <text y="-2" fill="#F7F7FB" font-size="17" font-weight="700">GIT</text>
      <text y="14" fill="#8F85AC">NATIVE</text>
    </g>
    <g transform="translate(846 264)">
      <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#15111F" stroke="#342753"/>
      <text y="-2" fill="#7C3AED" font-size="17" font-weight="700">FREE</text>
      <text y="14" fill="#8F85AC">FOREVER</text>
    </g>
  </g>

  <text x="600" y="324" text-anchor="middle" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#625A7A" letter-spacing="1.5">
    EVERY COURSE IS A REPO | EVERY UPDATE IS A COMMIT | EVERY LEARNER OWNS THE WORK
  </text>
</svg>
