<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c10"/>
      <stop offset="100%" style="stop-color:#0d0f14"/>
    </linearGradient>
    <!-- Blue glow -->
    <radialGradient id="glow" cx="50%" cy="40%" r="55%">
      <stop offset="0%" style="stop-color:#4f9eff;stop-opacity:0.09"/>
      <stop offset="100%" style="stop-color:#4f9eff;stop-opacity:0"/>
    </radialGradient>
    <!-- Accent line gradient -->
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4f9eff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#4f9eff;stop-opacity:0.8"/>
      <stop offset="70%" style="stop-color:#a78bfa;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0"/>
    </linearGradient>
    <!-- Card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1c2028"/>
      <stop offset="100%" style="stop-color:#13161b"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- Dot grid pattern -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#2e3540" opacity="0.5"/>
  </pattern>
  <rect width="1200" height="340" fill="url(#dots)"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="140" rx="480" ry="200" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="1" fill="url(#accentLine)" opacity="0.6"/>

  <!-- Bottom accent line -->
  <rect x="0" y="339" width="1200" height="1" fill="url(#accentLine)" opacity="0.3"/>

  <!-- Left decorative bracket -->
  <g opacity="0.15">
    <rect x="42" y="60" width="2" height="220" fill="#4f9eff"/>
    <rect x="42" y="60" width="16" height="2" fill="#4f9eff"/>
    <rect x="42" y="278" width="16" height="2" fill="#4f9eff"/>
  </g>
  <!-- Right decorative bracket -->
  <g opacity="0.15">
    <rect x="1156" y="60" width="2" height="220" fill="#a78bfa"/>
    <rect x="1142" y="60" width="16" height="2" fill="#a78bfa"/>
    <rect x="1142" y="278" width="16" height="2" fill="#a78bfa"/>
  </g>

  <!-- Build status bar (decorative) -->
  <rect x="0" y="0" width="1200" height="3" fill="none"/>
  <rect x="0" y="0" width="380" height="3" fill="#4f9eff" opacity="0.9"/>
  <rect x="380" y="0" width="1" height="3" fill="#4f9eff" opacity="0.4"/>

  <!-- Version chip top-left -->
  <rect x="72" y="86" width="68" height="20" rx="4" fill="#1c2028" stroke="#252a34" stroke-width="1"/>
  <text x="106" y="100" font-family="'JetBrains Mono', monospace" font-size="10" fill="#4f9eff" text-anchor="middle" letter-spacing="0.5">v 1.0.0</text>

  <!-- Status chip -->
  <rect x="148" y="86" width="76" height="20" rx="4" fill="#1c2028" stroke="#252a34" stroke-width="1"/>
  <circle cx="162" cy="96" r="3" fill="#3dd68c"/>
  <text x="185" y="100" font-family="'JetBrains Mono', monospace" font-size="10" fill="#3dd68c" text-anchor="middle" letter-spacing="0.3">LIVE</text>

  <!-- Main wordmark -->
  <text x="600" y="168" font-family="'Sora', 'DM Sans', system-ui, sans-serif" font-size="68" font-weight="800" fill="#eef0f4" text-anchor="middle" letter-spacing="-3">
    <tspan fill="#4f9eff">&lt; OPEN</tspan><tspan fill="#eef0f4"> COURSES &gt;</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="210" font-family="'DM Sans', system-ui, sans-serif" font-size="17" font-weight="400" fill="#8b93a5" text-anchor="middle" letter-spacing="0.3">
    Free, open-source developer education — version-controlled and community-built.
  </text>

  <!-- Accent separator -->
  <rect x="500" y="228" width="200" height="1" fill="url(#accentLine)" opacity="0.4"/>

  <!-- Corner decoration: circuit-like lines top-right -->
  <g opacity="0.06" stroke="#4f9eff" stroke-width="1" fill="none">
    <polyline points="900,0 900,40 960,40 960,80 1010,80"/>
    <polyline points="1000,0 1000,25 1050,25 1050,60 1100,60 1100,80"/>
    <circle cx="960" cy="40" r="2.5" fill="#4f9eff" stroke="none"/>
    <circle cx="1050" cy="25" r="2.5" fill="#4f9eff" stroke="none"/>
    <circle cx="1050" cy="60" r="2.5" fill="#4f9eff" stroke="none"/>
  </g>

  <!-- Corner decoration: bottom-left -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="1" fill="none">
    <polyline points="0,260 60,260 60,310 120,310"/>
    <polyline points="0,295 30,295 30,340"/>
    <circle cx="60" cy="260" r="2.5" fill="#a78bfa" stroke="none"/>
    <circle cx="30" cy="295" r="2.5" fill="#a78bfa" stroke="none"/>
  </g>

  <!-- Footer text -->
  <text x="600" y="326" font-family="'JetBrains Mono', monospace" font-size="10" fill="#2e3540" text-anchor="middle" letter-spacing="2">
    EVERY COURSE IS A REPO · EVERY UPDATE IS A COMMIT · EVERY CONTRIBUTOR IS A MAINTAINER
  </text>
</svg>
