<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340" role="img" aria-labelledby="title desc">
  <title id="title">OpenCourses</title>
  <desc id="desc">OpenCourses README banner using the official cyan and teal logo suite.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#061313"/>
      <stop offset="1" stop-color="#0a1e1e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#38BDF8" stop-opacity="0.8"/>
      <stop offset="0.7" stop-color="#2DD4BF" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="38%" r="52%">
      <stop offset="0" stop-color="#38BDF8" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#1a3030" opacity="0.72"/>
    </pattern>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#dots)"/>
  <ellipse cx="600" cy="128" rx="470" ry="190" fill="url(#glow)"/>
  <rect width="1200" height="3" fill="url(#accent)"/>
  <rect y="337" width="1200" height="3" fill="url(#accent)" opacity="0.38"/>

  <g opacity="0.16">
    <path d="M44 62 H66 M44 62 V132" stroke="#38BDF8" stroke-width="2" fill="none"/>
    <path d="M1156 62 H1134 M1156 62 V132" stroke="#2DD4BF" stroke-width="2" fill="none"/>
    <path d="M44 278 H66 M44 278 V208" stroke="#2DD4BF" stroke-width="2" fill="none"/>
    <path d="M1156 278 H1134 M1156 278 V208" stroke="#38BDF8" stroke-width="2" fill="none"/>
  </g>

  <g transform="translate(420 74)">
    <g transform="scale(1.6)">
      <rect x="0" y="2" width="40" height="40" rx="9" fill="#38BDF8"/>
      <rect x="5.5" y="7.5" width="29" height="29" rx="5" fill="#0a1e1e"/>
      <rect x="10" y="13" width="20" height="2.5" rx="1.25" fill="#38BDF8"/>
      <rect x="10" y="18" width="13" height="2.5" rx="1.25" fill="#2DD4BF"/>
      <rect x="10" y="23" width="16" height="2.5" rx="1.25" fill="#38BDF8" opacity="0.6"/>
      <rect x="10" y="28" width="9" height="2.5" rx="1.25" fill="#2DD4BF" opacity="0.5"/>
      <rect x="23.5" y="24.5" width="9" height="9" rx="2.5" fill="#38BDF8"/>
      <path d="M26 27 L28 29 M28 27 L26 29" fill="none" stroke="#0a1e1e" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    <text x="82" y="47" font-family="'Sora','DM Sans',system-ui,sans-serif" font-size="46" letter-spacing="0">
      <tspan font-weight="700" fill="#38BDF8">Open</tspan><tspan font-weight="400" fill="#ffffff">Courses</tspan>
    </text>
  </g>

  <text x="600" y="198" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="17" fill="#aab7b7">
    Free, open-source developer education. Version-controlled and community-built.
  </text>
  <rect x="478" y="220" width="244" height="1" fill="url(#accent)" opacity="0.65"/>

  <g font-family="'JetBrains Mono',ui-monospace,monospace" font-size="12" text-anchor="middle">
    <g transform="translate(354 264)">
      <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#0d2525" stroke="#1f4545"/>
      <text y="-2" fill="#ffffff" font-size="17" font-weight="700">OPEN</text>
      <text y="14" fill="#4a7070">SOURCE</text>
    </g>
    <g transform="translate(518 264)">
      <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#0d2525" stroke="#1f4545"/>
      <text y="-2" fill="#ffffff" font-size="17" font-weight="700">SELF</text>
      <text y="14" fill="#4a7070">PACED</text>
    </g>
    <g transform="translate(682 264)">
      <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#0d2525" stroke="#1f4545"/>
      <text y="-2" fill="#ffffff" font-size="17" font-weight="700">GIT</text>
      <text y="14" fill="#4a7070">NATIVE</text>
    </g>
    <g transform="translate(846 264)">
      <rect x="-68" y="-22" width="136" height="44" rx="6" fill="#0d2525" stroke="#1f4545"/>
      <text y="-2" fill="#2DD4BF" font-size="17" font-weight="700">FREE</text>
      <text y="14" fill="#4a7070">FOREVER</text>
    </g>
  </g>

  <text x="600" y="324" text-anchor="middle" font-family="'JetBrains Mono',ui-monospace,monospace" font-size="10" fill="#2f5757" letter-spacing="1.5">
    EVERY COURSE IS A REPO | EVERY UPDATE IS A COMMIT | EVERY LEARNER OWNS THE WORK
  </text>
</svg>
