name: 📋 Submit Assignment
description: Submit a chapter assignment for grading or maintainer review
title: "[Assignment] @YOUR_USERNAME - COURSE_SLUG/ASSIGNMENT_ID"
labels:
  - assignment-submit
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Chapter Assignment Submission

        Submit a public repository for a chapter assignment. Use the same GitHub username
        you used for enrollment so progress, grading, and certificates stay connected.

  - type: input
    id: github_username
    attributes:
      label: Your GitHub Username
      description: Your GitHub handle. This must match the account that opens this issue and your enrollment issue.
      placeholder: "@your-username"
    validations:
      required: true

  - type: input
    id: course_slug
    attributes:
      label: Course Slug
      description: The course slug you are enrolled in
      placeholder: "llm-engineering"
    validations:
      required: true

  - type: input
    id: chapter_id
    attributes:
      label: Chapter ID
      description: The chapter this assignment belongs to
      placeholder: "ch-01"
    validations:
      required: true

  - type: input
    id: assignment_id
    attributes:
      label: Assignment ID
      description: The exact assignment ID from the course
      placeholder: "cassign-ch-01"
    validations:
      required: true

  - type: input
    id: repo_link
    attributes:
      label: Repository Link
      description: Public GitHub repository, branch, or folder containing your work
      placeholder: "https://github.com/your-username/my-assignment"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What did you build?
      description: Summarize your implementation, decisions, and known limitations.
      placeholder: |
        I implemented the chapter assignment and included tests, documentation, and reproduction steps.
    validations:
      required: true

  - type: textarea
    id: self_review
    attributes:
      label: Self-review checklist
      description: Confirm the deliverables you completed.
      placeholder: |
        - [x] Required files are present
        - [x] Tests or checks were run locally
        - [x] README explains how to reproduce
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: Confirmation
      options:
        - label: This is my own original work
          required: true
        - label: My repository is public and accessible
          required: true
        - label: I am enrolled in the course listed above
          required: true
