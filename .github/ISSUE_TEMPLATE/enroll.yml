name: 📚 Enroll in a Course
description: Start your learning journey — enroll in an OpenCourse
title: "[Enrolled] @YOUR_GITHUB_USERNAME — COURSE_SLUG"
labels:
  - enrollment-request
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Welcome to OpenCourses! 🎉

        Your **GitHub account** (`@your-username`) is your identity for everything:
        enrollment tracking, chapter tests, the final test, and certificate issuance.
        No separate account needed — just your GitHub profile.

        Fill in the two fields below and submit. An automated welcome message with your full curriculum will appear within minutes.

        > **Keep this issue open** — it is your progress record. Every chapter test pass, project pass, and the final certificate will be tracked here as GitHub labels.

  - type: input
    id: course
    attributes:
      label: Course Slug
      description: The exact slug of the course you want to enroll in (check the course catalog)
      placeholder: "git-mastery"
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: Email Address
      description: |
        Used **only** for certificate delivery — stored privately in this issue body, never shown publicly.
        Leave blank if you prefer to receive the certificate only via GitHub.
      placeholder: "you@example.com"
    validations:
      required: false

  - type: textarea
    id: goal
    attributes:
      label: Your Goal (optional)
      description: What do you hope to achieve by completing this course?
      placeholder: "I want to contribute to open-source projects confidently using Git."
    validations:
      required: false

  - type: dropdown
    id: experience
    attributes:
      label: Current Experience Level
      options:
        - Complete beginner
        - Some exposure
        - Intermediate
        - Advanced (refresher)
    validations:
      required: true

  - type: checkboxes
    id: agreements
    attributes:
      label: Agreements
      options:
        - label: I understand my GitHub username is my identity for all tests and the certificate
          required: true
        - label: I will submit my own original work
          required: true
        - label: I have read and agree to the [Code of Conduct](../CODE_OF_CONDUCT.md)
          required: true
