name: 📚 Enroll in a Course
description: Start your learning journey — enroll in an OpenCourse
title: "[Enrollment] @YOUR_USERNAME — COURSE_SLUG"
labels:
  - enrollment-request
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Welcome to OpenCourses! 🎉
        Fill in this form to enroll. An automated welcome message with your full curriculum will be posted within minutes.
        **Keep this issue open** — it tracks your entire progress.

  - type: input
    id: full_name
    attributes:
      label: Full Name
      description: Your real name (used for certificate generation)
      placeholder: "Jane Doe"
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: Email Address
      description: Used for certificate delivery only — not shown publicly
      placeholder: "jane@example.com"
    validations:
      required: true

  - type: input
    id: course
    attributes:
      label: Course
      description: The course slug you want to enroll in
      placeholder: "git-mastery"
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Your Goal
      description: What do you hope to achieve? (optional)
      placeholder: "I want to be comfortable contributing to open-source projects using Git."
    validations:
      required: false

  - type: dropdown
    id: experience
    attributes:
      label: Experience Level
      description: Your current level with this topic
      options:
        - Complete beginner
        - Some exposure
        - Intermediate
        - Advanced (refresher)
    validations:
      required: true

  - type: checkboxes
    id: agreements
    attributes:
      label: Agreements
      options:
        - label: I will submit my own original work
          required: true
        - label: I have read and agree to the [Code of Conduct](../CODE_OF_CONDUCT.md)
          required: true
        - label: I understand progress is tracked via GitHub labels on this issue
          required: true
