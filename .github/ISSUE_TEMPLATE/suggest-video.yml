name: 📺 Suggest a Video
description: Suggest a replacement for a dead or low-quality video in a course
title: "[Video] @YOUR_USERNAME — COURSE_SLUG/CHAPTER_ID"
labels:
  - content-fix
  - video-suggestion
assignees: []

body:
  - type: input
    id: github_username
    attributes:
      label: Your GitHub Username
      placeholder: "@your-username"
    validations:
      required: true

  - type: input
    id: course
    attributes:
      label: Course Slug
      description: The course containing the video you want to suggest a replacement for
      placeholder: "git-mastery"
    validations:
      required: true

  - type: input
    id: chapter_id
    attributes:
      label: Chapter / Lesson ID
      description: Which chapter or lesson is the video in?
      placeholder: "ch-02 or lesson-3"
    validations:
      required: true

  - type: input
    id: current_url
    attributes:
      label: Current (dead/bad) video URL
      placeholder: "https://youtube.com/watch?v=..."
    validations:
      required: false

  - type: input
    id: suggested_url
    attributes:
      label: Suggested replacement URL
      placeholder: "https://youtube.com/watch?v=..."
    validations:
      required: true

  - type: input
    id: video_title
    attributes:
      label: Video title
      placeholder: "Git Internals — How Git Actually Works"
    validations:
      required: true

  - type: input
    id: duration
    attributes:
      label: Video duration
      placeholder: "e.g. 18:42"
    validations:
      required: false

  - type: textarea
    id: reason
    attributes:
      label: Why is this a good replacement?
      description: Explain why this video covers the topic well and is better than the current one
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have watched the full video and confirmed it is relevant to the chapter topic
          required: true
        - label: The video is in English or has English subtitles
          required: true
        - label: The video is freely accessible (not behind a paywall or login wall)
          required: true
