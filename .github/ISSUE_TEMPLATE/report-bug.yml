name: 🐛 Report a Bug
description: Report a bug in the course engine, grader, or workflow
title: "[Bug] Brief description"
labels:
  - bug
assignees: []

body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Enrollment workflow
        - Grading / autograder
        - Quiz engine
        - Certificate generation
        - Leaderboard
        - Dashboard
        - Plagiarism check
        - Course content / README
        - Website
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open PR with title...
        2. Label was added...
        3. Workflow ran and...
    validations:
      required: true

  - type: input
    id: run_url
    attributes:
      label: GitHub Actions run URL (if applicable)
      placeholder: "https://github.com/owner/repo/actions/runs/..."
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
    validations:
      required: false
