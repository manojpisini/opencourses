name: 🐛 Report a Bug
description: Report a bug in the course engine, grader, site, or workflow
title: "[Bug] @YOUR_USERNAME — brief description"
labels:
  - bug
assignees: []

body:
  - type: input
    id: github_username
    attributes:
      label: Your GitHub Username
      description: Your GitHub handle — helps us look up any related enrollment or submission context
      placeholder: "@your-username"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the platform is affected?
      options:
        - Enrollment workflow
        - Chapter test grader
        - Assignment / code grader
        - Certificate generation
        - Leaderboard
        - Course publish pipeline
        - Sync / data pipeline
        - Course content / README
        - Website
        - Other
    validations:
      required: true

  - type: input
    id: course
    attributes:
      label: Affected Course (if applicable)
      description: Leave blank if the bug is platform-wide and not course-specific
      placeholder: "git-mastery"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: What happened? What did you expect instead?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Opened an issue with the Chapter Test template
        2. Filled in course = git-mastery, test_id = ch-01-test
        3. Submitted — expected a result comment, got no response after 10 minutes
    validations:
      required: true

  - type: input
    id: run_url
    attributes:
      label: GitHub Actions run URL (if applicable)
      placeholder: "https://github.com/manojpisini/opencourses/actions/runs/..."
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
    validations:
      required: false
