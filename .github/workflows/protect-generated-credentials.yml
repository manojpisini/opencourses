name: Protect Generated Credentials

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  guard-generated-credentials:
    name: Generated credential guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Reject committed certificate outputs
        run: bun run scripts/guard-generated-credentials.ts
