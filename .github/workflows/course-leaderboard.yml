name: Rebuild Leaderboard

on:
  workflow_dispatch: {}
  schedule:
    - cron: '0 2 * * *'   # nightly at 02:00 UTC

permissions:
  contents: write
  issues: read

jobs:
  leaderboard:
    name: Rebuild leaderboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build leaderboard
        run: bun run scripts/leaderboard.ts
        working-directory: engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Commit
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add engine/LEADERBOARD.md site/src/data/leaderboard.json
          git diff --staged --quiet || git commit -m "leaderboard: nightly rebuild [skip ci]"
          git push
