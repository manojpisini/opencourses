name: Sync Site Data

on:
  workflow_run:
    workflows: ["Publish Course"]
    types: [completed]
  schedule:
    - cron: '0 3 * * *'   # nightly at 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  sync:
    name: Aggregate engine output → site JSON
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Sync site data
        run: bun run scripts/sync-site-data.ts
        working-directory: engine
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Commit updated data files
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add site/src/data/courses.json site/src/data/contributors.json \
                  site/src/data/activity.json site/src/data/graph.json \
                  site/src/data/changelog.json site/src/data/stats.json
          git diff --staged --quiet || git commit -m "data: sync site JSON from engine [skip ci]"
          git push
