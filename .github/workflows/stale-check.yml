name: Stale Check

on:
  schedule:
    - cron: '0 2 1 */3 *'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  stale:
    name: Flag stale enrollments
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Find and flag stale enrollments
        run: bun run scripts/cohort.ts --mode stale
        env:
          GITHUB_TOKEN: ${{ secrets.COURSE_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          STALE_DAYS: '90'
          CLOSE_AFTER_DAYS: '180'
