name: Grade Assignment / Project

on:
  issues:
    types: [opened, reopened]
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'engine/courses/**'

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  # ── Chapter assignment submission via GitHub Issue ───────────────────────────
  grade-chapter-assignment:
    name: Grade chapter assignment (issue)
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'assignment-submit')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.workspace }}

      - name: Parse submission details
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body       = context.payload.issue.body ?? '';
            const entered    = (body.match(/###\s+Your GitHub Username\s*\n+([^\n]+)/i)?.[1] ?? '').trim().replace(/^@+/, '').toLowerCase();
            const issueUser  = (context.payload.issue.user?.login ?? '').toLowerCase();
            if (!entered || entered !== issueUser) {
              core.setFailed(`Your GitHub Username must match the issue author. Entered "${entered || '(missing)'}", issue author "${issueUser}".`);
              return;
            }
            await github.rest.users.getByUsername({ username: entered });
            const course     = (body.match(/###\s+Course\s*(?:Slug)?\s*\n+([^\n]+)/i)?.[1] ?? '').trim().toLowerCase().replace(/\s+/g, '-');
            if (!course) {
              core.setFailed('Course Slug is required.');
              return;
            }
            const enrollments = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: `enrolled,course:${course}`,
              per_page: 100,
            });
            const enrolled = enrollments.data.some(issue => (issue.user?.login ?? '').toLowerCase() === entered);
            if (!enrolled) {
              core.setFailed(`@${entered} is not enrolled in ${course}. Enroll before submitting assignments.`);
              return;
            }
            const chapterId  = (body.match(/###\s+Chapter\s*(?:ID)?\s*\n+([^\n]+)/i)?.[1] ?? '').trim();
            const assignId   = (body.match(/###\s+Assignment\s*(?:ID)?\s*\n+([^\n]+)/i)?.[1] ?? '').trim();
            const repoLink   = (body.match(/###\s+Repository.*?\n+([^\n]+)/i)?.[1] ?? '').trim();
            core.setOutput('course', course);
            core.setOutput('chapter_id', chapterId);
            core.setOutput('assignment_id', assignId);
            core.setOutput('repo_link', repoLink);

      - name: Read assignment config from course.yaml
        id: config
        run: |
          # Extract the assignment definition (language + test generator/cases)
          # from the course.yaml so we can pass the right params to grade.sh.
          bun run - <<'EOF'
          import { parseCourseFile } from './lib/course-parser.ts';
          import * as fs from 'fs';
          const slug       = process.env['COURSE_SLUG']   ?? '';
          const assignId   = process.env['ASSIGNMENT_ID'] ?? '';
          const candidates = [`courses/${slug}/course.yaml`, `engine/courses/${slug}/course.yaml`];
          let course = null;
          for (const p of candidates) {
            if (fs.existsSync(p)) { course = parseCourseFile(p); break; }
          }
          const assign = course?.chapter_assignments?.find((a: {id:string}) => a.id === assignId);
          const lang     = assign?.language ?? 'python';
          const gen      = assign?.test_generator ?? '';
          const cases    = assign?.test_cases_file ?? '';
          const output = `language=${lang}\ntest_generator=${gen}\ntest_cases_file=${cases}\n`;
          fs.appendFileSync(process.env['GITHUB_OUTPUT'] ?? '/dev/null', output);
          EOF
        env:
          COURSE_SLUG: ${{ steps.parse.outputs.course }}
          ASSIGNMENT_ID: ${{ steps.parse.outputs.assignment_id }}

      - name: Build sandbox image
        run: docker build -t opencourse-sandbox -f sandbox/Dockerfile .

      - name: Clone student repo and run assignment tests in sandbox
        run: |
          WORK_DIR=$(mktemp -d)
          git clone --depth 1 "${{ steps.parse.outputs.repo_link }}" "$WORK_DIR/student" 2>/dev/null || true
          # Locate the student's primary source file (first .py/.js/.ts/.go/.java/.c/.cpp found)
          STUDENT_FILE=$(find "$WORK_DIR/student" -maxdepth 3 \
            \( -name "*.py" -o -name "*.js" -o -name "*.ts" -o -name "*.go" \
               -o -name "*.java" -o -name "*.c" -o -name "*.cpp" \) \
            ! -path "*/node_modules/*" ! -name "*.test.*" -print -quit 2>/dev/null || true)
          docker run \
            --network none \
            --memory 256m \
            --cpus 1 \
            --read-only \
            --tmpfs /tmp:size=100m \
            --user 1001:1001 \
            --security-opt no-new-privileges \
            -e LANGUAGE=${{ steps.config.outputs.language }} \
            -e STUDENT_CODE_FILE="/student/$(basename "${STUDENT_FILE:-main.py}")" \
            -e COURSE_DIR=/courses/${{ steps.parse.outputs.course }} \
            -e TEST_GENERATOR="${{ steps.config.outputs.test_generator }}" \
            -e TEST_CASES_FILE="${{ steps.config.outputs.test_cases_file }}" \
            -e TEST_OUTPUT_FILE=/tmp/test-results.json \
            -v $(pwd)/courses:/courses:ro \
            -v "$WORK_DIR/student":/student:ro \
            -v /tmp:/tmp \
            opencourse-sandbox
          cp /tmp/test-results.json . 2>/dev/null || echo '{"passed":false,"score":0,"maxScore":1,"tests":[]}' > test-results.json

      - name: Post grading report
        id: grade
        run: bun run scripts/grade.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          STUDENT: ${{ github.event.issue.user.login }}
          COURSE_SLUG: ${{ steps.parse.outputs.course }}
          PROJECT_ID: ${{ steps.parse.outputs.assignment_id }}
          TEST_OUTPUT_FILE: test-results.json
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Close issue on pass
        if: steps.grade.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed', state_reason: 'completed',
            });

      - name: Trigger leaderboard rebuild on pass
        if: steps.grade.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'course-leaderboard.yml', ref: 'main',
            });

  # ── Project submission via GitHub Issue ─────────────────────────────────────
  grade-issue:
    name: Grade project submission (issue)
    if: >
      github.event_name == 'issues' &&
      contains(github.event.issue.labels.*.name, 'project-submit')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.workspace }}

      - name: Parse submission details
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body   = context.payload.issue.body ?? '';
            const course = (body.match(/###\s+Course\s*\n+([^\n]+)/i)?.[1] ?? '').trim().toLowerCase().replace(/\s+/g, '-');
            const projId = (body.match(/###\s+Project ID\s*\n+([^\n]+)/i)?.[1] ?? '').trim();
            core.setOutput('course', course);
            core.setOutput('project_id', projId);

      - name: Build sandbox image
        run: |
          docker build -t opencourse-sandbox -f sandbox/Dockerfile .

      - name: Run project tests in sandbox
        run: |
          docker run \
            --network none \
            --memory 256m \
            --cpus 1 \
            --read-only \
            --tmpfs /tmp:size=100m \
            --user 1001:1001 \
            --security-opt no-new-privileges \
            -e COURSE_SLUG=${{ steps.parse.outputs.course }} \
            -e PROJECT_ID=${{ steps.parse.outputs.project_id }} \
            -e TEST_OUTPUT_FILE=/tmp/test-results.json \
            -v $(pwd):/workspace:ro \
            -v /tmp:/tmp \
            opencourse-sandbox
          cp /tmp/test-results.json . 2>/dev/null || echo '{"passed":false,"score":0,"maxScore":1,"tests":[]}' > test-results.json

      - name: Post grading report
        id: grade
        run: bun run scripts/grade.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
          STUDENT: ${{ github.event.issue.user.login }}
          COURSE_SLUG: ${{ steps.parse.outputs.course }}
          PROJECT_ID: ${{ steps.parse.outputs.project_id }}
          TEST_OUTPUT_FILE: test-results.json
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Close issue on pass
        if: steps.grade.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed', state_reason: 'completed',
            });

      - name: Trigger leaderboard rebuild on pass
        if: steps.grade.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'course-leaderboard.yml', ref: 'main',
            });


  # ── Manual project review trigger (PR path) ─────────────────────────────────
  grade-pr:
    name: Grade project submission (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout student fork
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.workspace }}

      - name: Parse PR title for course/project
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const title  = context.payload.pull_request.title ?? '';
            // Expected: "[Project] @student — git-mastery/project-01"
            const match  = title.match(/\[Project\].*?(\S+)\/(\S+)$/i);
            const course = match?.[1] ?? '';
            const projId = match?.[2] ?? '';
            core.setOutput('course', course);
            core.setOutput('project_id', projId);

      - name: Build sandbox and run tests
        run: |
          docker build -t opencourse-sandbox -f sandbox/Dockerfile .
          docker run \
            --network none --memory 256m --cpus 1 \
            --read-only --tmpfs /tmp:size=100m \
            --user 1001:1001 --security-opt no-new-privileges \
            -e COURSE_SLUG=${{ steps.parse.outputs.course }} \
            -e PROJECT_ID=${{ steps.parse.outputs.project_id }} \
            -e TEST_OUTPUT_FILE=/tmp/test-results.json \
            -v $(pwd):/workspace:ro -v /tmp:/tmp \
            opencourse-sandbox
          cp /tmp/test-results.json . 2>/dev/null || echo '{"passed":false,"score":0,"maxScore":1,"tests":[]}' > test-results.json

      - name: Post grading report
        id: grade
        run: bun run scripts/grade.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STUDENT: ${{ github.event.pull_request.user.login }}
          COURSE_SLUG: ${{ steps.parse.outputs.course }}
          PROJECT_ID: ${{ steps.parse.outputs.project_id }}
          TEST_OUTPUT_FILE: test-results.json
          GITHUB_RUN_ID: ${{ github.run_id }}
