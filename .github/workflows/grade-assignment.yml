name: Grade Assignment

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'engine/curriculum/**'

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    outputs:
      valid: ${{ steps.validate.outputs.valid }}
      stage: ${{ steps.validate.outputs.stage }}
      student: ${{ steps.validate.outputs.student }}
      attempt: ${{ steps.validate.outputs.attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate PR
        id: validate
        run: bun run scripts/validate.ts --mode pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  grade:
    name: Run grader in sandbox
    needs: validate
    if: needs.validate.outputs.valid == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout student fork
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build sandbox image
        run: docker build -t opencourse-sandbox -f sandbox/Dockerfile .

      - name: Run grader in sandbox
        run: |
          docker run \
            --network none \
            --memory 128m \
            --cpus 0.5 \
            --read-only \
            --tmpfs /tmp:size=50m \
            --user 1001:1001 \
            --security-opt no-new-privileges \
            -e STAGE=${{ needs.validate.outputs.stage }} \
            -e TEST_OUTPUT_FILE=/tmp/test-results.json \
            -v $(pwd):/workspace:ro \
            -v /tmp:/tmp \
            opencourse-sandbox
          cp /tmp/test-results.json .

      - name: Parse and post grading report
        id: grade
        run: bun run scripts/grade.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          STUDENT: ${{ needs.validate.outputs.student }}
          STAGE: ${{ needs.validate.outputs.stage }}
          ATTEMPT: ${{ needs.validate.outputs.attempt }}
          TEST_OUTPUT_FILE: test-results.json
          GITHUB_RUN_ID: ${{ github.run_id }}

      - name: Merge PR on pass
        if: steps.grade.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash',
              commit_title: `✅ Stage ${{ needs.validate.outputs.stage }} — @${{ needs.validate.outputs.student }} [skip ci]`
            });

      - name: Trigger stage advancement on pass
        if: steps.grade.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'advance-stage.yml',
              ref: 'main',
              inputs: {
                student: '${{ needs.validate.outputs.student }}',
                stage:   '${{ needs.validate.outputs.stage }}',
                trigger: 'assignment',
                score:   '${{ steps.grade.outputs.percentage }}'
              }
            });

      - name: Commit audit log
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add engine/audit/log.jsonl
          git diff --staged --quiet || git commit -m "audit: grade by ${{ needs.validate.outputs.student }} [skip ci]"
          git push
        working-directory: ${{ github.workspace }}
