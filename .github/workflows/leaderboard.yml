name: Rebuild Leaderboard

on:
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  leaderboard:
    name: Rebuild LEADERBOARD.md
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_BOT_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Rebuild leaderboard
        run: bun run scripts/leaderboard.ts --mode full-rebuild
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Commit leaderboard
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add engine/LEADERBOARD.md
          git diff --staged --quiet || git commit -m "chore: rebuild leaderboard [skip ci]"
          git push
        working-directory: ${{ github.workspace }}
