name: Rebuild Dashboard

on:
  schedule:
    - cron: '0 1 * * 1'   # every Monday at 01:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: read

jobs:
  dashboard:
    name: Rebuild DASHBOARD.md
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_BOT_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Rebuild instructor dashboard
        run: bun run scripts/dashboard.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Commit dashboard
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add engine/DASHBOARD.md
          git diff --staged --quiet || git commit -m "chore: rebuild instructor dashboard [skip ci]"
          git push
        working-directory: ${{ github.workspace }}
