name: Course Enrollment

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  contents: write

jobs:
  enroll:
    name: Process enrollment
    # Trigger when the issue has the enrollment-request label (set by the issue template)
    if: contains(github.event.issue.labels.*.name, 'enrollment-request')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.workspace }}

      - name: Process enrollment
        run: bun run scripts/enroll.ts
        env:
          GITHUB_TOKEN: ${{ secrets.COURSE_BOT_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
