name: Refresh Site Data

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Fetch GitHub data & rebuild search index
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_BOT_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Fetch GitHub stats & contributor data
        run: node scripts/fetch-github-data.js
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ORG: ${{ github.repository_owner }}

      - name: Build search index
        run: node scripts/build-search-index.js

      - name: Commit updated data
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add src/data/ public/search-index.json
          git diff --staged --quiet || git commit -m "chore: refresh site data [skip ci]"
          git push
        working-directory: ${{ github.workspace }}
