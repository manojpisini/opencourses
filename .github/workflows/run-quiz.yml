name: Run Quiz

on:
  issues:
    types: [labeled]

permissions:
  issues: write
  contents: write

jobs:
  quiz:
    name: Grade quiz submission
    if: github.event.label.name == 'quiz-attempt'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_BOT_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Grade quiz
        id: quiz
        run: bun run scripts/quiz-engine.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STUDENT: ${{ github.event.issue.user.login }}
          STAGE: '01'
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Trigger stage advancement on pass
        if: steps.quiz.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'advance-stage.yml', ref: 'main',
              inputs: {
                student: '${{ github.event.issue.user.login }}',
                stage: '01', trigger: 'quiz',
                score: '${{ steps.quiz.outputs.score }}'
              }
            });

      - name: Close quiz issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              state: 'closed',
              state_reason: 'completed'
            });

      - name: Commit audit log
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add engine/audit/log.jsonl
          git diff --staged --quiet || git commit -m "audit: quiz by ${{ github.event.issue.user.login }} [skip ci]"
          git push
        working-directory: ${{ github.workspace }}
