name: Grade Quiz / Chapter Test / Final Test

# Triggered when a student opens a quiz-submit or final-test issue.
# Objective questions (MCQ, multi, true-false, short) are graded inline.
# Code questions are graded in an isolated Docker sandbox with static or
# dynamically-generated test cases (no AI, no static answer lookup).
#
# On final-test pass: certificate generation is dispatched automatically.
# On chapter-test pass: leaderboard is rebuilt.

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  contents: write

jobs:
  # ── Chapter test grading ─────────────────────────────────────────────────────
  quiz:
    name: Grade chapter test submission
    if: contains(github.event.issue.labels.*.name, 'quiz-submit')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.workspace }}

      # Build the grading sandbox image.
      # This is a no-op cost if the quiz has no code questions, but
      # we build unconditionally to keep the workflow simple.
      - name: Build grading sandbox
        run: docker build -t opencourse-sandbox -f sandbox/Dockerfile ..

      - name: Grade quiz
        id: quiz
        run: bun run scripts/quiz-engine.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STUDENT: ${{ github.event.issue.user.login }}
          SANDBOX_IMAGE: opencourse-sandbox
          COURSE_DIR: engine/courses

      - name: Trigger leaderboard rebuild on pass
        if: steps.quiz.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'course-leaderboard.yml',
              ref: 'main',
            });

  # ── Final test grading ───────────────────────────────────────────────────────
  final-test:
    name: Grade final test submission
    if: contains(github.event.issue.labels.*.name, 'final-test')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.workspace }}

      - name: Build grading sandbox
        run: docker build -t opencourse-sandbox -f sandbox/Dockerfile ..

      - name: Grade final test
        id: final
        run: bun run scripts/quiz-engine.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STUDENT: ${{ github.event.issue.user.login }}
          SANDBOX_IMAGE: opencourse-sandbox
          COURSE_DIR: engine/courses
          TEST_TYPE: final               # quiz-engine reads this to use final_test section

      - name: Parse course slug from issue body
        id: parse
        if: steps.final.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body   = context.payload.issue.body ?? '';
            const course = (body.match(/###\s+Course\s*(?:Slug)?\s*\n+([^\n]+)/i)?.[1] ?? '').trim().toLowerCase().replace(/\s+/g, '-');
            const student = context.payload.issue.user.login;
            core.setOutput('course', course);
            core.setOutput('student', student);

      - name: Trigger certificate generation on pass
        if: steps.final.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'issue-cert.yml',
              ref: 'main',
              inputs: {
                student: '${{ steps.parse.outputs.student }}',
                course:  '${{ steps.parse.outputs.course }}',
              },
            });

      - name: Trigger leaderboard rebuild on pass
        if: steps.final.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'course-leaderboard.yml',
              ref: 'main',
            });

