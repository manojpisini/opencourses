name: Grade Quiz / Chapter Test

# Triggered when a student opens a quiz-submit issue.
# Objective questions (MCQ, multi, true-false, short) are graded inline.
# Code questions are graded in an isolated Docker sandbox with static or
# dynamically-generated test cases (no AI, no static answer lookup).

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  contents: write

jobs:
  quiz:
    name: Grade quiz submission
    if: contains(github.event.issue.labels.*.name, 'quiz-submit')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.workspace }}

      # Build the grading sandbox image.
      # This is a no-op cost if the quiz has no code questions, but
      # we build unconditionally to keep the workflow simple.
      - name: Build grading sandbox
        run: docker build -t opencourse-sandbox -f sandbox/Dockerfile ..

      - name: Grade quiz
        id: quiz
        run: bun run scripts/quiz-engine.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STUDENT: ${{ github.event.issue.user.login }}
          SANDBOX_IMAGE: opencourse-sandbox
          COURSE_DIR: engine/courses

      - name: Trigger leaderboard rebuild on pass
        if: steps.quiz.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'course-leaderboard.yml',
              ref: 'main',
            });

      - name: Commit audit log
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add engine/audit/log.jsonl
          git diff --staged --quiet || git commit -m "audit: quiz by ${{ github.event.issue.user.login }} [skip ci]"
          git push
        working-directory: ${{ github.workspace }}
