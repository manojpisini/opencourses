name: Grade Quiz / Chapter Test

on:
  issues:
    types: [opened, reopened]

permissions:
  issues: write
  contents: write

jobs:
  quiz:
    name: Grade quiz submission
    # Triggered when a quiz-submit issue is opened
    if: contains(github.event.issue.labels.*.name, 'quiz-submit')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install
        working-directory: ${{ github.workspace }}

      - name: Grade quiz
        id: quiz
        run: bun run scripts/quiz-engine.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STUDENT: ${{ github.event.issue.user.login }}

      - name: Trigger leaderboard rebuild on pass
        if: steps.quiz.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              workflow_id: 'course-leaderboard.yml',
              ref: 'main',
            });

      - name: Commit audit log
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add engine/audit/log.jsonl
          git diff --staged --quiet || git commit -m "audit: quiz by ${{ github.event.issue.user.login }} [skip ci]"
          git push
        working-directory: ${{ github.workspace }}
