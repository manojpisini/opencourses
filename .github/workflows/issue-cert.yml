name: Issue Certificate

on:
  workflow_dispatch:
    inputs:
      student:
        description: 'GitHub username'
        required: true
      course:
        description: 'Course slug'
        required: true
        default: 'llm-engineering'

permissions:
  contents: write
  issues: write
  id-token: write
  attestations: write

jobs:
  certify:
    name: Generate & publish certificate for @${{ inputs.student }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_BOT_TOKEN || github.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Resolve course slug
        id: course
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            function normalize(value) {
              return value.trim().toLowerCase().replace(/\s+/g, '-');
            }

            function distance(a, b) {
              const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
              for (let i = 0; i <= a.length; i++) dp[i][0] = i;
              for (let j = 0; j <= b.length; j++) dp[0][j] = j;
              for (let i = 1; i <= a.length; i++) {
                for (let j = 1; j <= b.length; j++) {
                  const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                  dp[i][j] = Math.min(
                    dp[i - 1][j] + 1,
                    dp[i][j - 1] + 1,
                    dp[i - 1][j - 1] + cost,
                  );
                }
              }
              return dp[a.length][b.length];
            }

            const requested = normalize('${{ inputs.course }}');
            const coursesDir = path.join(process.env.GITHUB_WORKSPACE, 'engine', 'courses');
            const slugs = fs.readdirSync(coursesDir, { withFileTypes: true })
              .filter((entry) => entry.isDirectory())
              .map((entry) => entry.name)
              .filter((slug) => fs.existsSync(path.join(coursesDir, slug, 'course.yaml')) && slug !== 'template');

            let resolved = slugs.find((slug) => slug === requested);
            if (!resolved) {
              const ranked = slugs
                .map((slug) => ({ slug, score: distance(requested, slug) }))
                .sort((a, b) => a.score - b.score);
              const best = ranked[0];
              if (best) {
                const threshold = Math.min(3, Math.max(1, Math.floor(best.slug.length * 0.25)));
                if (best.score <= threshold) {
                  resolved = best.slug;
                  core.warning(`Course slug "${requested}" was corrected to "${resolved}".`);
                }
              }
            }

            if (!resolved) {
              core.setFailed(`Course "${requested}" was not found. Available courses: ${slugs.join(', ') || '(none)'}`);
              return;
            }

            core.setOutput('slug', resolved);

      - name: Install system deps (GPG + Puppeteer)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gnupg2 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libgbm1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2
          sudo apt-get install -y --no-install-recommends libasound2t64 \
            || sudo apt-get install -y --no-install-recommends libasound2
        working-directory: ${{ github.workspace }}

      - name: Import GPG signing key
        run: |
          if [ -n "$GPG_KEY" ]; then
            echo "$GPG_KEY" | base64 -d | gpg --batch --import
          fi
        env:
          GPG_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        working-directory: ${{ github.workspace }}

      - name: Install dependencies
        run: bun install

      - name: Start with empty generated credential output
        run: rm -rf dist/certs

      - name: Find enrollment issue number
        id: find_issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN || github.token }}
          script: |
            const student = '${{ inputs.student }}'.trim().replace(/^@+/, '').toLowerCase();
            const course = '${{ steps.course.outputs.slug }}';
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'all', labels: `enrolled,course:${course}`,
              per_page: 100
            });
            const issue = issues.find(i => (i.user?.login ?? '').toLowerCase() === student);
            return issue?.number ?? 0;

      - name: Stop if enrollment record is missing
        if: steps.find_issue.outputs.result == '0'
        run: |
          echo "No enrollment issue found for @${{ inputs.student }} in ${{ steps.course.outputs.slug }}"
          exit 1

      - name: Generate certificate
        run: bun run scripts/certify.ts
        env:
          GITHUB_TOKEN: ${{ secrets.COURSE_BOT_TOKEN || github.token }}
          REPO: ${{ github.repository }}
          SITE_URL: https://manojpisini.github.io/opencourses
          STUDENT: ${{ inputs.student }}
          COURSE: ${{ steps.course.outputs.slug }}
          ISSUE_NUMBER: ${{ steps.find_issue.outputs.result }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Attest generated credential assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: engine/dist/certs/*

      - name: Add certified label to enrollment issue
        if: steps.find_issue.outputs.result != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN || github.token }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ steps.find_issue.outputs.result }},
              labels: ['certified']
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ steps.find_issue.outputs.result }},
              state: 'closed', state_reason: 'completed'
            });
