name: Issue Certificate

on:
  workflow_dispatch:
    inputs:
      student:
        description: 'GitHub username'
        required: true
      course:
        description: 'Course slug'
        required: true
        default: 'git-mastery'

permissions:
  contents: write
  issues: write

jobs:
  certify:
    name: Generate & publish certificate for @${{ inputs.student }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_BOT_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install system deps (GPG + Puppeteer)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends gnupg2 libatk-bridge2.0-0 libdrm2 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 libxkbcommon0 libasound2
        working-directory: ${{ github.workspace }}

      - name: Import GPG signing key
        run: |
          if [ -n "$GPG_KEY" ]; then
            echo "$GPG_KEY" | base64 -d | gpg --batch --import
          fi
        env:
          GPG_KEY: ${{ secrets.GPG_SIGNING_KEY }}
        working-directory: ${{ github.workspace }}

      - name: Install dependencies
        run: bun install

      - name: Find enrollment issue number
        id: find_issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'enrolled',
              per_page: 100
            });
            const issue = issues.find(i =>
              i.user?.login === '${{ inputs.student }}' ||
              i.title.toLowerCase().includes('@${{ inputs.student }}')
            );
            return issue?.number ?? 0;

      - name: Generate certificate
        run: bun run scripts/certify.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          STUDENT: ${{ inputs.student }}
          COURSE: ${{ inputs.course }}
          ISSUE_NUMBER: ${{ steps.find_issue.outputs.result }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}

      - name: Add certified label to enrollment issue
        if: steps.find_issue.outputs.result != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ steps.find_issue.outputs.result }},
              labels: ['certified']
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: ${{ steps.find_issue.outputs.result }},
              state: 'closed', state_reason: 'completed'
            });

