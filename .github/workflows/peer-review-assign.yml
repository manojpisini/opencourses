name: Peer Review Assign

on:
  pull_request:
    types: [labeled]
    paths:
      - 'engine/curriculum/**'

permissions:
  pull-requests: write
  issues: read
  contents: read

jobs:
  assign:
    name: Assign peer reviewers
    if: github.event.label.name == 'needs-peer-review'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Assign peer reviewers
        id: assign
        run: bun run scripts/cohort.ts --mode peer-assign
        env:
          GITHUB_TOKEN: ${{ secrets.COURSE_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PEER_COUNT: '2'

      - name: Post assignment comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const reviewers = `${{ steps.assign.outputs.reviewers }}`;
            const deadline = '${{ steps.assign.outputs.deadline }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 👥 Peer Review Assigned\n\n${reviewers}\n\n**Review deadline:** ${deadline}\n\nReviewers: submit your feedback within 72 hours.`
            });
