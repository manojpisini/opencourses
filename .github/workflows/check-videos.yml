name: Check Videos

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    name: Validate all YouTube video URLs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate video URLs
        id: validate
        run: bun run scripts/validate-videos.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}

      - name: Open issue if dead videos found
        if: steps.validate.outputs.dead_count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deadCount = '${{ steps.validate.outputs.dead_count }}';
            const report = `${{ steps.validate.outputs.report }}`;
            const today = new Date().toISOString().split('T')[0];
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo,
              labels: 'dead-video', state: 'open'
            });
            const body = `## 📺 Dead Videos Detected — ${today}\n\n${deadCount} video${deadCount !== '1' ? 's are' : ' is'} no longer accessible.\n\n${report}\n\n### Action Required\nFind replacement videos and open PRs updating the meta.yaml files.\nUse the [Suggest Video](../../issues/new?template=suggest-video.yml) issue template.`;
            if (issues.data.length > 0) {
              await github.rest.issues.update({ owner: context.repo.owner, repo: context.repo.repo, issue_number: issues.data[0].number, body });
            } else {
              await github.rest.issues.create({ owner: context.repo.owner, repo: context.repo.repo, title: `📺 Dead Videos Detected — ${today}`, body, labels: ['dead-video', 'content-fix'] });
            }
