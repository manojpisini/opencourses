  - question_id: ctest-ch-08-s-01-q-01
    type: mcq
    points: 8
    difficulty: medium
    answer: 1
    explanation: |
      TTFT (Time to First Token) is the latency from when a request is sent until
      the first token of the response begins streaming back to the user. In streaming
      interfaces, users perceive responsiveness immediately when text starts appearing —
      a 200ms TTFT feels responsive even if total generation takes 10 seconds.

      For batch processing (Option A), total throughput matters more than TTFT —
      no user is watching a progress bar.
      For embeddings (Option C), there is no generation — TTFT is irrelevant.
      For fine-tuning (Option D), TTFT has no meaning in training.

  - question_id: ctest-ch-08-s-01-q-02
    type: mcq
    points: 8
    difficulty: hard
    answer: 1
    explanation: |
      In a RAG system connected to the internet, the retrieval step fetches
      external web pages. An attacker who controls a web page can embed malicious
      instructions that the retrieval system returns to the agent. The agent
      then treats these instructions as trusted context and may execute them —
      forwarding data, calling dangerous APIs, or modifying its behaviour.

      This is more dangerous than direct injection because:
      1. The attacker doesn't need to interact with your system directly
      2. Automated crawling/retrieval triggers the attack without any user action
      3. The injected content appears as "retrieved facts" which models tend to trust

      Option A (long prompts) is a DoS/cost concern, not a security threat.
      Option C (model extraction) requires thousands of queries and is a different
      category of attack.
      Option D (DoS via identical queries) is a performance issue, not security.

  - question_id: ctest-ch-08-s-01-q-03
    type: short
    points: 15
    difficulty: hard
    sample_answer: |
      I would alert on three primary metrics. First, P95 TTFT — if latency degrades
      suddenly, it indicates either infrastructure problems (GPU utilisation spike,
      network issues) or a model change that increased compute. Second, guardrail
      trigger rate — a sudden increase in safety guardrail activations suggests
      either adversarial probing or a model regression that produces more unsafe
      outputs. Third, faithfulness score (sampled hourly) — a drop in faithfulness
      indicates either retrieval degradation or a model producing more hallucinations.
      For distinguishing model regression from infrastructure problems: infrastructure
      issues typically affect TTFT and throughput uniformly across all request types,
      while model regressions typically affect quality metrics (faithfulness, refusal
      rate) without changing latency. A useful canary is to run a fixed synthetic
      benchmark (the same 20 evaluation questions) after every deployment — if those
      scores drop but latency is stable, it's a model issue; if latency spikes but
      quality scores are unchanged, it's infrastructure.
    keywords:
      - "TTFT"
      - "guardrail"
      - "faithfulness"
      - "latency"
      - "regression"
      - "baseline"
      - "canary"
      - "infrastructure"
    grading_rubric:
      - criterion: "Identifies 3 meaningful, distinct alert metrics"
        points: 5
      - criterion: "Distinguishes model regression from infra problem correctly"
        points: 5
      - criterion: "Proposes a canary/baseline strategy for deployment verification"
        points: 3
      - criterion: "Threshold strategy mentioned (P95, hourly sampling, etc.)"
        points: 2
    explanation: |
      Strong answers identify the key diagnostic distinction:
      - Infrastructure issues: latency degrades, quality unchanged
      - Model regressions: quality degrades, latency unchanged (or sometimes improves)

      Canary deployments (running a fixed eval suite after each update) are
      the production standard for catching regressions before they reach users.


