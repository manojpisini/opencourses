    type: truefalse
    points: 5
    difficulty: easy
    answer: true
    explanation: |
      TRUE. LangGraph is explicitly designed around a state machine abstraction:
      - Nodes are Python functions (or chains) that process the current state
      - Edges define control flow — which node executes next
      - Conditional edges (like should_continue) allow branching based on state
      - The graph is compiled into an executable that manages state transitions

      This is different from sequential chains (like LangChain Expression Language
      chains) which run linearly. LangGraph's graph structure naturally represents
      the looping, branching control flow that agents require.

