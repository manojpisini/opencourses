  # ── Section 1: RAG Theory and Design ─────────────────────────────────────

  - question_id: ctest-ch-05-s-01-q-01
    type: mcq
    points: 8
    difficulty: medium
    answer: 1
    explanation: |
      The key advantage here is FRESHNESS combined with update cost.

      The internal wiki is updated daily with new pages. RAG allows you to:
      1. Index new pages immediately (re-embed + add to vector store)
      2. Query against the latest knowledge without any model changes

      Fine-tuning would require:
      1. Daily training runs (expensive GPU compute + time)
      2. Waiting for training + evaluation before deployment
      3. Risk of catastrophic forgetting of other knowledge

      Option A is a false absolute — RAG doesn't always produce higher quality.
      Option C is wrong — RAG serving cost is similar; training cost comparison
      favours RAG for frequent updates.
      Option D is wrong — fine-tuning absolutely can learn from documents.

  - question_id: ctest-ch-05-s-01-q-02
    type: mcq
    points: 8
    difficulty: hard
    answer: 1
    explanation: |
      Dense retrieval (embedding models) encodes semantic meaning — two phrases
      that mean the same thing have similar embeddings. But this semantic
      compression can fail for:
      - Exact product codes: "SKU-AX29381" — no semantic meaning, must match exactly
      - Proper nouns / names: "Anthropic" or "Dario Amodei" — embeddings may not
        preserve distinguishing power vs similar names
      - Rare technical terms: a newly coined acronym not in the embedding model's
        training data

      BM25 (sparse) uses exact token matching (TF-IDF variant) — it finds documents
      containing exactly those terms, regardless of semantic meaning.

      Hybrid search (dense + sparse via RRF or linear combination) gets semantic
      understanding AND exact keyword matching.

      Option A is sometimes true but not the main advantage.
      Option C is wrong — BM25 requires an inverted index.
      Option D is wrong — dense models can handle long documents (with chunking).

  - question_id: ctest-ch-05-s-01-q-03
    type: truefalse
    points: 5
    difficulty: medium
    answer: false
    explanation: |
      FALSE. RAGAS defines faithfulness as: "Is the answer supported by the
      retrieved context?" — it measures whether claims in the generated answer
      are grounded in the provided context chunks.

      Faithfulness is NOT a comparison to a ground-truth answer. It measures
      hallucination: did the LLM make up claims not supported by its context?

      The metric that measures similarity to a ground-truth answer is
      "answer_correctness" in RAGAS. "answer_relevancy" measures whether the
      answer addresses the question (regardless of ground truth).

      RAGAS metric definitions:
      - faithfulness: answer grounded in context? (0 = hallucinated, 1 = grounded)
      - answer_relevancy: does the answer address the question?
      - context_recall: does the retrieved context contain the information needed?
      - answer_correctness: how close is the answer to the gold answer?

  # ── Section 2: Practical RAG ──────────────────────────────────────────────

  - question_id: ctest-ch-05-s-02-q-01
    type: short
    points: 15
    difficulty: hard
    sample_answer: |
      High context_recall (90%) with low faithfulness (55%) indicates that the
      retrieval component is working well — it is finding the relevant documents
      90% of the time — but the generation component is hallucinating: the LLM
      is making claims not supported by the retrieved context it was given.
      This is a generation problem, not a retrieval problem. To fix this, I would
      first tighten the generation prompt to explicitly instruct the model to
      answer only from the provided context and to say "I don't know" if the
      context doesn't contain the answer. I would also reduce the generation
      temperature to 0 (greedy) to minimise creative extrapolation. If hallucination
      persists, I would experiment with a stronger base model or add an output
      validation step that cross-checks each claim in the answer against the context.
    keywords:
      - "retrieval"
      - "generation"
      - "hallucination"
      - "grounding"
      - "prompt"
      - "context"
      - "LLM"
    grading_rubric:
      - criterion: "Correctly diagnoses: retrieval good, generation hallucinating"
        points: 5
      - criterion: "Proposes prompt-level fix (instruct to stay grounded)"
        points: 4
      - criterion: "Proposes at least one additional concrete fix"
        points: 3
      - criterion: "Correctly interprets RAGAS metric definitions"
        points: 3
    explanation: |
      The diagnostic pattern here is important:
      - High context_recall = retriever is finding relevant chunks = retrieval is fine
      - Low faithfulness = LLM is making unsupported claims = LLM is hallucinating

      Common wrong answers: students often think high context_recall but low
      faithfulness means the context is irrelevant (it isn't — that would be
      low context_recall). The distinction is: context_recall measures whether
      the right information was retrieved; faithfulness measures whether the
      LLM's answer is grounded in what was retrieved.


