# ════════════════════════════════════════════════════════════════════════════
# CHAPTER 1 TEST SOLUTIONS  —  ctest-ch-01
# ════════════════════════════════════════════════════════════════════════════

  # ── Section 1: Conceptual Understanding ──────────────────────────────────

  - question_id: ctest-ch-01-s-01-q-01
    type: mcq
    points: 5
    difficulty: easy
    answer: 2
    explanation: |
      BPE tokenizers handle out-of-vocabulary words by decomposing them into
      known subword tokens using the merge table learned during training.
      For example, the word "tokenisation" (British spelling) might be split
      into ["token", "isation"] or ["token", "is", "ation"] depending on the
      vocabulary. The [UNK] approach is used in older word-level tokenizers
      (like early BERT variants), not modern BPE implementations. Modern
      BPE starts from bytes (0–255), so it can represent ANY text — no token
      is truly unknown.

      Option A (UNK token) is incorrect — BPE never produces UNK for normal text.
      Option B (exception) is incorrect — BPE is designed for open-vocabulary use.
      Option D (Levenshtein distance) is incorrect — there is no fuzzy matching in BPE.

  - question_id: ctest-ch-01-s-01-q-02
    type: mcq
    points: 5
    difficulty: medium
    answer: 1
    explanation: |
      In high-dimensional spaces, the dot product Q·K^T grows proportionally to
      the dimensionality d_k. Specifically, if Q and K have components drawn from
      N(0,1), then Q·K has variance d_k. With d_k=64, the standard deviation of
      dot products is 8 — values can range from roughly -24 to +24. Pushing these
      into softmax causes the softmax to become extremely peaked (one-hot), and
      the gradient of softmax → 0 in saturated regions.

      Dividing by √d_k (8 for d_k=64) normalises the variance back to 1, keeping
      softmax in a well-behaved gradient region.

      Option A is partially correct (it does stabilise variance) but "unit variance"
      is too specific — the goal is preventing saturation, not exactly unit variance.
      Options C and D are incorrect — the scaling has nothing to do with hardware
      or the sum target of attention weights.

  - question_id: ctest-ch-01-s-01-q-03
    type: mcq
    points: 5
    difficulty: medium
    answer: 1
    explanation: |
      Calculation:
        Per-token KV memory = layers × KV_heads × d_head × 2 (K+V) × bytes_per_element
        = 32 × 8 × 128 × 2 × 2 (fp16 = 2 bytes)
        = 32 × 8 × 128 × 4
        = 131,072 bytes = 128 KB per token

        For 10 requests × 1000 tokens:
        = 10,000 tokens × 128 KB = 1,280,000 KB = ~1.28 GB

      Option A (128 MB) is off by 10× — it ignores the 10 requests.
      Option B (640 MB) is off by 2× — possibly forgot to count both K and V.
      Option D (10 GB) is too high — possibly used fp32 (4 bytes) instead of fp16.

  - question_id: ctest-ch-01-s-01-q-04
    type: truefalse
    points: 3
    difficulty: easy
    answer: false
    explanation: |
      FALSE. RoPE (Rotary Position Embeddings) encodes RELATIVE positional
      information by rotating the query and key vectors in complex space before
      computing attention. It does NOT add a fixed sinusoidal signal to embeddings.

      The sinusoidal approach (adding positional signals to embeddings directly)
      is the original Vaswani et al. 2017 method. RoPE (Su et al., 2021) is
      fundamentally different: it applies a rotation matrix to Q and K that
      encodes the position difference between tokens — so the dot product Q·K
      naturally captures relative position.

      RoPE's advantages: it generalises to longer sequences (with techniques like
      YaRN or RoPE scaling) and requires no extra parameters.

  - question_id: ctest-ch-01-s-01-q-05
    type: truefalse
    points: 3
    difficulty: medium
    answer: true
    explanation: |
      TRUE. Multi-head attention with H heads does NOT add parameters compared to
      single-head attention — it rearranges how the same number of parameters
      are used.

      For d_model=512, n_heads=8, d_head=64:
      - Single-head: W_Q [512×512], W_K [512×512], W_V [512×512] = 786,432 params
      - Multi-head: W_Q [512×512] (split into 8 heads of [512×64] each) = same
        W_K [512×512], W_V [512×512] — still 786,432 params

      The W_O output projection [512×512] is also the same in both cases.
      Total: 4 × 512² = 1,048,576 params in both configurations.

      The multi-head mechanism is a reorganisation of computation, not an increase
      in parameters.

  # ── Section 2: Code Reading ───────────────────────────────────────────────

  - question_id: ctest-ch-01-s-02-q-01
    type: code_output
    points: 8
    difficulty: medium
    answer: 1
    explanation: |
      Execution trace:
      1. q shape: [B, H, T, D] = [2, 8, 16, 64]
      2. k.transpose(-2, -1): [2, 8, 64, 16]
      3. q @ k.transpose(-2, -1): [2, 8, 16, 16] — each query attends to all keys
      4. / (D ** 0.5) = / 8.0 — scalar division, shape unchanged
      5. F.softmax(scores, dim=-1): shape unchanged [2, 8, 16, 16]
      6. print(attn_weights.shape) → torch.Size([2, 8, 16, 16])

      Option A [2,8,64,64] is wrong — D is the head dimension, not sequence length.
      Option C [2,16,8,8] is wrong — the batch and head dimensions are transposed.
      Option D [2,8,16,64] is wrong — that would be the shape of Q, not attention weights.

      Key insight: attention weights are [B, H, T, T] — each of H heads produces a
      T×T matrix where entry (i,j) is the weight token i gives to token j.

  - question_id: ctest-ch-01-s-02-q-02
    type: code_fix
    points: 8
    difficulty: hard
    correct_code: |
      import torch
      T = 6
      # FIXED: triu mask with diagonal=1 marks future positions as True
      # masked_fill sets those True positions to -inf (attend to nothing)
      mask = torch.triu(torch.ones(T, T), diagonal=1).bool()
      scores = torch.randn(1, T, T)
      scores = scores.masked_fill(mask, float('-inf'))
      print(scores)
    bugs_fixed:
      - id: bug-01
        description: "Wrong mask: tril instead of triu, and wrong application.
          The original code uses tril (lower triangle = True), which when passed
          to masked_fill sets the PAST and CURRENT positions to -inf, leaving
          FUTURE positions unmasked. This is the opposite of causal masking."
        original: "mask = torch.tril(torch.ones(T, T)).bool()"
        fixed: "mask = torch.triu(torch.ones(T, T), diagonal=1).bool()"
        note: |
          Two equivalent approaches:
          1. triu with diagonal=1 (upper triangle, excluding diagonal) → marks future tokens
          2. tril with diagonal=0 (lower triangle, including diagonal) → marks past+current,
             then pass ~mask to masked_fill (inverted mask)

          The original code used tril (which marks past+current) and directly masked_fill
          those as -inf, blocking attention to the past — completely wrong for causal LMs.
    grading_rubric:
      - criterion: "Correctly identifies tril vs triu error"
        points: 4
      - criterion: "Corrected code produces -inf only for future tokens (j > i)"
        points: 4
    explanation: |
      A causal mask for autoregressive generation must ensure token i can attend to
      tokens 0..i but NOT to tokens i+1..T-1 (future tokens).

      The upper triangular matrix (triu with diagonal=1) has True values above the
      diagonal — exactly the future positions. When masked_fill replaces True positions
      with -inf, those future attention scores become -inf → softmax gives them weight 0.

      The original code used tril (lower triangle = True = past tokens) and masked those
      to -inf, which would prevent attending to the past and allow attending to the future.
      This is a decoder that can see the future — completely broken for generation.

  - question_id: ctest-ch-01-s-02-q-03
    type: code_reading
    points: 8
    difficulty: hard
    answer: 1
    explanation: |
      After attention computation, `out` has shape [B, H, T, D_head].
      The goal is to merge all head outputs back into [B, T, d_model] = [B, T, H*D_head].

      Step by step:
      1. `out.transpose(1, 2)`: [B, H, T, D_head] → [B, T, H, D_head]
         (swap head and sequence dimensions so sequence is dim 1)
      2. `.contiguous()`: required after transpose because the memory layout is
         non-contiguous (view won't work on non-contiguous tensors)
      3. `.view(B, T, self.d_model)`: [B, T, H, D_head] → [B, T, H*D_head]
         (merge the last two dims: H*D_head = d_model)

      This is equivalent to concatenating all head outputs along the feature dimension.
      The result [B, T, d_model] is then passed to W_o for the final projection.

      Option A (transpose batch/head) is partially true but misses the main purpose.
      Option C (column-major layout) is incorrect — .contiguous() converts to row-major.
      Option D (learned permutation) is incorrect — view is a reshape, not a permutation.

  - question_id: ctest-ch-01-s-02-q-04
    type: short
    points: 8
    difficulty: hard
    sample_answer: |
      Grouped Query Attention (GQA) is a modification of multi-head attention where
      multiple query heads share a single pair of key and value heads. For example,
      Llama-3 8B uses 32 query heads but only 8 KV heads, meaning 4 query heads share
      each KV head. GQA was introduced primarily to reduce KV cache memory consumption
      during inference — the KV cache stores the key and value tensors for all past
      tokens, and reducing the number of KV heads by 4× reduces KV cache memory by 4×.
      The trade-off is a slight reduction in model expressiveness compared to standard
      multi-head attention (where every query head has its own KV head), but empirical
      results show this quality loss is minimal while the serving efficiency gains are
      significant.
    keywords:
      - "KV cache"
      - "shared"
      - "memory"
      - "query heads"
      - "key"
      - "value"
      - "inference"
      - "4×"
    grading_rubric:
      - criterion: "Correctly defines GQA (multiple query heads share KV heads)"
        points: 3
      - criterion: "Explains the KV cache memory benefit"
        points: 3
      - criterion: "Identifies the expressiveness/efficiency trade-off"
        points: 2
    explanation: |
      A strong answer must:
      1. State that GQA means query heads > KV heads (many-to-one mapping)
      2. Connect this to KV cache size (KV cache ∝ n_kv_heads)
      3. Acknowledge the quality vs efficiency trade-off

      Common mistakes to watch for:
      - Confusing GQA with Multi-Query Attention (MQA, where n_kv=1)
      - Saying GQA reduces model size (it doesn't significantly — only KV projections shrink)
      - Not explaining WHY KV cache matters (inference memory and throughput)


