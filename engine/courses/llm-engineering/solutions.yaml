  - question_id: ctest-ch-06-s-01-q-01
    type: mcq
    points: 8
    difficulty: medium
    answer: 1
    explanation: |
      Static batching groups requests and processes them together. When a batch
      contains a mix of short (50-token) and long (2000-token) requests, ALL
      requests in the batch must wait until the LONGEST request finishes generating.
      The GPU is actively computing for long requests but idle (or doing padding
      computation) for the positions of short requests that already finished.

      Continuous batching solves this by treating the batch as a sliding window:
      as soon as any request completes, a new request is immediately inserted.
      This keeps GPU utilisation high continuously.

      Option A is wrong — the GPU isn't "too busy" in static batching, it's
      underutilised while waiting.
      Option C is wrong — memory bandwidth is a factor in attention computation,
      not the static batching inefficiency specifically.
      Option D is wrong — static batching can use less memory because it doesn't
      need to manage dynamic page allocation.

  - question_id: ctest-ch-06-s-01-q-02
    type: mcq
    points: 8
    difficulty: hard
    answer: 1
    explanation: |
      Quantisation maps floating-point weights to fewer bits. The mapping is linear
      (or blocked-linear for GPTQ/AWQ): each bucket of values is mapped to a single
      integer code. This is fine for most computations where rounding by ~0.001 has
      little effect.

      However, arithmetic tasks require carrying exact relationships between numbers
      — e.g., "what is 347 × 893?" requires the model to activate very specific
      circuits in its weight matrices that were calibrated at bf16 precision.
      Quantisation error in these circuits degrades exact arithmetic more than
      general language understanding (MMLU), which relies on broader semantic
      patterns that tolerate small weight perturbations.

      Option A is wrong — INT4 doesn't remove arithmetic ability entirely.
      Option C is a post-hoc rationalisation without mechanistic grounding.
      Option D is incorrect — quantisation doesn't change token generation count.

