  - question_id: ft-s-01-q-01
    type: mcq
    points: 8
    difficulty: hard
    answer: 1
    explanation: |
      GQA uses 8 KV heads vs standard MHA's 32 KV heads — a 4× reduction.
      The KV cache stores K and V tensors for every layer and every KV head.
      With 4× fewer KV heads, the KV cache is exactly 4× smaller.

      Calculation:
      Standard MHA: 32 layers × 32 KV_heads × 128 d_head × 2 (K+V) × 2 bytes × T tokens
      GQA:          32 layers × 8  KV_heads × 128 d_head × 2 (K+V) × 2 bytes × T tokens
      Ratio: 8/32 = 0.25 → 4× smaller

      Option A (same) is wrong — GQA directly reduces KV heads.
      Option C (8×) would only be true if n_kv_heads went from 8 to 1 (MQA).
      Option D (2×) is wrong — it would require halving KV heads, not reducing by 4×.

  - question_id: ft-s-01-q-02
    type: mcq
    points: 8
    difficulty: hard
    answer: 1
    explanation: |
      DPO optimises the difference in log-ratios between preferred and rejected
      responses. If BOTH probabilities increase relative to the reference:
      - The gap (preferred - rejected log-ratio) may still increase
      - But the model has actually become "more confident" overall, not specifically
        better at distinguishing preference

      This pattern is called reward hacking or probability floor collapse:
      the model increases log-probabilities uniformly (e.g., by becoming more
      verbose or sycophantic) rather than specifically promoting preferred responses.

      Option A is wrong — the gap matters, not just preferred increasing.
      Option C is partially correct (the gap increased) but misses the deeper problem.
      Option D is wrong — DPO doesn't require decreasing all probabilities.

  - question_id: ft-s-01-q-03
    type: short
    points: 12
    difficulty: hard
    sample_answer: |
      For a legal AI startup with 50,000 briefs updated weekly, I would choose RAG
      as the primary architecture. The weekly update cycle makes fine-tuning
      impractical — retraining a 7B+ model every week is expensive and slow,
      whereas RAG requires only re-indexing the 500 new briefs (embed + add to
      vector store, typically minutes of compute). Legal queries are fundamentally
      retrieval tasks: "find the relevant precedents" requires locating specific
      documents, not generating from baked-in weights. RAG also provides
      source attribution — critical in legal contexts where answers must cite
      specific briefs. For the LLM component, I would use a fine-tuned model only
      for format adaptation (legal writing style, structured output) rather than
      knowledge injection. This hybrid approach — RAG for knowledge + light SFT
      for format — is the production standard for knowledge-intensive professional AI.
    keywords:
      - "RAG"
      - "weekly"
      - "freshness"
      - "retrieval"
      - "fine-tuning"
      - "cost"
      - "attribution"
    grading_rubric:
      - criterion: "Recommends RAG and justifies with update frequency"
        points: 4
      - criterion: "Explains why weekly fine-tuning is impractical"
        points: 3
      - criterion: "Identifies attribution/citation as a legal requirement"
        points: 3
      - criterion: "Proposes hybrid (RAG + light fine-tuning) as optimal"
        points: 2
    explanation: |
      The key signals: weekly updates + 50k documents = RAG.
      Fine-tuning would require: weekly training run (~$500-$5000 for 7B), evaluation,
      deployment — all in 7 days. Unsustainable for a startup.

      Strong answers also mention legal-specific requirements: attribution (which
      brief supports this claim?), which RAG provides naturally via source metadata.

  - question_id: ft-s-01-q-04
    type: mcq
    points: 12
    difficulty: hard
    answer: 1
    explanation: |
      PagedAttention is inspired by virtual memory paging in operating systems.
      The key innovation is that KV cache is split into fixed-size pages (blocks),
      and pages are allocated on demand as sequences grow — not pre-allocated
      to maximum length.

      Physical pages can be non-contiguous in GPU memory (like OS virtual memory
      pages), with a block table mapping logical positions to physical pages.
      This eliminates:
      - Internal fragmentation (unused space within a pre-allocated buffer)
      - External fragmentation (unusable gaps between allocations)

      Result: near-zero wasted KV cache memory vs 60-80% waste in naive serving.

      Option A is wrong — pre-allocating average length still wastes memory.
      Option C is wrong — SVD compression is a separate technique (not PagedAttention).
      Option D describes prefix caching (KV cache sharing for identical prefixes),
      which is a separate vLLM feature, not PagedAttention itself.

  # ── Section 2: Code Reading and Debugging ────────────────────────────────

  - question_id: ft-s-02-q-01
    type: code_output
    points: 10
    difficulty: hard
    answer: 0
    explanation: |
      The code applies LoRA with r=8 to a single linear layer [1024, 1024].
      LoRA adds: A [r, d_in] + B [d_out, r] = [8, 1024] + [1024, 8] = 8192 + 8192 = 16,384 params.

      Original linear layer: 1024 × 1024 = 1,048,576 params (frozen).
      Total params: 1,048,576 + 16,384 = 1,065,960.
      Trainable params: 16,384 (only LoRA A and B are requires_grad=True).

      Output: "16384/1065960" — closest to Option A "16384/1065984".

      Note: slight discrepancy (1065960 vs 1065984) due to PEFT potentially adding
      small configuration tensors. The key calculation is trainable=16384.

      The important insight: only 1.5% of parameters are trainable with LoRA r=8
      on this layer (16384/1048576).

  - question_id: ft-s-02-q-02
    type: code_fix
    points: 12
    difficulty: hard
    correct_code: |
      def query_rag(question: str, collection, llm) -> str:
          # Step 1: Embed and retrieve
          results = collection.query(
              query_texts=[question],
              n_results=5
          )
          # FIXED: results["documents"] is [[doc1, doc2, ...]] — nested list
          # Access the first (and only) query result: results["documents"][0]
          context = "\n".join(results["documents"][0])  # <-- fixed

          prompt = f"Context:\n{context}\n\nQuestion: {question}\nAnswer:"
          return llm.invoke(prompt)
    bugs_fixed:
      - id: bug-01
        description: "ChromaDB returns results['documents'] as a nested list
          [[doc1, doc2, doc3, ...]] (one list per query). Calling join() on the
          outer list joins the inner lists' string representations like
          \"['doc1 text...', 'doc2 text...']\", producing garbled context
          instead of actual document text."
        original: "context = \"\\n\".join(results[\"documents\"])"
        fixed: "context = \"\\n\".join(results[\"documents\"][0])"
        note: |
          This is an extremely common RAG bug in production systems.
          The fix is to index [0] because we only sent one query_texts entry.
          For batch queries, you would iterate over results["documents"].
    grading_rubric:
      - criterion: "Identifies the nested list issue in ChromaDB results"
        points: 6
      - criterion: "Correctly adds [0] indexing (or equivalent flattening)"
        points: 6
    explanation: |
      ChromaDB's query() API always returns results nested by query:
        results["documents"] = [[doc1, doc2, doc3, ...]]  # one list per query
        results["ids"]        = [[id1, id2, id3, ...]]
        results["distances"]  = [[dist1, dist2, dist3, ...]]

      Since we sent query_texts=[question] (one query), the outer list has one element.
      Joining the outer list directly joins list objects using str(), producing:
        "['The transformer architecture...']\n['In the Chinchilla paper...']"
      Which is gibberish as context. The LLM then has no useful context and
      may hallucinate — the bug is silent but causes systematic hallucination.

  - question_id: ft-s-02-q-03
    type: code_reading
    points: 13
    difficulty: hard
    answer: 1
    explanation: |
      `should_continue` is a conditional edge routing function in LangGraph.
      After each call to the "agent" node, LangGraph calls this function with
      the current state to determine where to route execution next.

      Logic:
      - If the last message has `tool_calls` (the LLM decided to use a tool) →
        return "tools" → execution goes to the ToolNode to run the tools
      - If no tool_calls → return END → agent is done, final message returned to user

      This implements the ReAct loop automatically:
        agent → [tool_calls?] → yes → tools → agent → [tool_calls?] → no → END

      Option A (validates tool success) is wrong — should_continue doesn't
      inspect tool results, only whether tools were called.
      Option C (limits tool calls) is wrong — max steps would need a counter in state.
      Option D (checks factual correctness) is wrong — there's no verification logic.

  # ── Section 3: System Design ──────────────────────────────────────────────

  - question_id: ft-s-03-q-01
    type: short
    points: 12
    difficulty: hard
    sample_answer: |
      I would build an automated evaluation pipeline triggered on every model
      update (git push to main). The pipeline runs a fixed benchmark of 100
      test cases covering: factual accuracy (exact match on known Q&A pairs),
      faithfulness for RAG tasks (RAGAS faithfulness score), instruction following
      (format compliance on structured output tasks), and safety guardrail trigger
      rate. Thresholds are set from the current production model as a baseline —
      any metric that regresses by more than 2 standard deviations from the
      rolling 7-day average triggers a deployment block. To distinguish model
      regression from infrastructure problems, I separately track the same
      benchmark's latency profile: a pure model regression degrades quality but
      not latency, while infrastructure problems degrade latency uniformly without
      quality changes. The pipeline runs in CI/CD (GitHub Actions or equivalent)
      and must pass before any model version is promoted to production. A canary
      deployment (5% traffic for 1 hour with real-user quality sampling) provides
      a final gate before full rollout.
    keywords:
      - "evaluation"
      - "regression"
      - "benchmark"
      - "threshold"
      - "CI/CD"
      - "faithfulness"
      - "canary"
      - "baseline"
    grading_rubric:
      - criterion: "Describes a fixed benchmark run on every update"
        points: 3
      - criterion: "Defines concrete metrics with threshold strategy"
        points: 3
      - criterion: "Distinguishes model regression from infrastructure issue"
        points: 3
      - criterion: "Mentions canary deployment or equivalent staged rollout"
        points: 3
    explanation: |
      Production ML evaluation systems must:
      1. Run automatically (not manually) — humans miss regressions
      2. Have fixed baselines (rolling average, previous model) — no moving targets
      3. Separate quality signals from infrastructure signals
      4. Gate deployment (don't just alert, BLOCK bad models)

      Canary deployments are the gold standard: route 5% traffic to new model,
      measure real-user quality signals for 1 hour, only then full rollout.

  - question_id: ft-s-03-q-02
    type: code_write
    points: 13
    difficulty: hard
    sample_solution: |
      import json
      import re

      def evaluate_rag_faithfulness(answer: str, context: list[str], llm) -> float:
          """Return faithfulness score 0.0–1.0 using LLM-as-judge."""
          context_str = "\n\n".join(f"[{i+1}] {c}" for i, c in enumerate(context))

          prompt = f"""You are an impartial judge evaluating whether an AI-generated answer
      is fully supported by the provided context. Score the faithfulness from 0.0 to 1.0.

      CONTEXT:
      {context_str}

      ANSWER TO EVALUATE:
      {answer}

      Scoring rubric:
      1.0 = Every claim in the answer is directly supported by the context
      0.7 = Most claims supported, minor extrapolation
      0.4 = Some claims supported, significant unsupported statements
      0.0 = Answer contradicts or ignores context entirely

      Respond with ONLY a JSON object: {{"score": <float between 0.0 and 1.0>, "reason": "<one sentence>"}}"""

          try:
              response = llm.invoke(prompt)
              # Parse JSON from response
              # Handle cases where LLM wraps in markdown code blocks
              text = re.sub(r"```(?:json)?|```", "", response).strip()
              data = json.loads(text)
              score = float(data["score"])
              return max(0.0, min(1.0, score))  # clamp to [0, 1]
          except Exception:
              return 0.0  # safe default on parse failure
    alternative_solutions:
      - description: "Regex-based score extraction (simpler, less robust)"
        code: |
          import re

          def evaluate_rag_faithfulness(answer: str, context: list[str], llm) -> float:
              context_str = "\n".join(context)
              prompt = f"""Rate whether this answer is supported by the context.
          Context: {context_str}
          Answer: {answer}
          Output only a number between 0.0 and 1.0:"""
              try:
                  response = llm.invoke(prompt).strip()
                  match = re.search(r"\b([01](?:\.\d+)?)\b", response)
                  return float(match.group(1)) if match else 0.0
              except Exception:
                  return 0.0
    grading_rubric:
      - criterion: "Constructs a clear judge prompt with context and answer"
        points: 3
      - criterion: "Instructs LLM to output a parseable score (JSON or explicit number)"
        points: 3
      - criterion: "Parses the score from LLM response correctly"
        points: 3
      - criterion: "Returns float in [0.0, 1.0] and handles exceptions"
        points: 2
      - criterion: "Clamps output to valid range and handles edge cases"
        points: 2
    explanation: |
      The three critical elements:
      1. Prompt quality — the judge must understand what faithfulness means (grounded in context, not
         similarity to ground truth). A rubric in the prompt dramatically improves consistency.
      2. Parseable output — asking for JSON is more reliable than free text.
         The re.sub to remove markdown fences handles LLM's tendency to wrap JSON in ```json...```.
      3. Error handling — LLMs sometimes produce unparseable output; always return a
         safe default (0.0) rather than crashing the evaluation pipeline.

      Common mistakes: using "similarity" or "accuracy" in the prompt instead of "faithfulness",
      not handling JSON parse failures, not clamping to [0,1].


# ════════════════════════════════════════════════════════════════════════════
# ASSIGNMENT REVIEW GUIDES
# ════════════════════════════════════════════════════════════════════════════

assignment_review_guides:

  - assignment_id: cassign-ch-01
    title: "Chapter 1 Assignment — Reviewer Guide"
    pass_threshold: 70

    what_to_look_for:
      - "BPE: train() correctly builds a merge table starting from byte-level tokens (256 vocab).
        encode() applies merges in training order. decode() correctly inverts the merge table."
      - "MultiHeadAttention: correct shapes at every step. W_Q/K/V are d_model × d_model.
        Split into heads via view + transpose. Causal mask uses triu diagonal=1."
      - "TransformerBlock: pre-norm (norm before, not after attention/MLP).
        Residual connections on both attention and MLP paths. GELU activation in MLP."
      - "All 3 provided tests pass without modification to the test file."
      - "EXPLANATION.md explains WHY each design choice was made, not just WHAT it does."

    common_mistakes:
      - mistake: "Post-norm instead of pre-norm (adding LayerNorm after the residual connection)"
        note: "Deduct 10 points from the TransformerBlock criterion. Flag clearly in feedback
          with a reference to the nanoGPT source showing pre-norm."
      - mistake: "BPE encode() sorts pairs by frequency on the new text instead of applying
          merges in training order"
        note: "This is a common conceptual error. Deduct 10 points. Explain that the merge
          table order is fixed at training time — you must apply merges in the exact order
          they were learned, not re-rank by current frequency."
      - mistake: "Missing contiguous() before view() in multi-head attention reshape"
        note: "Minor — deduct 3 points only if it causes a runtime error. If it happens to
          work (e.g., memory is already contiguous), give full credit."

    edge_cases:
      - case: "Student implements GQA instead of standard MHA"
        guidance: "Accept for full credit if it passes the tests. Note it in feedback as
          a positive extension but confirm the standard MHA was understood."

    feedback_notes: |
      Tone: Constructive and specific. Point to the exact line in their code that is wrong
      and explain the underlying concept, not just the fix.
      Priority: Get BPE and causal mask right — these are the concepts that trip up
      most practitioners in the real world.
      Avoid: Saying "good job" without specifics. Every review should have at least
      one substantive technical insight the student can learn from.

  - assignment_id: cassign-ch-02
    title: "Chapter 2 Assignment — Reviewer Guide"
    pass_threshold: 70

    what_to_look_for:
      - "All 4 experiments completed with distinct, committed config files (not just
        one config modified and re-run without saving)."
      - "Loss curves plotted and correctly interpreted: overfitting is visible when
        val_loss increases while train_loss decreases."
      - "Perplexity calculated correctly: exp(val_loss) — not just reporting raw loss."
      - "W&B links are public and shareable, or exported CSV data is committed."
      - "Discussion section explains WHY results differ, not just that they do."

    common_mistakes:
      - mistake: "Student reports training loss as perplexity"
        note: "Common mistake — exp(3.2) ≈ 24.5, not 3.2. Deduct 5 points from interpretation
          criterion. Explain the formula."
      - mistake: "LR experiment not controlled — student changed other hyperparameters too"
        note: "Partial credit (50%) for that experiment. Note the importance of single-variable
          experiments in research methodology."

    feedback_notes: |
      Focus on the interpretation quality. Many students can run nanoGPT; fewer can
      explain what the loss curves mean mechanistically. Push on the 'why'.

  - assignment_id: cassign-ch-03
    title: "Chapter 3 Assignment — Reviewer Guide"
    pass_threshold: 70

    what_to_look_for:
      - "SFT training loss decreases monotonically (or near-monotonically) — diverging
        SFT loss suggests a bug in the training config."
      - "DPO training shows increasing reward margin (preferred_reward - rejected_reward
        should trend positive in W&B logs)."
      - "Evaluation uses lm-eval correctly with the same tasks for all 3 models."
      - "Results table has correct numbers (not hallucinated — verify against W&B logs)."
      - "Analysis discusses directionality: did DPO improve on SFT? By how much?"

    common_mistakes:
      - mistake: "DPO applied directly to base model without SFT reference model"
        note: "This will likely produce degraded results. Deduct 15 points from the DPO
          training criterion. Explain that DPO requires an SFT policy as reference."
      - mistake: "Evaluation tasks differ between baseline and fine-tuned models"
        note: "Results are not comparable. Require resubmission of evaluation only."

    feedback_notes: |
      SmolLM2-360M is small — DPO gains will be modest (1–3% on benchmarks).
      If a student reports 20%+ improvement, question the evaluation methodology.

  - assignment_id: cassign-ch-04
    title: "Chapter 4 Assignment — Reviewer Guide"
    pass_threshold: 70

    what_to_look_for:
      - "QLoRA config uses NF4 quantisation (not INT8) and the correct bitsandbytes config."
      - "LoRA r=16, alpha=32, applied to linear layers (not just attention)."
      - "HuggingFace Hub adapter has a model card with: training data, hyperparameters, results."
      - "Evaluation compares base vs fine-tuned on a task-specific metric, not just perplexity."
      - "Training script is runnable without modification (dependencies specified)."

    common_mistakes:
      - mistake: "Student merged adapter weights into base model before uploading to Hub
          (uploads full model instead of adapter)"
        note: "Deduct 10 points from Hub criterion. Adapters should be uploaded separately
          with base_model_name_or_path pointing to the original base. Full model uploads
          are much larger and defeat the purpose of PEFT."
      - mistake: "MMLU evaluation missing — student only evaluates on the fine-tuning task"
        note: "Without MMLU comparison, we can't tell if fine-tuning caused catastrophic
          forgetting. Deduct 10 points from evaluation criterion."

    feedback_notes: |
      The most important thing to verify: does the model card have enough information
      for someone to reproduce the fine-tuning? This is the open source standard.

  - assignment_id: cassign-ch-05
    title: "Chapter 5 Assignment — Reviewer Guide"
    pass_threshold: 70

    what_to_look_for:
      - "Pipeline runs end-to-end: document loading → chunking → embedding → storing → query → answer."
      - "RAGAS faithfulness ≥ 0.70 on the provided test set."
      - "Chunking comparison uses the same test set and reports RAGAS scores for each strategy."
      - "Reranking implemented correctly (cross-encoder, not just re-sorting by embedding distance)."
      - "README enables someone to set up and query the system in < 15 minutes."

    common_mistakes:
      - mistake: "Student evaluated on the training documents (documents in the index) rather
          than held-out test questions"
        note: "This inflates scores dramatically. Check that test questions are genuinely
          held-out from the indexed documents, not just extracted from them. Require correction."
      - mistake: "Reranking applied before retrieval instead of after (not a valid pattern)"
        note: "Reranking is a post-retrieval step: retrieve top-K via ANN, then rerank, then
          keep top-N. Applying a cross-encoder to the query alone before retrieval doesn't work."

    feedback_notes: |
      RAGAS faithfulness < 0.70: check the generation prompt first — usually adding
      "Answer only from the provided context" dramatically improves faithfulness.

  - assignment_id: cassign-ch-06
    title: "Chapter 6 Assignment — Reviewer Guide"
    pass_threshold: 70

    what_to_look_for:
      - "vLLM server correctly deployed and accessible (reproducible setup commands in README)."
      - "All 3 quantisation levels benchmarked (BF16, INT8, INT4 AWQ or GPTQ)."
      - "Benchmark measures both throughput (tokens/s) AND latency (TTFT, P50, P95)."
      - "Analysis correctly identifies: INT4 has highest throughput but lower quality;
        BF16 has lowest throughput but highest quality."
      - "Data is in a CSV or table that can be reproduced."

    common_mistakes:
      - mistake: "Benchmark run with batch_size=1 only — no concurrency tested"
        note: "The interesting throughput numbers appear at batch_size=16+ where continuous
          batching kicks in. Deduct 15 points from throughput criterion."
      - mistake: "TTFT measured for full response instead of first token"
        note: "TTFT requires streaming mode — measuring total response time and calling it
          TTFT is incorrect. Explain the difference and award partial credit."

    feedback_notes: |
      The key insight to communicate: vLLM's advantage grows with concurrency.
      At batch_size=1, vLLM is not much faster than HF. At batch_size=64, it can be 5×+.

  - assignment_id: cassign-ch-07
    title: "Chapter 7 Assignment — Reviewer Guide"
    pass_threshold: 70

    what_to_look_for:
      - "Agent correctly implements LangGraph state machine with conditional edges."
      - "4+ tools are distinct in function (not 4 variations of the same tool)."
      - "max_steps guardrail implemented and tested (agent doesn't infinite-loop)."
      - "20-task benchmark is well-designed: questions have unambiguous correct answers,
        require actual tool use (not just LLM knowledge), and cover diverse task types."
      - "Task success rate ≥ 60%: below this indicates a fundamental agent design issue."

    common_mistakes:
      - mistake: "Benchmark tasks solvable without tool use (LLM answers from training knowledge)"
        note: "This defeats the purpose of agent evaluation. Good benchmark tasks require
          fresh information (current prices, file contents, calculated values) that the
          LLM cannot know without using tools. Require at least 15/20 tasks to genuinely
          need tools."
      - mistake: "Success rate measured by LLM self-evaluation (asking LLM if it succeeded)"
        note: "Self-evaluation is unreliable — models often claim success when failing.
          Require ground-truth comparison for at least 50% of tasks."

    feedback_notes: |
      The most common failure mode for agents: the LLM doesn't call tools when it should
      (it answers from memory). Check the trajectory logs for this pattern.

  - assignment_id: cassign-ch-08
    title: "Chapter 8 Assignment — Reviewer Guide"
    pass_threshold: 70

    what_to_look_for:
      - "OpenTelemetry spans correctly wrap 4 operations: retrieval, LLM call, reranking,
        total pipeline. Parent-child span relationships are correct."
      - "gen_ai.* semantic convention attributes present on LLM spans
        (model, prompt_tokens, completion_tokens)."
      - "Sample traces exported as valid JSON (can be imported to Jaeger or Tempo)."
      - "Security audit documents 5 distinct injection attempts with reproducible steps."
      - "At least one defence is implemented and shown to work (before/after test)."

    common_mistakes:
      - mistake: "Spans not nested correctly (all spans at root level instead of parent-child)"
        note: "This means the trace doesn't show the actual pipeline structure. The total
          pipeline span should be the parent; retrieval, LLM, reranking are children."
      - mistake: "Security audit tests direct injection (user message) but not indirect
          injection (via retrieved documents)"
        note: "Indirect injection is the critical RAG-specific risk. Deduct 10 points and
          ask student to add at least 2 indirect injection tests."

    feedback_notes: |
      For the security audit: if all 5 attacks failed, either the system is genuinely
      well-defended (rare) or the attacks were too weak. Ask the student to share
      the exact attack payloads they used.

  - assignment_id: final-assignment
    title: "Final Assignment (Capstone) — Reviewer Guide"
    pass_threshold: 70

    what_to_look_for:
      - "RAG pipeline is fully functional: document ingestion, chunking, embedding,
        vector storage, retrieval, reranking, and generation all work end-to-end."
      - "Agent integrates at least 3 tools using LangGraph, with max_steps guardrail
        and input validation on tool arguments."
      - "RAGAS evaluation on ≥ 25 test cases with faithfulness AND answer_relevancy reported."
      - "Custom benchmark with domain-specific metrics (not just RAGAS)."
      - "OpenTelemetry traces instrument the complete request pipeline."
      - "Public GitHub repo has MIT/Apache license, CI workflow, contributing guide,
        architecture diagram in README."
      - "At least one GitHub release tagged v1.0.0."

    common_mistakes:
      - mistake: "Architecture diagram missing or shows only the happy path (no error handling)"
        note: "Deduct 5 points. A production architecture diagram must show failure modes."
      - mistake: "RAGAS evaluation run on < 10 questions (insufficient for statistical validity)"
        note: "Deduct 10 points from evaluation criterion. 25 questions is the minimum."
      - mistake: "CI workflow fails on a clean clone (missing dependency or hardcoded path)"
        note: "This is a reproducibility failure — a core open source requirement.
          Require fixing before passing."

    edge_cases:
      - case: "Student's domain is medical or legal — real data may have privacy concerns"
        guidance: "Accept synthetic or publicly available data (MIMIC-III demos, public court records).
          Do not require students to use real private data."
      - case: "Student achieves RAGAS faithfulness > 0.90 — suspiciously high"
        guidance: "Verify test questions are genuinely held-out from the corpus.
          If test questions were extracted from indexed documents, scores are inflated.
          Ask student to share their test set and verify."

