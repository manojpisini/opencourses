  # ── Section 1: LoRA and QLoRA Theory ─────────────────────────────────────

  - question_id: ctest-ch-04-s-01-q-01
    type: mcq
    points: 8
    difficulty: medium
    answer: 1
    explanation: |
      For a linear layer of shape [d_out, d_in] = [4096, 4096] with LoRA rank r=16:
      - Matrix A: [r, d_in] = [16, 4096] → 65,536 parameters
      - Matrix B: [d_out, r] = [4096, 16] → 65,536 parameters
      - Total LoRA params: 65,536 + 65,536 = 131,072

      Option A (16,777,216) is the full weight matrix parameter count (4096²).
      Option C (65,536) counts only one of the two LoRA matrices.
      Option D (256 = r²) confuses rank with the matrix dimensions.

      This is a key calculation to know: LoRA adds 2×r×d parameters per layer,
      while the original layer has d² parameters. For r<<d, this is a dramatic
      reduction (r=16 on a 4096×4096 layer = 0.78% of original).

  - question_id: ctest-ch-04-s-01-q-02
    type: truefalse
    points: 5
    difficulty: easy
    answer: false
    explanation: |
      FALSE. In QLoRA, only the frozen BASE model weights are quantised to 4-bit
      (NF4 format). The LoRA adapter weights (A and B matrices) are trained and
      stored in full precision (bfloat16).

      This asymmetry is critical: quantising the adapters would destroy the
      gradient signal needed for training. The QLoRA paper specifically uses
      "paged optimizers" to keep adapter gradients in fp32 on CPU when GPU memory
      is tight, and the adapters themselves are always maintained in bf16/fp16.

      During the forward pass, base model weights are dequantised on-the-fly to
      bf16 for computation, then re-quantised (stored as 4-bit). Only the LoRA
      adapter activations and weights need full-precision gradients.

  - question_id: ctest-ch-04-s-01-q-03
    type: short
    points: 10
    difficulty: hard
    sample_answer: |
      For a 70B model on a 24GB GPU, I would use QLoRA with 4-bit NF4 quantisation
      via bitsandbytes (load_in_4bit=True, bnb_4bit_quant_type='nf4',
      bnb_4bit_compute_dtype=torch.bfloat16). The 70B model in 4-bit requires
      approximately 35–40GB, which exceeds a single 24GB GPU. I would therefore
      also enable gradient checkpointing (model.gradient_checkpointing_enable()) and
      set per_device_train_batch_size=1 with gradient_accumulation_steps=8–16 to
      simulate a larger effective batch size. For the LoRA config, I would use
      r=16 or 32 with target_modules='all-linear', since legal summarisation is a
      moderately complex task requiring both stylistic adaptation and domain vocabulary.
      If the model still doesn't fit, I would use model sharding with device_map='auto'
      to split layers across CPU and GPU (though this significantly slows training).
    keywords:
      - "4-bit"
      - "QLoRA"
      - "bitsandbytes"
      - "NF4"
      - "gradient accumulation"
      - "rank"
      - "gradient checkpointing"
    grading_rubric:
      - criterion: "Correctly specifies 4-bit NF4 quantisation with bitsandbytes"
        points: 4
      - criterion: "Addresses the GPU memory constraint (70B won't fit in 24GB even in 4-bit)"
        points: 3
      - criterion: "Mentions gradient checkpointing and/or batch size strategies"
        points: 3
    explanation: |
      70B in 4-bit requires roughly 70B × 0.5 bytes = 35GB, which exceeds 24GB.
      Solutions: device_map='auto' (CPU offloading, slow), multi-GPU (not specified),
      or using a smaller model variant.

      Strong answers note the GPU memory issue explicitly. Weak answers assume
      70B fits in 24GB in 4-bit — it doesn't without CPU offloading.

