      This is indirect prompt injection — the attacker doesn't interact with the
      system directly but plants malicious instructions in a data source the agent
      will retrieve (an email in this case).

      The most effective architectural defence is to treat all tool outputs as
      untrusted data at a different privilege level than system instructions.
      This means: tool outputs can inform the agent's knowledge but cannot modify
      its goals, system prompt, or trigger privileged actions (like sending emails).

