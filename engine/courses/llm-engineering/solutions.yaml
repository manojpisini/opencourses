# CHAPTER 2 TEST SOLUTIONS  —  ctest-ch-02
# ════════════════════════════════════════════════════════════════════════════

  # ── Section 1: Pre-training Theory ───────────────────────────────────────

  - question_id: ctest-ch-02-s-01-q-01
    type: mcq
    points: 5
    difficulty: easy
    answer: 1
    explanation: |
      Decoder-only LLMs (GPT family, Llama, Mistral, etc.) are trained with
      causal language modelling: given tokens x₁..xₙ₋₁, predict xₙ. This is
      also called "next-token prediction" or autoregressive language modelling.

      Option A (masked LM) is BERT's objective — a bidirectional encoder that
      masks 15% of tokens and predicts them. BERT is not a generative model.
      Option C (sentence pair classification) is NSP (Next Sentence Prediction),
      also from BERT — again not GPT-style.
      Option D (contrastive learning) is used in embedding models like CLIP/E5,
      not generative LLMs.

  - question_id: ctest-ch-02-s-01-q-02
    type: mcq
    points: 5
    difficulty: medium
    answer: 1
    explanation: |
      The Chinchilla paper (Hoffmann et al., 2022) found that for compute-optimal
      training: N_tokens ≈ 20 × N_params. This is linear — if you double the
      parameters, you should double the tokens.

      Intuition: with 2× the model capacity, you need 2× the data to fill it.
      Using fewer tokens leaves the larger model undertrained (like GPT-3).

      Option A is wrong — same tokens would leave the larger model undertrained.
      Option C (square) would be wildly expensive and is not the Chinchilla result.
      Option D (halve) is backwards — larger models need MORE data, not less.

      Important nuance: Chinchilla-optimal is for compute budgets, not inference
      budgets. For deployment at scale, over-training a smaller model (like Llama-3
      8B on 15T tokens) is better — lower inference cost per query.

  - question_id: ctest-ch-02-s-01-q-03
    type: mcq
    points: 5
    difficulty: hard
    answer: 1
    explanation: |
      Gradient accumulation simulates a large batch by running K micro-batches
      and accumulating gradients before an optimizer step.

      If we accumulate K steps without scaling, each micro-batch contributes its
      full loss gradient. After K steps, the accumulated gradient is K× larger
      than it would be for a single full-batch forward pass. We want the effective
      gradient to be the mean over all K micro-batches, so we divide each
      micro-batch loss by K before backward().

      Without this division, using gradient_accumulation_steps=8 would effectively
      apply 8× the learning rate — causing training instability or divergence.

      Option A (fp16 overflow) is incorrect — loss scaling for fp16 is handled
      by GradScaler, not gradient_accumulation_steps.
      Option C (compensating for batch size) is conceptually related but imprecise.
      Option D (AdamW expectation) is incorrect — AdamW doesn't expect a specific
      gradient norm.

  - question_id: ctest-ch-02-s-01-q-04
    type: truefalse
    points: 3
    difficulty: medium
    answer: true
    explanation: |
      TRUE. Llama-3 8B was trained on 15 trillion tokens. Chinchilla optimal for
      8B parameters would be ~160 billion tokens (20 × 8B). So Llama-3 8B was
      trained on roughly 94× more tokens than Chinchilla-optimal.

      Why? Because Meta is distributing this model to millions of users who will
      run inference on it. A 15T-token Llama-3 8B performs comparably to larger
      models trained compute-optimally, but costs far less per inference. The
      training compute is a one-time cost; inference compute is ongoing.

      This "over-training for inference efficiency" pattern is now standard
      practice for models intended for wide deployment.

  # ── Section 2: Code & Concepts ───────────────────────────────────────────

  - question_id: ctest-ch-02-s-02-q-01
    type: short
    points: 10
    difficulty: hard
    sample_answer: |
      First, deduplication prevents memorisation: if the same document appears
      many times in the training set, the model will memorise it verbatim rather
      than learning generalisable patterns. This hurts generalisation and can cause
      the model to regurgitate private data or copyrighted content. Second,
      deduplication improves data quality signal — rare, high-quality documents
      get proportionally more weight when duplicates are removed, while low-quality
      spam that appears in many crawled copies is reduced. One open-source tool
      for near-duplicate removal at scale is MinHash LSH (locality-sensitive hashing
      on n-gram fingerprints), implemented in tools like the Dolma processing pipeline
      or the FineWeb deduplication step used by HuggingFace.
    keywords:
      - "memorisation"
      - "generalisation"
      - "overfitting"
      - "MinHash"
      - "quality"
      - "duplicate"
    grading_rubric:
      - criterion: "Correctly explains memorisation / generalisation reason"
        points: 4
      - criterion: "Correctly explains data quality / signal-to-noise reason"
        points: 3
      - criterion: "Names a correct open-source tool (MinHash, Dolma, FineWeb, datasketch)"
        points: 3
    explanation: |
      Strong answers address BOTH reasons (not just one):
      1. Over-represented data causes memorisation — the model learns to reproduce
         exact text instead of learning patterns.
      2. Deduplication effectively re-weights rare high-quality documents upward.

      Acceptable tools: MinHash, Bloom filter, exact n-gram deduplication,
      Dolma's deduplication, FineWeb's dedup pipeline, datasketch library.

      Watch for: vague answers that say "duplicates are bad" without mechanistic
      explanation. These should receive partial credit only.

  - question_id: ctest-ch-02-s-02-q-02
    type: code_output
    points: 10
    difficulty: medium
    answer: 1
    explanation: |
      Execution trace:
      1. cross_entropy_loss = 3.2
      2. result = math.exp(3.2) = 24.532... ≈ 24.53
      3. print(f"{result:.2f}") → "24.53"

      This code computes PERPLEXITY. Perplexity is defined as exp(average CE loss).
      A lower perplexity value means the model is less "surprised" by the validation
      data — it assigns higher probability to the correct tokens.

      Reference points:
      - GPT-2 (1.5B) on WikiText-103: ~18 perplexity
      - A perplexity of 24.53 is roughly GPT-2 124M quality on Wikipedia-like data
      - Random character-level prediction on 256 tokens would be perplexity ~256

      Option A (24.53 — higher is better) is wrong about the direction.
      Option C (3.20 — raw loss) misidentifies what the code computes (exp is applied).
      Option D (1.16) would require exp(0.148) — not the calculation being done.


# ════════════════════════════════════════════════════════════════════════════
# CHAPTER 3 TEST SOLUTIONS  —  ctest-ch-03
# ════════════════════════════════════════════════════════════════════════════

  # ── Section 1: Alignment Theory ──────────────────────────────────────────

  - question_id: ctest-ch-03-s-01-q-01
    type: mcq
    points: 5
    difficulty: medium
    answer: 1
    explanation: |
      In InstructGPT's RLHF pipeline, the reward model (RM) is trained on
      human preference data: pairs of model responses are shown to labellers
      who rank which is better. The RM learns to assign a scalar score to any
      (prompt, response) pair that correlates with human preference.

      During PPO (Phase 3), the RM provides the reward signal for reinforcement
      learning — the LLM generates responses and is rewarded based on the RM's
      score, encouraging the policy to generate more human-preferred responses.

      Option A is wrong — the RM doesn't generate responses.
      Option C is wrong — content filtering is a separate step.
      Option D is wrong — perplexity is not a preference signal.

  - question_id: ctest-ch-03-s-01-q-02
    type: mcq
    points: 5
    difficulty: hard
    answer: 1
    explanation: |
      In DPO, β (beta) is the temperature parameter of the KL constraint in the
      original RLHF objective:

        max_{π} E[r(x,y)] - β · KL[π(y|x) || π_ref(y|x)]

      DPO's closed-form solution shows β appears as the coefficient scaling the
      log-ratio of trained policy to reference policy. A higher β penalises
      deviation from the reference model more strongly (conservative alignment).
      A lower β allows the trained policy to deviate further (aggressive alignment).

      Option A is incorrect — β has no relation to learning rate.
      Option C (margin) is incorrect — β scales the full log-ratio, not just a margin.
      Option D (batch ratio) is incorrect — β is a policy constraint, not a data ratio.

  - question_id: ctest-ch-03-s-01-q-03
    type: truefalse
    points: 3
    difficulty: easy
    answer: false
    explanation: |
      FALSE. This is precisely what makes DPO appealing: it does NOT require
      training a separate reward model. DPO directly optimises the alignment
      objective using preference pairs (chosen, rejected) without an explicit
      reward model phase.

      RLHF (as in InstructGPT) requires:
        1. SFT model → 2. Reward Model training → 3. PPO RL

      DPO requires only:
        1. SFT model → 2. DPO training (directly on preference data)

      The reward model is implicit in the DPO objective — the ratio of policy to
      reference log-probs serves as an implicit reward. This is the key theoretical
      insight of the DPO paper.

  - question_id: ctest-ch-03-s-01-q-04
    type: mcq
    points: 5
    difficulty: medium
    answer: 2
    explanation: |
      Benchmark contamination is one of the most well-documented and serious
      limitations of standardised LLM benchmarks. If the test questions from MMLU,
      HellaSwag, etc. appeared in the model's pre-training data (Common Crawl,
      web text), the model may have memorised the answers rather than learned to
      reason. This makes benchmark scores unreliable indicators of true capability.

      Option A is wrong — LM Eval Harness works with any model size.
      Option B is wrong — automated MCQ benchmarks don't require human scorers.
      Option D is wrong — MMLU covers 57 diverse subjects, not only math.

      Real-world example: multiple models have been caught having test data in
      their training corpus, inflating their MMLU scores by 5–15 points.

  # ── Section 2: Practical Understanding ───────────────────────────────────

  - question_id: ctest-ch-03-s-02-q-01
    type: short
    points: 10
    difficulty: hard
    sample_answer: |
      With 500 demonstrations and 200 preference pairs, I would use a two-stage
      approach: first SFT on the 500 demonstrations, then DPO on the 200 preference
      pairs. SFT is necessary first because the base model likely doesn't follow
      the customer support format at all — the 500 demonstrations teach it the
      expected response structure. I would use DPO rather than full RLHF (PPO +
      reward model) because 200 preference pairs is too small to train a reliable
      reward model, and DPO directly uses preference pairs without the reward model
      step. The β hyperparameter in DPO should be higher (0.1–0.5) to stay close
      to the SFT model, since we have limited preference data and don't want the
      model to diverge into reward hacking.
    keywords:
      - "SFT"
      - "DPO"
      - "demonstration"
      - "preference"
      - "reward model"
      - "small"
    grading_rubric:
      - criterion: "Recommends SFT first, then DPO (correct ordering)"
        points: 3
      - criterion: "Justifies DPO over RLHF given small preference dataset"
        points: 4
      - criterion: "Explains why SFT is needed before DPO"
        points: 3
    explanation: |
      Key signals of a strong answer:
      - SFT → DPO ordering (not DPO on a raw base model)
      - Recognition that 200 pairs is too small for reward model training
      - Awareness that DPO needs an SFT reference policy

      Common mistakes:
      - Suggesting RLHF/PPO with 200 pairs — reward model needs thousands of examples
      - Skipping SFT and applying DPO directly to the base model
      - Not explaining the ordering rationale

  - question_id: ctest-ch-03-s-02-q-02
    type: code_reading
    points: 10
    difficulty: medium
    answer: 1
    explanation: |
      beta=0.01 is 10× smaller than the typical beta=0.1.

      In DPO, β controls the strength of the KL constraint penalising deviation
      from the reference SFT policy. A smaller β means the constraint is weaker —
      the model is allowed (and incentivised) to deviate more aggressively from
      the reference in pursuit of higher preference scores.

      Effects of low β:
      - May achieve higher alignment quality if the preference signal is good
      - Higher risk of reward hacking — model learns to game the preference metric
        without genuinely improving (e.g., becoming more verbose, sycophantic)
      - Higher risk of mode collapse or repetitive outputs

      Option C (stay closer) is backwards — lower β = weaker constraint = more deviation.
      Options A and D are incorrect — β is a policy constraint parameter, not related
      to learning rate or LoRA rank.


