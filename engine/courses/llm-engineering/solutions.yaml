      For P95 TTFT < 500ms and P95 TBT < 50ms with 2× A100 80GB GPUs, I would
      deploy a 13B or 70B Llama-3 model in tensor-parallel mode across both GPUs
      using vLLM with tensor_parallel_size=2. Tensor parallelism splits attention
      heads and MLP dimensions across GPUs, reducing per-GPU memory and enabling
      faster computation through parallelism. For memory efficiency, I would use
      AWQ INT4 quantisation — this halves the model footprint (70B in fp16 = ~140GB,
      INT4 = ~35GB, fitting both GPUs). For latency, continuous batching via vLLM
      with PagedAttention ensures requests don't wait for fixed batch windows.
      TTFT is dominated by the prefill phase — I would monitor this separately from
      decode (TBT) and consider chunked prefill if long system prompts cause TTFT
      spikes. I would also set max_num_seqs to limit concurrency during peak load,
      ensuring latency SLAs are met rather than maximising throughput.
    keywords:
      - "TTFT"
      - "tensor parallel"
      - "vLLM"
      - "continuous batching"
      - "quantisation"
      - "PagedAttention"
