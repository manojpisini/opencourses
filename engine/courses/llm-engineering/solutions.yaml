      1. Mention vLLM specifically (or an equivalent like TGI, TensorRT-LLM)
      2. Discuss tensor parallelism for multi-GPU — not just data parallelism
      3. Distinguish prefill latency (affects TTFT) from decode latency (affects TBT)

