      - https://github.com/vllm-project/vllm
      - https://github.com/run-llama/llama_index
      - https://github.com/langchain-ai/langgraph
      - https://github.com/chroma-core/chroma
      - https://github.com/open-telemetry/opentelemetry-python
    open_books:
      - https://d2l.ai
      - https://github.com/rasbt/LLMs-from-scratch
    papers:
      - https://arxiv.org/abs/1706.03762
      - https://arxiv.org/abs/2203.15556
      - https://arxiv.org/abs/2305.18290
      - https://arxiv.org/abs/2106.09685
      - https://arxiv.org/abs/2305.14314
      - https://arxiv.org/abs/2005.11401
      - https://arxiv.org/abs/2307.08691
      - https://arxiv.org/abs/2210.03629
    rfcs_and_specs:
      - OpenTelemetry Semantic Conventions
      - OWASP Top 10 for Large Language Model Applications
      - HuggingFace model cards and dataset cards

  testing:
    philosophy:
      - Test algorithmic components with deterministic unit tests and property checks
      - Evaluate LLM applications with fixed benchmark datasets, saved traces, and explicit thresholds
      - Mock or isolate expensive model calls in CI; never require paid API keys for grading
      - Treat quality metrics as regression signals, not hidden or subjective grading logic
    types:
      - deterministic
      - randomized
      - fuzz
      - property-based
      - benchmark
      - trace-regression
    generators:
      - assets/tests/test_bpe.py
      - assets/tests/test_block.py

  capstone:
    level: advanced
    type: open-source production RAG and agent system
    requirements:
      - Uses an open-weight model or locally served model endpoint
      - Includes RAG with chunking, embedding, retrieval, reranking, and source attribution
      - Includes an agent loop with bounded steps, validated tools, and failure handling
      - Includes deterministic tests, evaluation datasets, benchmark reports, and OpenTelemetry traces
      - Ships as a public repository with README, license, CI, security notes, and contribution guide

  contribution_path:
    - Fix a course explanation, diagram, broken link, or stale model reference
    - Add or improve deterministic tests for starter code and assignments
    - Add new open-source resources to the FOSS resource library with attribution
    - Improve the capstone template, observability examples, or security audit checklist
