          ## Assignment: Annotated Transformer Implementation

          Implement a complete, minimal GPT-style transformer in a single Python file
          (`transformer.py`) and write an accompanying explanation (`EXPLANATION.md`).

          ### Requirements

          | Component | Requirement |
          |---|---|
          | BPE Tokenizer | From scratch (no tiktoken/tokenizers imports) |
          | Embedding layer | Token + positional (learned absolute) |
          | TransformerBlock | Pre-LayerNorm, MHA, MLP with GELU |
          | Causal mask | Correct upper-triangular future masking |
          | Forward pass | Produces logits of shape [B, T, vocab_size] |
          | Tests | All 3 provided tests must pass |
          | EXPLANATION.md | Explain every non-obvious design choice (1–2 sentences each) |

          ### Milestone Schedule

          | Day | Milestone |
          |---|---|
          | 2 | BPE tokenizer passing tests |
          | 4 | Full TransformerBlock + forward pass |
          | 5 | EXPLANATION.md and final submission |

          ### Submission
          Push all files to a public GitHub repository and submit the URL.

