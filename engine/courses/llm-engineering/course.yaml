# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 12 — FINAL TEST
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

final_test:
  id: final-test
  title: "LLM Engineering — Final Comprehensive Exam"
  passing_score: 75
  max_attempts: 2
  time_limit_minutes: 60
  randomize_questions: false
  randomize_options: true
  show_answers_after: passed

  sections:

    - id: ft-s-01
      title: "Architecture and Theory (40 pts)"
      weight: 40

      questions:

        - id: ft-s-01-q-01
          type: mcq
          points: 8
          difficulty: hard
          topic: transformer
          question: "Llama-3 uses Grouped Query Attention with 32 query heads and 8 KV
            heads. During generation of a 2048-token sequence, how does the KV cache
            memory compare to standard multi-head attention with 32 KV heads?"
          options:
            - "Same — GQA doesn't affect KV cache size"
            - "4× smaller — 8 KV heads vs 32 means 4× fewer KV matrices stored"
            - "8× smaller — reduced by the number of KV heads"
            - "2× smaller — GQA halves the number of parameters"

        - id: ft-s-01-q-02
          type: mcq
          points: 8
          difficulty: hard
          topic: alignment
          question: "After DPO training, you observe that your model's preferred response
            log-probability increased by 2.1 nats but the rejected response log-probability
            also increased by 1.8 nats relative to the reference model. Is this a problem?"
          options:
            - "No — any increase in preferred probability is a success"
            - "Yes — ideally rejected response probability should decrease. Both increasing
              suggests reward hacking: the model learned to be more verbose/confident
              generally, not to distinguish preferred from rejected"
            - "No — as long as the gap between preferred and rejected increased, DPO succeeded"
            - "Yes — DPO must decrease all probabilities relative to the reference"

        - id: ft-s-01-q-03
          type: short
          points: 12
          difficulty: hard
          topic: systems
          question: "You are the founding ML engineer at a legal AI startup. You must
            decide whether to fine-tune an open-source LLM or use RAG to handle
            queries over a corpus of 50,000 legal briefs. The corpus is updated
            weekly with 500 new briefs. Justify your architecture choice in 5–7 sentences."
          grading: keywords
          keywords:
            - "RAG"
            - "weekly"
            - "freshness"
            - "retrieval"
            - "fine-tuning"
            - "cost"
            - "hallucination"

        - id: ft-s-01-q-04
          type: mcq
          points: 12
          difficulty: hard
          topic: inference
          question: "vLLM's PagedAttention achieves higher GPU memory utilisation than
            naive serving. Which mechanism makes this possible?"
          options:
            - "Pre-allocating exactly as much KV cache as the average request needs"
            - "Splitting KV cache into fixed-size pages allocated on demand, allowing
              non-contiguous physical memory to serve a logical sequence — eliminating
              fragmentation from pre-allocated max-length buffers"
            - "Compressing KV tensors using SVD before storing them"
            - "Sharing KV cache between different user sessions that have identical prefixes"

    - id: ft-s-02
      title: "Code Reading and Debugging (35 pts)"
      weight: 35

      questions:

        - id: ft-s-02-q-01
          type: code_output
          points: 10
          difficulty: hard
          topic: lora
          question: "What does this code print?"
          code:
            language: python
            snippet: |
              import torch, torch.nn as nn
              from peft import LoraConfig, get_peft_model

              base = nn.Linear(1024, 1024, bias=False)
              model = nn.ModuleDict({"fc": base})
              cfg = LoraConfig(r=8, lora_alpha=16, target_modules=["fc"], task_type=None)
              peft_model = get_peft_model(model, cfg)

              total     = sum(p.numel() for p in peft_model.parameters())
              trainable = sum(p.numel() for p in peft_model.parameters() if p.requires_grad)
              print(f"{trainable}/{total}")
          options:
            - "16384/1065984"
            - "16384/1048576"
            - "1048576/1065960"
            - "8192/1056768"

        - id: ft-s-02-q-02
          type: code_fix
          points: 12
          difficulty: hard
          topic: rag
          question: "This RAG pipeline has a bug that causes it to return unretrieved
            hallucinated context. Identify and fix it."
          code:
            language: python
            snippet: |
              def query_rag(question: str, collection, llm) -> str:
                  # Step 1: Embed and retrieve
                  results = collection.query(
                      query_texts=[question],
                      n_results=5
                  )
                  # BUG: documents is a nested list [[doc1, doc2, ...]]
                  context = "\n".join(results["documents"])  # <-- bug here

                  prompt = f"Context:\n{context}\n\nQuestion: {question}\nAnswer:"
                  return llm.invoke(prompt)
          grading: manual

        - id: ft-s-02-q-03
          type: code_reading
          points: 13
          difficulty: hard
          topic: agents
          question: "What is the purpose of `should_continue` in this LangGraph agent?"
          code:
            language: python
            snippet: |
              def should_continue(state: AgentState) -> str:
                  last_msg = state["messages"][-1]
                  if hasattr(last_msg, "tool_calls") and last_msg.tool_calls:
                      return "tools"
                  return END

              graph.add_conditional_edges("agent", should_continue)
          options:
            - "It validates that all tool calls succeeded before returning to the user"
            - "It is the routing function — determines whether to loop back through tool
              execution or end the agent (return to user), based on whether the LLM
              made any tool calls in its last message"
            - "It limits the maximum number of tool calls the agent can make"
            - "It checks whether the agent's answer is factually correct before finishing"

    - id: ft-s-03
      title: "System Design (25 pts)"
      weight: 25

      questions:

        - id: ft-s-03-q-01
          type: short
          points: 12
          difficulty: hard
          topic: production
          question: "Design a production LLM evaluation pipeline that runs automatically
            on every model update. Describe what metrics you would track, how you would
            detect regressions, and how you would prevent shipping a broken model.
            Your answer should be 6–8 sentences."
          grading: keywords
          keywords:
            - "evaluation"
            - "regression"
            - "benchmark"
            - "threshold"
            - "CI/CD"
            - "faithfulness"
            - "guard"
            - "canary"

        - id: ft-s-03-q-02
          type: code_write
          points: 13
          difficulty: hard
          topic: rag
          question: |
            Write a Python function `evaluate_rag_faithfulness(answer: str, context: list[str], required_claims: list[str]) -> float`
            that implements deterministic claim-support faithfulness scoring.

            The function should:
            1. Join the retrieved `context` into searchable text
            2. Check how many `required_claims` appear in both the context and answer
            3. Return supported_claims / total_claims as a float from 0.0 to 1.0
            4. Return 0.0 when no required claims are provided
          language: python
          starter: |
            def evaluate_rag_faithfulness(answer: str, context: list[str], required_claims: list[str]) -> float:
                """Return deterministic faithfulness score 0.0–1.0."""
                # Your implementation here
                pass
          grading: manual
          keywords:
            - "context"
            - "required_claims"
            - "float"
            - "score"


