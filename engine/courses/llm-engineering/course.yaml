  # ══════════════════════════════════════════════════════════════════════════
  # CHAPTER 7 — AI Agents and Multi-Agent Systems
  # ══════════════════════════════════════════════════════════════════════════

    - id: ch-07
      title: "AI Agents: From ReAct to Multi-Agent Orchestration"
      description: >
        Build, evaluate, and reason about LLM-powered agents — the ReAct pattern,
        tool use, memory systems, LangGraph state machines, and multi-agent
        collaboration architectures.
      duration_minutes: 480
      free_preview: false

      outcomes:
        - Implement a ReAct agent with at least 3 tools using LangGraph
        - Design an agent evaluation benchmark and measure trajectory quality
        - Explain the failure modes of agents (infinite loops, tool misuse, hallucinated calls)
        - Implement a two-agent collaboration (planner + executor) pattern
        - Apply safety guardrails: input validation, tool call limits, sandboxing

      sections:

        - id: ch-07-s-01
          title: "ReAct and Tool Use"
          description: "The reasoning-acting loop that makes LLMs useful as agents."

          lessons:

            - id: ch-07-s-01-l-01
              title: "ReAct: Reason, Act, Observe"
              type: reading
              duration_minutes: 25
              free_preview: false
              description: >
                Read the ReAct paper and understand the thought-action-observation
                loop, tool schemas, and how function calling implements this.

              content:
                reading:
                  url: "https://arxiv.org/abs/2210.03629"
                  source: "ReAct: Synergizing Reasoning and Acting in Language Models"
                  credit_id: src-paper-react
                  estimated_minutes: 30
                  sections_to_read:
                    - "Section 1: Introduction"
                    - "Section 2: ReAct: Synergizing Reasoning and Acting"
                    - "Section 3: Knowledge-Intensive Reasoning Tasks"

                text:
                  format: markdown
                  body: |
                    ## The ReAct Loop

                    ```
                    Thought: I need to find the current price of AAPL stock.
                    Action: get_stock_price(ticker="AAPL")
                    Observation: AAPL is $189.34 as of 2025-05-23
                    Thought: Now I have the price. I can answer the question.
                    Final Answer: Apple's current stock price is $189.34.
                    ```

                    This interleaving of reasoning (Thought) and acting (Action)
                    is the key insight. Pure reasoning (CoT) cannot take actions;
                    pure acting (tool calling without reasoning) makes no plan.

                    ## Function Calling / Tool Use

                    Modern models implement ReAct through structured function calling:

                    ```python
                    tools = [
                        {
                            "type": "function",
                            "function": {
                                "name": "get_stock_price",
                                "description": "Get current stock price for a ticker symbol",
                                "parameters": {
                                    "type": "object",
                                    "properties": {
                                        "ticker": {"type": "string", "description": "Stock ticker, e.g. AAPL"}
                                    },
                                    "required": ["ticker"]
                                }
                            }
                        }
                    ]
                    ```

                    ## Agent Failure Modes to Know

                    | Failure | Cause | Mitigation |
                    |---|---|---|
                    | Infinite loop | Model keeps calling tools without progress | Max steps limit |
                    | Tool hallucination | Calls non-existent tool or wrong arguments | Strict schema validation |
                    | Context overflow | Long histories exhaust context window | Sliding window or summarisation |
                    | Prompt injection | Malicious content in tool results | Output sanitisation |

                files:
                  - label: "ReAct loop: thought, action, observation"
                    file: assets/images/ch-07-react-loop.png
                    type: image

              tags:
                - agents
                - react
                - tool-use

            - id: ch-07-s-01-l-02
              title: "Code: Build a ReAct Agent with LangGraph"
              type: code
              duration_minutes: 60
              free_preview: false
              description: >
                Implement a multi-tool research agent using LangGraph's state
                machine abstraction.

              content:
                code_blocks:

                  - id: cb-ch07-01
                    title: "LangGraph ReAct agent with web search and calculator"
                    language: python
                    file: assets/starter/ch-07/react_agent.py
                    runnable: true
                    snippet: |
                      from langgraph.graph import StateGraph, END
                      from langgraph.prebuilt import ToolNode
                      from langchain_core.messages import HumanMessage, SystemMessage
                      from langchain_community.tools import DuckDuckGoSearchRun
                      from langchain_core.tools import tool
                      from langchain_ollama import ChatOllama
                      import math

                      # --- Define Tools ---

                      search = DuckDuckGoSearchRun()

                      @tool
                      def calculator(expression: str) -> str:
                          """Evaluate a mathematical expression. Input: a valid Python math expression."""
                          try:
                              result = eval(expression, {"__builtins__": {}}, vars(math))
                              return str(result)
                          except Exception as e:
                              return f"Error: {e}"

                      @tool
                      def get_word_count(text: str) -> str:
                          """Count the number of words in a text."""
                          return str(len(text.split()))

                      tools = [search, calculator, get_word_count]

                      # --- Build the Graph ---

                      from typing import TypedDict, Annotated
                      import operator
                      from langchain_core.messages import BaseMessage

                      class AgentState(TypedDict):
                          messages: Annotated[list[BaseMessage], operator.add]

                      llm   = ChatOllama(model="llama3.1:8b", temperature=0)
                      llm_with_tools = llm.bind_tools(tools)

                      def agent_node(state: AgentState):
                          result = llm_with_tools.invoke(state["messages"])
                          return {"messages": [result]}

                      def should_continue(state: AgentState):
                          last_msg = state["messages"][-1]
                          if hasattr(last_msg, "tool_calls") and last_msg.tool_calls:
                              return "tools"
                          return END

                      graph = StateGraph(AgentState)
                      graph.add_node("agent", agent_node)
                      graph.add_node("tools", ToolNode(tools))
                      graph.set_entry_point("agent")
                      graph.add_conditional_edges("agent", should_continue)
                      graph.add_edge("tools", "agent")
                      app = graph.compile()

                      # --- Run ---
                      result = app.invoke({
                          "messages": [
                              SystemMessage(content="You are a research assistant. Use tools to answer accurately."),
                              HumanMessage(content="What is the square root of the number of countries in the UN?"),
                          ]
                      })
                      print(result["messages"][-1].content)
                    explanation: |
                      LangGraph models agent execution as a state machine:
                      - `agent_node`: LLM decides next action (or finishes)
                      - `tools` node: executes tool calls
                      - `should_continue`: conditional edge — loop back if tools called, else END

                      The graph handles the ReAct loop automatically. You define
                      tools as Python functions with type hints — LangGraph generates
                      the JSON schema for the model.

                files:
                  - label: "LangGraph agent state machine"
                    file: assets/images/ch-07-langgraph.png
                    type: image

              tags:
                - agents
                - langgraph
                - react
                - code

