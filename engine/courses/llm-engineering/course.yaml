# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# SECTION 9 — CURRICULUM
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

curriculum:

  chapters:

  # ══════════════════════════════════════════════════════════════════════════
  # CHAPTER 1 — Transformer Architecture: From Tokens to Attention
  # ══════════════════════════════════════════════════════════════════════════

    - id: ch-01
      title: "Transformer Architecture: From Tokens to Attention"
      description: >
        Dissect the transformer from scratch — tokenization, embeddings, scaled
        dot-product attention, multi-head attention, positional encoding, and the
        full encoder/decoder stack — by reading original papers and live
        open-source code.
      duration_minutes: 540
      free_preview: true

      outcomes:
        - Implement BPE tokenization from scratch and compare it with HuggingFace tokenizers output
        - Derive scaled dot-product attention from first principles and implement it in NumPy
        - Read and annotate the attention implementation inside HuggingFace Transformers
        - Explain KV cache, causal masking, and positional encoding (absolute, RoPE, ALiBi)

      sections:

        - id: ch-01-s-01
          title: "Tokenization: How Text Becomes Numbers"
          description: "From raw strings to token IDs — BPE, WordPiece, and the
            vocabulary construction pipeline."

          lessons:

            - id: ch-01-s-01-l-01
              title: "Why Tokenization Matters: The Unit of LLM Thought"
              type: reading
              duration_minutes: 25
              free_preview: true
              description: >
                Survey of tokenization strategies with an eye on what
                tokenization choices mean for model capability and failure modes.

              content:
                reading:
                  url: "https://www.youtube.com/watch?v=zduSFxRajkE"
                  source: "Andrej Karpathy — Let's build the GPT Tokenizer"
                  credit_id: src-video-karpathy-tokenizer
                  estimated_minutes: 120
                  sections_to_read:
                    - "First 30 min: motivation and the character tokenizer"
                    - "30–70 min: BPE algorithm from scratch"

                text:
                  format: markdown
                  body: |
                    ## Before You Watch

                    **Goal:** After this lesson you should be able to explain
                    why tokenization is not a solved problem and why it directly
                    affects model performance on tasks like arithmetic, code,
                    and non-English languages.

                    **Things to notice while watching:**
                    - Why can language models struggle with character-counting tasks such as counting letters in "strawberry"?
                    - What is the merge table in BPE and how is it learned?
                    - Why does Llama 3 use a 128,000-token vocabulary vs GPT-2's 50,257?

                    ## After You Watch

                    Open the companion repo and run the BPE notebook:
                    ```bash
                    git clone https://github.com/karpathy/minbpe
                    cd minbpe
                    pip install -e .
                    python -m pytest tests/
                    ```

                    ## Key Concepts

                    | Concept | Short Definition |
                    |---|---|
                    | BPE (Byte-Pair Encoding) | Iteratively merge most frequent byte pair into a new token |
                    | Vocabulary size | Number of distinct tokens the model knows |
                    | Tokenization fertility | Average tokens per word — higher = more expensive |
                    | Special tokens | `[BOS]`, `[EOS]`, `[PAD]`, `<|im_start|>` etc. |

                    ## Common Mistake
                    > "Tokenization is just splitting on spaces." It is not.
                    > BPE produces subword tokens — `"running"` may become
                    > `["run", "ning"]` or `["running"]` depending on frequency.

                supplemental:
                  - label: "minbpe — minimal BPE tokenizer (Karpathy)"
                    url: "https://github.com/karpathy/minbpe"
                    type: repo
                    credit_id: src-repo-nanoGPT
                    required: false
                  - label: "HuggingFace tokenizers"
                    url: "https://github.com/huggingface/tokenizers"
                    type: repo
                    required: false
                    note: "Read the BPE model and Python bindings for a production tokenizer implementation."

              tags:
                - tokenization
                - bpe
                - vocabulary

            - id: ch-01-s-01-l-02
              title: "Code Walkthrough: HuggingFace Tokenizer Source"
              type: code
              duration_minutes: 30
              free_preview: true
              description: >
                Walk through the PreTrainedTokenizerFast and the BPE model
                implementation inside the HuggingFace tokenizers Rust library.

              content:
                text:
                  format: markdown
                  body: |
                    ## Reading Open Source: tokenizers library

                    The HuggingFace `tokenizers` library (written in Rust, with
                    Python bindings) is what powers all HF models. We will trace
                    the encode path from Python call to token IDs.

                    **Repository:** https://github.com/huggingface/tokenizers

                code_blocks:

                  - id: cb-ch01-01
                    title: "Loading and inspecting a tokenizer"
                    language: python
                    file: assets/starter/ch-01/tokenizer_inspect.py
                    runnable: true
                    snippet: |
                      from transformers import AutoTokenizer

                      # Load Llama-3 tokenizer (no weights needed — just the vocab)
                      tok = AutoTokenizer.from_pretrained("meta-llama/Meta-Llama-3-8B")

                      text = "The transformer architecture changed everything."
                      ids  = tok.encode(text)
                      back = tok.decode(ids)

                      print(f"Text  : {text}")
                      print(f"Tokens: {[tok.decode([i]) for i in ids]}")
                      print(f"IDs   : {ids}")
                      print(f"Vocab : {tok.vocab_size:,}")
                      print(f"Back  : {back}")
                    explanation: |
                      `AutoTokenizer.from_pretrained` downloads the tokenizer config
                      and vocab (not model weights). `encode` runs BPE and returns
                      integer IDs. `decode` inverts the merge table.

                      Note how each subword token maps to a readable string via
                      `tok.decode([single_id])` — useful for debugging tokenization
                      artifacts (trailing spaces, capitalization tokens, etc.).
                    expected_output: |
                      Text  : The transformer architecture changed everything.
                      Tokens: ['The', ' transformer', ' architecture', ' changed', ' everything', '.']
                      IDs   : [791, 43330, 18112, 3463, 4395, 13]
                      Vocab : 128256
                      Back  : The transformer architecture changed everything.

                  - id: cb-ch01-02
                    title: "BPE merge step — implemented from scratch"
                    language: python
                    file: assets/starter/ch-01/bpe_scratch.py
                    runnable: true
                    snippet: |
                      def get_stats(ids: list[int]) -> dict[tuple, int]:
                          """Count frequency of consecutive pairs."""
                          counts = {}
                          for pair in zip(ids, ids[1:]):
                              counts[pair] = counts.get(pair, 0) + 1
                          return counts

                      def merge(ids: list[int], pair: tuple, idx: int) -> list[int]:
                          """Replace all occurrences of pair with new token idx."""
                          out = []
                          i = 0
                          while i < len(ids):
                              if i < len(ids) - 1 and (ids[i], ids[i+1]) == pair:
                                  out.append(idx)
                                  i += 2
                              else:
                                  out.append(ids[i])
                                  i += 1
                          return out

                      # Example: train a tiny BPE on a short corpus
                      corpus = "aaabdaaabac"
                      ids = list(map(ord, corpus))   # byte-level start
                      print(f"Initial: {ids} (len={len(ids)})")

                      # One merge step
                      stats  = get_stats(ids)
                      top    = max(stats, key=stats.get)
                      new_id = max(ids) + 1
                      ids    = merge(ids, top, new_id)
                      print(f"After merging {top!r} → {new_id}: {ids}")
                    explanation: |
                      This is the core BPE loop in ~20 lines. In production
                      (tiktoken, HF tokenizers) this runs in Rust for speed, but
                      the algorithm is identical. The merge table learned here is
                      what gets serialized into `tokenizer.json`.
                    expected_output: |
                      Initial: [97, 97, 97, 98, 100, 97, 97, 97, 98, 97, 99] (len=11)
                      After merging (97, 97) → 256: [256, 97, 98, 100, 256, 97, 98, 97, 99]

              tags:
                - tokenization
                - bpe
                - open-source-reading

            - id: ch-01-s-01-l-03
              title: "Exercise: Implement BPE Training"
              type: exercise
              duration_minutes: 60
              free_preview: false
              description: >
                Train a BPE tokenizer on a small corpus, produce a merge table,
                and verify your tokenizer can encode and decode round-trip.

              content:
                text:
                  format: markdown
                  body: |
                    ## Exercise: BPE Tokenizer from Scratch

                    Implement `BasicBPETokenizer` in `starter.py` with the
                    following interface:

                    ```python
                    class BasicBPETokenizer:
                        def train(self, text: str, vocab_size: int) -> None: ...
                        def encode(self, text: str) -> list[int]: ...
                        def decode(self, ids: list[int]) -> str: ...
                    ```

                    ### Requirements

                    | Requirement | Detail |
                    |---|---|
                    | Start from bytes | Initial vocab = 256 byte values |
                    | Merge rule | Always merge the most frequent pair first |
                    | Deterministic | Same corpus → same merge table |
                    | Round-trip | `decode(encode(text)) == text` for ASCII input |

                    ### Setup
                    ```bash
                    git clone https://github.com/opencourses/llm-engineering
                    cd llm-engineering/ch-01/bpe-exercise
                    pip install -r requirements.txt
                    pytest tests/test_bpe.py -v
                    ```

                    ### Rules
                    - Do not import tiktoken, tokenizers, or sentencepiece.
                    - Standard library + NumPy only.
                    - All 5 test cases must pass.

                    ### Submission
                    Push your implementation to `main` and submit the GitHub URL.

                exercise:
                  starter_repo: "https://github.com/opencourses/llm-engineering"
                  solution_repo: null
                  branch: main
                  entry_file: "ch-01/bpe-exercise/starter.py"
                  test_command: "pytest tests/test_bpe.py -v"
                  submission_type: github_url

                hints:
                  - level: 1
                    reveal_after_minutes: 20
                    text: "Start with `train`. Encode the text as UTF-8 bytes first
                      (list of ints 0–255). Then repeatedly call get_stats → find max
                      → merge."
                  - level: 2
                    reveal_after_minutes: 40
                    text: "For `encode`, you need to apply your learned merge rules in
                      the exact order they were learned (not re-sort by frequency on
                      the new text)."
                  - level: 3
                    reveal_after_minutes: 55
                    text: "For `decode`, build the inverse map: `{token_id: bytes}`.
                      Start from the 256 byte tokens, then for each merge rule
                      `(a, b) → c`, record `vocab[c] = vocab[a] + vocab[b]`.
                      Join all byte arrays and decode as UTF-8."

              tags:
                - tokenization
                - bpe
                - exercise

            - id: ch-01-s-01-l-04
              title: "Quiz: Tokenization Concepts"
              type: quiz
              duration_minutes: 10
              free_preview: false
              description: "Formative check on BPE, vocabulary size, and tokenization trade-offs."

              content:
                text:
                  format: markdown
                  body: "Check your understanding before moving on to embeddings."

                questions:

                  - id: quiz-ch01-q-01
                    type: mcq
                    question: "A text input is tokenized into 10 tokens by Llama-3 (128k vocab)
                      and into 14 tokens by GPT-2 (50k vocab). Which model will pay
                      attention over fewer positions when processing this text?"
                    options:
                      - "GPT-2, because it has a smaller vocabulary"
                      - "Llama-3, because 10 < 14 — fewer tokens means shorter sequence"
                      - "They are identical — attention is over characters, not tokens"
                      - "Cannot be determined without knowing the model architecture"
                    answer: 1
                    explanation: "Attention complexity is O(n²) in sequence length n.
                      Llama-3's larger vocabulary produces shorter token sequences for the
                      same text, so self-attention is over 10 positions vs 14 — directly
                      cheaper and more context-efficient."

                  - id: quiz-ch01-q-02
                    type: truefalse
                    question: "BPE tokenization is trained on the model's training corpus
                      and is learned jointly with the model weights."
                    answer: false
                    explanation: "BPE is trained separately, before model training, as a
                      pre-processing step. The tokenizer's merge table is fixed once
                      trained and does not change during model training. This is why you
                      can load a tokenizer with `AutoTokenizer.from_pretrained` without
                      downloading model weights."

                  - id: quiz-ch01-q-03
                    type: code_output
                    question: "What does this Python snippet print?"
                    code:
                      language: python
                      snippet: |
                        tok_a = ["un", "##happi", "##ness"]   # WordPiece style
                        tok_b = ["un", "happiness"]
                        print(len(tok_a), len(tok_b))
                    options:
                      - "2 2"
                      - "3 2"
                      - "3 3"
                      - "2 3"
                    answer: 1
                    explanation: "tok_a has 3 elements, tok_b has 2. WordPiece uses the
                      `##` prefix to mark continuation subwords. This snippet just counts
                      list length — Python list len() is 3 and 2 respectively."

              tags:
                - tokenization
                - quiz

        - id: ch-01-s-02
          title: "Embeddings and Positional Encoding"
          description: "Turning token IDs into dense vectors, and giving the model
            a sense of sequence position."

          lessons:

            - id: ch-01-s-02-l-01
              title: "Token Embeddings: From IDs to Vectors"
              type: reading
              duration_minutes: 20
              free_preview: false
              description: >
                Reading and code walkthrough covering the embedding matrix,
                its role in the model, and the intuition for how meanings are
                encoded in high-dimensional space.

              content:
                reading:
                  url: "https://d2l.ai/chapter_attention-mechanisms-and-transformers/transformer.html"
                  source: "Dive into Deep Learning — Transformers Chapter"
                  credit_id: src-book-d2l
                  estimated_minutes: 40
                  sections_to_read:
                    - "10.7.1 Model"
                    - "10.7.2 Positionwise Feed-Forward Networks"

                text:
                  format: markdown
                  body: |
                    ## Key Insight: Embeddings are Lookup Tables

                    The embedding layer is just a matrix `E` of shape
                    `[vocab_size, d_model]`. Looking up token `i` returns row `i`.
                    During training, gradient descent adjusts these rows so that
                    semantically similar tokens end up with similar vectors.

                    ```python
                    import torch
                    import torch.nn as nn

                    vocab_size = 128_256   # Llama-3
                    d_model    = 4_096     # Llama-3 8B

                    embedding = nn.Embedding(vocab_size, d_model)
                    token_ids = torch.tensor([791, 43330, 18112])  # "The transformer architecture"
                    vectors   = embedding(token_ids)               # shape: [3, 4096]
                    print(vectors.shape)  # torch.Size([3, 4096])
                    ```

                    ## Positional Encoding: The Three Main Families

                    | Method | Used by | Key property |
                    |---|---|---|
                    | Learned absolute | BERT, early GPT | Simple, but can't generalise beyond train length |
                    | Sinusoidal (Vaswani) | Original transformer | Deterministic, generalises somewhat |
                    | RoPE (Rotary) | Llama, Mistral, Qwen | Relative positions, scales with context |
                    | ALiBi | BLOOM, MPT | Linear attention bias, strong length generalisation |

                    **RoPE is the current standard.** Read the RoPE paper
                    (Su et al. 2021) linked in supplemental resources.

                supplemental:
                  - label: "RoPE paper: RoFormer: Enhanced Transformer with Rotary Position Embedding"
                    url: "https://arxiv.org/abs/2104.09864"
                    type: article
                    required: false

              tags:
                - embeddings
                - positional-encoding
                - rope

        - id: ch-01-s-03
          title: "Scaled Dot-Product Attention & Multi-Head Attention"
          description: "The mathematical heart of the transformer — derive, implement,
            and verify attention from scratch."

          lessons:

            - id: ch-01-s-03-l-01
              title: "Deriving Attention: Queries, Keys, Values"
              type: reading
              duration_minutes: 30
              free_preview: false
              description: >
                Walk through the attention formula, understand why it is scaled,
                and build intuition for what Q, K, V represent.

              content:
                reading:
                  url: "https://www.youtube.com/watch?v=kCc8FmEb1nY"
                  source: "Andrej Karpathy — Let's build GPT"
                  credit_id: src-video-karpathy-gpt
                  estimated_minutes: 90
                  sections_to_read:
                    - "0:00 – 1:05:00 (attention mechanism section)"

                text:
                  format: markdown
                  body: |
                    ## The Attention Formula

                    $$\text{Attention}(Q, K, V) = \text{softmax}\!\left(\frac{QK^T}{\sqrt{d_k}}\right) V$$

                    **Why divide by √d_k?**
                    In high dimensions, dot products grow large (variance = d_k for
                    unit Gaussians). Large values push softmax into saturation
                    (gradients → 0). Scaling by √d_k keeps variance ≈ 1.

                    **What Q, K, V actually are:**
                    - **Q (Query):** "What am I looking for?"
                    - **K (Key):** "What do I advertise to other tokens?"
                    - **V (Value):** "What do I actually return if selected?"

                    All three are linear projections of the same input x:
                    ```
                    Q = xW_Q,   K = xW_K,   V = xW_V
                    ```

                    ## Causal Masking (Decoder-only)
                    GPT-style models use a *causal* mask: token i can only attend
                    to tokens j ≤ i. Implemented as adding −∞ to future positions
                    before softmax (so they become 0 weight after softmax).

                    ```python
                    mask = torch.triu(torch.ones(T, T), diagonal=1).bool()
                    attn = attn.masked_fill(mask, float('-inf'))
                    ```

                files:
                  - label: "Scaled dot-product attention: Q, K, V, softmax, output"
                    file: assets/images/ch-01-attention-diagram.png
                    type: image

              tags:
                - attention
                - transformer

            - id: ch-01-s-03-l-02
              title: "Code: Implement Attention from Scratch"
              type: code
              duration_minutes: 45
              free_preview: false
              description: >
                Implement scaled dot-product attention and multi-head attention in
                pure PyTorch, then verify against HuggingFace's implementation.

              content:
                text:
                  format: markdown
                  body: |
                    ## Implementing Self-Attention

                    We will implement `CausalSelfAttention` matching the nanoGPT
                    version. Open the reference at:
                    https://github.com/karpathy/nanoGPT/blob/master/model.py#L37

                code_blocks:

                  - id: cb-ch01-03
                    title: "Scaled dot-product attention (single head)"
                    language: python
                    file: assets/starter/ch-01/attention_scratch.py
                    runnable: true
                    snippet: |
                      import torch
                      import torch.nn.functional as F
                      import math

                      def scaled_dot_product_attention(
                          q: torch.Tensor,   # [B, T, d_k]
                          k: torch.Tensor,   # [B, T, d_k]
                          v: torch.Tensor,   # [B, T, d_v]
                          causal: bool = True,
                      ) -> torch.Tensor:
                          B, T, d_k = q.shape
                          scale = math.sqrt(d_k)

                          # [B, T, T] — each row is a query attending over all keys
                          scores = torch.bmm(q, k.transpose(1, 2)) / scale

                          if causal:
                              mask = torch.triu(torch.ones(T, T, device=q.device), diagonal=1).bool()
                              scores = scores.masked_fill(mask, float('-inf'))

                          weights = F.softmax(scores, dim=-1)   # [B, T, T]
                          return torch.bmm(weights, v)           # [B, T, d_v]

                      # Quick smoke test
                      B, T, d_k = 2, 8, 64
                      q = torch.randn(B, T, d_k)
                      k = torch.randn(B, T, d_k)
                      v = torch.randn(B, T, d_k)
                      out = scaled_dot_product_attention(q, k, v)
                      print(f"Output shape: {out.shape}")   # [2, 8, 64]
                    explanation: |
                      Key points:
                      1. `torch.bmm` does batched matrix multiply: [B,T,d] × [B,d,T] → [B,T,T].
                      2. `triu(..., diagonal=1)` creates an upper triangular mask — positions
                         above the diagonal are future tokens, set to −∞.
                      3. `softmax(dim=-1)` normalises each row (each query's distribution
                         over all keys) to sum to 1.
                    expected_output: |
                      Output shape: torch.Size([2, 8, 64])

                  - id: cb-ch01-04
                    title: "Multi-head attention"
                    language: python
                    file: assets/starter/ch-01/mha_scratch.py
                    runnable: true
                    snippet: |
                      import torch
                      import torch.nn as nn
                      import torch.nn.functional as F
                      import math

                      class MultiHeadAttention(nn.Module):
                          def __init__(self, d_model: int, n_heads: int):
                              super().__init__()
                              assert d_model % n_heads == 0
                              self.d_model  = d_model
                              self.n_heads  = n_heads
                              self.d_head   = d_model // n_heads
                              self.W_q = nn.Linear(d_model, d_model, bias=False)
                              self.W_k = nn.Linear(d_model, d_model, bias=False)
                              self.W_v = nn.Linear(d_model, d_model, bias=False)
                              self.W_o = nn.Linear(d_model, d_model, bias=False)

                          def forward(self, x: torch.Tensor) -> torch.Tensor:
                              B, T, _ = x.shape
                              H, D = self.n_heads, self.d_head

                              # Project and split into heads: [B, T, d_model] → [B, H, T, D]
                              q = self.W_q(x).view(B, T, H, D).transpose(1, 2)
                              k = self.W_k(x).view(B, T, H, D).transpose(1, 2)
                              v = self.W_v(x).view(B, T, H, D).transpose(1, 2)

                              # Attention per head
                              scale  = math.sqrt(D)
                              scores = (q @ k.transpose(-2, -1)) / scale   # [B, H, T, T]
                              mask   = torch.triu(torch.ones(T, T, device=x.device), diagonal=1).bool()
                              scores = scores.masked_fill(mask, float('-inf'))
                              w      = F.softmax(scores, dim=-1)
                              out    = w @ v                                 # [B, H, T, D]

                              # Merge heads: [B, H, T, D] → [B, T, d_model]
                              out = out.transpose(1, 2).contiguous().view(B, T, self.d_model)
                              return self.W_o(out)

                      mha = MultiHeadAttention(d_model=512, n_heads=8)
                      x   = torch.randn(2, 16, 512)
                      out = mha(x)
                      print(f"Output shape: {out.shape}")
                    explanation: |
                      Multi-head attention runs H parallel attention operations on
                      d/H dimensional projections of Q, K, V. This lets each head
                      specialise — some heads learn syntactic relations, others
                      semantic co-reference, etc. The outputs are concatenated and
                      projected back to d_model by W_o.
                    expected_output: |
                      Output shape: torch.Size([2, 16, 512])

                files:
                  - label: "Attention data flow"
                    file: assets/images/ch-01-attention-diagram.png
                    type: image

              tags:
                - attention
                - multi-head-attention
                - pytorch

