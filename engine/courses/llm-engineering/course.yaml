final_assignment:
  id: final-assignment
  title: "Capstone: Open-Source Production LLM System"
  duration_days: 21
  submission_type: github_url

  content:
    text:
      format: markdown
      body: |
        ## Capstone: Build and Ship an Open-Source LLM System

        Your capstone is a production-grade LLM system that you will publish as
        a real open-source project on GitHub.

        ### The System

        Build a **domain-specific RAG + Agent** system of your choice. Examples:
        - A research assistant that searches ArXiv, summarises papers, and answers questions
        - A coding assistant that uses RAG over documentation and a code executor
        - A legal document analyst with structured output extraction
        - A medical literature QA system with safety guardrails

        ### Technical Requirements

        | Component | Requirement |
        |---|---|
        | LLM | Open-source only (Llama-3, Mistral, Qwen, etc.) |
        | Retrieval | Vector store + reranking |
        | Agent | At least 3 tools, LangGraph or equivalent |
        | Fine-tuning | Optional but bonus: domain-adapted LoRA adapter |
        | Evaluation | RAGAS + task-specific benchmark (25+ test cases) |
        | Observability | OpenTelemetry traces for all key operations |
        | Security | Input guardrails, max_steps limit, output validation |
        | Serving | vLLM or Ollama serving script |

        ### Open Source Requirements (non-negotiable)

        - Public GitHub repository
        - README with: description, installation, usage, architecture diagram, benchmark results
        - MIT or Apache 2.0 license
        - Contributing guide
        - GitHub Actions CI that runs tests on every push

        ### Milestone Schedule

        | Day | Milestone |
        |---|---|
        | 5 | Repository structure + RAG pipeline working |
        | 10 | Agent integrated + initial benchmark |
        | 14 | Observability + security hardening |
        | 18 | Evaluation complete, README written |
        | 21 | Final submission |

        ## Submission

        Submit your public GitHub repository URL.
        The repository must have at least one GitHub release tagged `v1.0.0`.

  milestones:
    - id: ms-01
      title: "RAG pipeline working"
      due_day: 5
    - id: ms-02
      title: "Agent integrated and benchmarked"
      due_day: 10
    - id: ms-03
      title: "Observability and security complete"
      due_day: 14
    - id: ms-04
      title: "Evaluation and README complete"
      due_day: 18
    - id: ms-05
      title: "Final submission with v1.0.0 release"
      due_day: 21

  rubric:
    - criterion: "RAG pipeline: chunking, embedding, retrieval, reranking"
      points: 20
    - criterion: "Agent: 3+ tools, LangGraph, safety guardrails"
      points: 20
    - criterion: "Evaluation: RAGAS + custom benchmark ≥ 25 cases, results documented"
      points: 20
    - criterion: "Observability: OpenTelemetry traces instrumented"
      points: 10
    - criterion: "Open source quality: README, CI, license, contributing guide"
      points: 15
    - criterion: "Code quality: clean, tested, documented"
      points: 15
  total_points: 100
  passing_score: 70

  review:
    type: maintainer
    sla_days: 7
    feedback_required: true


