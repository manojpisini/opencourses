      - id: ms-01
        title: "BPE tokenizer implemented"
        due_day: 2
      - id: ms-02
        title: "Full model forward pass"
        due_day: 4
      - id: ms-03
        title: "Final submission with EXPLANATION.md"
        due_day: 5

