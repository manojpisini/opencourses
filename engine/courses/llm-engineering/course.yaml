  # ══════════════════════════════════════════════════════════════════════════
  # CHAPTER 4 — Fine-Tuning: LoRA, QLoRA, and Domain Adaptation
  # ══════════════════════════════════════════════════════════════════════════

    - id: ch-04
      title: "Fine-Tuning: LoRA, QLoRA, and Domain Adaptation"
      description: >
        Learn parameter-efficient fine-tuning — the mathematical intuition behind
        LoRA, quantisation with bitsandbytes, full fine-tuning trade-offs, dataset
        design, and the complete cycle of fine-tune → evaluate → push to Hub.
      duration_minutes: 480
      free_preview: false

      outcomes:
        - Explain why LoRA works mathematically (low-rank weight updates)
        - Fine-tune Llama-3 8B with QLoRA on a custom task using a free T4 GPU
        - Design and curate a training dataset for a domain-specific fine-tuning task
        - Evaluate fine-tuned vs base model on task-specific metrics
        - Upload a LoRA adapter to the HuggingFace Hub

      sections:

        - id: ch-04-s-01
          title: "LoRA and QLoRA: Theory and Practice"
          description: "The mathematics of low-rank adaptation and 4-bit quantisation."

          lessons:

            - id: ch-04-s-01-l-01
              title: "LoRA: Why Low-Rank Updates Work"
              type: reading
              duration_minutes: 25
              free_preview: false
              description: >
                Derive LoRA's weight decomposition, understand the rank hyperparameter,
                and see why it is more than a training trick.

              content:
                reading:
                  url: "https://arxiv.org/abs/2106.09685"
                  source: "LoRA: Low-Rank Adaptation of Large Language Models"
                  credit_id: src-paper-lora
                  estimated_minutes: 30
                  sections_to_read:
                    - "Section 1: Introduction"
                    - "Section 4: Our Method"
                    - "Section 7.2: Which weight matrices to apply to"

                text:
                  format: markdown
                  body: |
                    ## The LoRA Decomposition

                    Instead of training the full weight matrix ΔW (d×k parameters),
                    LoRA parameterises the update as two low-rank matrices:

                    ```
                    W_new = W_0 + ΔW = W_0 + B·A
                    where B ∈ ℝ^(d×r) and A ∈ ℝ^(r×k), r << min(d, k)
                    ```

                    For a 4096×4096 weight matrix with rank r=16:
                    - Full: 16.7M parameters
                    - LoRA: 2 × 4096 × 16 = 131k parameters (0.78%)

                    **During training:** only A and B are updated; W_0 is frozen.
                    **During inference:** merge `W = W_0 + B·A` — zero overhead.

                    ## QLoRA: 4-bit Quantisation + LoRA

                    QLoRA (Dettmers et al., 2023) extends LoRA by:
                    1. Quantising the frozen W_0 to 4-bit (NF4) — 4× memory reduction
                    2. Training LoRA adapters in bf16 on top of the quantised base
                    3. Using double quantisation to further reduce memory

                    Result: fine-tune Llama-3 8B in **~10 GB** of VRAM
                    (vs ~30 GB for full fine-tuning in bf16).

                    ## Rank Selection Guidelines

                    | Task | Recommended r | Why |
                    |---|---|---|
                    | Simple style / format | 4–8 | Narrow task, less capacity needed |
                    | Domain adaptation | 16–32 | New vocabulary and facts |
                    | Complex skill (code, math) | 64–128 | High diversity of patterns |

                files:
                  - label: "LoRA low-rank weight decomposition"
                    file: assets/images/ch-04-lora-diagram.png
                    type: image
                  - label: "QLoRA memory reduction: BF16 vs INT8 vs NF4"
                    file: assets/images/ch-04-qlora-memory.png
                    type: image

              tags:
                - lora
                - qlora
                - fine-tuning

            - id: ch-04-s-01-l-02
              title: "Exercise: QLoRA Fine-tune Llama-3 8B"
              type: exercise
              duration_minutes: 120
              free_preview: false
              description: >
                Full QLoRA fine-tuning pipeline on Llama-3 8B for a code generation
                task — dataset prep, training, evaluation, and Hub upload.

              content:
