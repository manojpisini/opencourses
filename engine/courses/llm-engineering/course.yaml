# SECTION 7 — PREREQUISITES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

prerequisites:
  knowledge:
    - "Python: comfortable with classes, decorators, generators, async/await"
    - "NumPy: array broadcasting, matrix math"
    - "Linear algebra: matrix multiplication, eigenvectors, SVD (intuition level)"
    - Basic probability and calculus (gradient, chain rule — intuition, not proofs)
    - "Git and GitHub: branching, pull requests, forks"
    - "Command line: pip, virtual environments, bash basics"

  courses:
    - python-engineering           # OpenCourses Python Engineering
    - data-structures-algorithms   # helpful but not hard required

  tools:
    - name: Python
      url: "https://www.python.org/downloads/"
      required: true
      version_minimum: "3.10.0"

    - name: Git
      url: "https://git-scm.com/"
      required: true
      version_minimum: "2.40.0"

    - name: CUDA Toolkit (or Google Colab)
      url: "https://developer.nvidia.com/cuda-toolkit"
      required: false
      install_guide: "https://docs.nvidia.com/cuda/cuda-installation-guide-linux/"
      notes: "A GPU is required for fine-tuning exercises. Free-tier Google Colab T4
        or Kaggle P100 are sufficient and recommended if you don't have local GPU."

    - name: Docker
      url: "https://docs.docker.com/get-docker/"
      required: false
      notes: "Used in Ch-06 for serving exercises."

  accounts:
    - service: HuggingFace Hub
      url: "https://huggingface.co/join"
