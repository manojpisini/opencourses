content_blueprint:
  philosophy: >
    Teach LLM engineering as an open-source systems discipline: students read
    real implementations, reproduce core mechanisms locally, benchmark trade-offs,
    and ship a public, maintainable LLM application without depending on closed
    grading, proprietary model APIs, or black-box evaluation.

  principles:
    - Uses open-source tooling, open-weight models, and reproducible local workflows wherever possible
    - Reads real source code before abstracting into high-level libraries
    - Separates model capability evaluation from platform grading; grading remains deterministic and transparent
    - Requires every system claim to be backed by measured latency, quality, cost, or safety evidence
    - Builds toward a public GitHub capstone with CI, documentation, tests, telemetry, and a license
    - Encourages contribution back to repositories, docs, examples, and benchmark suites used in the course

  flow:
    - foundations
    - environment-setup
    - guided-fundamentals
    - incremental-challenges
    - production-engineering
    - open-source-exploration
    - capstone-project
    - contribution-path

  chapter_structure:
    - Start with a mental model and a concrete open-source implementation to read
    - Teach the mechanism from first principles with diagrams and small runnable code
    - Compare at least two design choices and explain operational trade-offs
    - Include one deterministic exercise or benchmark that can run without paid APIs
    - End with production failure modes, security notes, and contribution opportunities

  resource_strategy:
    repositories:
      - https://github.com/huggingface/transformers
      - https://github.com/huggingface/tokenizers
      - https://github.com/karpathy/nanoGPT
      - https://github.com/karpathy/minbpe
      - https://github.com/Lightning-AI/litgpt
      - https://github.com/huggingface/trl
