      - id: ctest-ch-01-s-02
        title: "Code Reading"
        weight: 50

        questions:

          - id: ctest-ch-01-s-02-q-01
            type: code_output
            points: 8
            difficulty: medium
            topic: attention
            question: "What is the shape of `attn_weights` after the softmax call?"
            code:
              language: python
              snippet: |
                import torch, torch.nn.functional as F
                B, H, T, D = 2, 8, 16, 64
                q = torch.randn(B, H, T, D)
                k = torch.randn(B, H, T, D)
                scores = (q @ k.transpose(-2, -1)) / (D ** 0.5)
                attn_weights = F.softmax(scores, dim=-1)
                print(attn_weights.shape)
            options:
              - "torch.Size([2, 8, 64, 64])"
              - "torch.Size([2, 8, 16, 16])"
              - "torch.Size([2, 16, 8, 8])"
              - "torch.Size([2, 8, 16, 64])"

          - id: ctest-ch-01-s-02-q-02
            type: code_fix
            points: 8
            difficulty: hard
            topic: attention
            question: "The causal mask below is wrong — the model can attend to future
              tokens. Fix the mask creation so token i can only attend to positions j ≤ i."
            code:
              language: python
              snippet: |
                import torch
                T = 6
                # BUG: this mask allows attending to future tokens
                mask = torch.tril(torch.ones(T, T)).bool()
                scores = torch.randn(1, T, T)
                scores = scores.masked_fill(mask, float('-inf'))
                print(scores)
            grading: manual

          - id: ctest-ch-01-s-02-q-03
            type: code_reading
            points: 8
            difficulty: hard
            topic: multi-head-attention
            question: "In the MultiHeadAttention forward pass below, what does
              `out.transpose(1, 2).contiguous().view(B, T, self.d_model)` accomplish?"
            code:
              language: python
              snippet: |
                # out has shape [B, H, T, D_head] after attention
                out = w @ v  # [B, H, T, D_head]

                # Merge heads back
                out = out.transpose(1, 2).contiguous().view(B, T, self.d_model)
                return self.W_o(out)
            options:
              - "Transposes the batch and head dimensions to speed up the final linear projection"
              - "Rearranges the output from [B, H, T, D_head] to [B, T, H*D_head],
                effectively concatenating all head outputs along the last dimension"
              - "Converts the output to column-major memory layout for GPU efficiency"
              - "Applies a learned permutation to the head outputs before projection"

