const ALL_TYPES = [...new Set(RESOURCES.map(r=>r.type))];
const ALL_CHS   = [0,1,2,3,4,5,6,7];

let typeFilter = new Set();
let chFilter   = new Set();
let searchQ    = '';

function matchResource(r) {
  if(typeFilter.size && !typeFilter.has(r.type)) return false;
  if(chFilter.size  && !r.chapters.some(c=>chFilter.has(c))) return false;
  if(searchQ) {
    const q = searchQ.toLowerCase();
    return (r.title+' '+r.author+' '+(r.desc||'')+' '+(r.howUsed||'')).toLowerCase().includes(q);
  }
  return true;
}

function renderFilterRow(containerId, items, activeSet, getLabel, getColor, toggleFn) {
  const el = document.getElementById(containerId);
  el.innerHTML = '';
  items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'pill' + (activeSet.has(item) ? ' on' : '');
    btn.textContent = getLabel(item);
    if(activeSet.has(item)) btn.style.background = getColor(item);
    btn.onclick = () => toggleFn(item);
    el.appendChild(btn);
  });
}

function render() {
  searchQ = document.getElementById('q').value;

  renderFilterRow('typeRow', ALL_TYPES, typeFilter,
    t => TYPE_META[t].icon + ' ' + TYPE_META[t].label,
    t => '#444',
    t => { typeFilter.has(t) ? typeFilter.delete(t) : typeFilter.add(t); render(); }
  );

  renderFilterRow('chRow', ALL_CHS, chFilter,
    c => CH_LABELS[c],
    c => CH_COLORS[c],
    c => { chFilter.has(c) ? chFilter.delete(c) : chFilter.add(c); render(); }
  );

  const filtered = RESOURCES.filter(matchResource);
  document.getElementById('stats').textContent =
    `${filtered.length} resource${filtered.length!==1?'s':''} across ${[...new Set(filtered.map(r=>r.type))].length} types`;

  const out = document.getElementById('out');
  out.innerHTML = '';

  if(!filtered.length) {
    out.innerHTML = '<div class="empty">No resources match your search.</div>';
    return;
  }

  if(chFilter.size || typeFilter.size || searchQ) {
    const grid = document.createElement('div');
    grid.className = 'res-grid';
    filtered.forEach(r => grid.appendChild(makeCard(r)));
    out.appendChild(grid);
  } else {
    ALL_CHS.forEach(ch => {
      const chRes = filtered.filter(r => r.chapters.includes(ch));
      if(!chRes.length) return;
      const block = document.createElement('div');
      block.className = 'chapter-block';
      const header = document.createElement('div');
      header.className = 'ch-header';
      header.innerHTML = `
        <span class="ch-num" style="background:${CH_COLORS[ch]}">${CH_LABELS[ch]}</span>
        <span class="ch-title">${CH_TITLES[ch]}</span>
        <span class="ch-count">${chRes.length} resources</span>
        <span class="ch-chevron open" id="chev${ch}">▾</span>`;
      const grid = document.createElement('div');
      grid.className = 'res-grid';
      grid.id = 'chgrid'+ch;
      chRes.forEach(r => grid.appendChild(makeCard(r)));
      header.onclick = () => {
        const g = document.getElementById('chgrid'+ch);
        const cv = document.getElementById('chev'+ch);
        const hidden = g.style.display==='none';
        g.style.display = hidden ? 'grid' : 'none';
        cv.classList.toggle('open', hidden);
      };
      block.appendChild(header);
      block.appendChild(grid);
      out.appendChild(block);
    });
  }
}

function makeCard(r) {
  const tm  = TYPE_META[r.type];
  const lc  = LIC_COLORS[r.license] || {bg:'#F1EFE8',col:'#5F5E5A'};
  const div = document.createElement('a');
  div.className = 'card';
  div.href = r.url;
  div.target = '_blank';

  const chBadges = r.chapters.map(c =>
    `<span class="badge" style="background:${CH_COLORS[c]}22;color:${CH_COLORS[c]}">${CH_LABELS[c]}</span>`
  ).join('');

  const licBadge = `<span class="badge" style="background:${lc.bg};color:${lc.col}">${r.license}</span>`;
  const typeBadge= `<span class="badge" style="background:${tm.bg};color:${tm.col}">${tm.label}</span>`;
  const yearBadge= r.year ? `<span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-tertiary)">${r.year}</span>` : '';
  const starBadge= r.stars ? `<span class="badge" style="background:var(--color-background-secondary);color:var(--color-text-tertiary)">★ ${r.stars}</span>` : '';

  div.innerHTML = `
    <div class="card-top">
      <span class="type-icon" aria-hidden="true">${tm.icon}</span>
      <span class="card-title">${r.title}</span>
    </div>
    <div class="card-meta">${typeBadge}${licBadge}${yearBadge}${starBadge}${chBadges}</div>
    <div class="card-desc">${r.desc}</div>
    <div class="card-usage">
      <span class="usage-label">Use in course: </span>${r.howUsed}
    </div>
    ${r.readThis ? `<div class="card-usage"><span class="usage-label">Read: </span>${r.readThis}</div>` : ''}`;
  return div;
}

render();
</script>
