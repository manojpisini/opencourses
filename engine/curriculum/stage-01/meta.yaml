  - title: "Git - The Simple Guide"
    url: "https://rogerdudler.github.io/git-guide/"
    type: "article"
  - title: "Pro Git — Chapters 1 & 2"
    url: "https://git-scm.com/book/en/v2"
    type: "book"
  - title: "Learn Git Branching (interactive)"
    url: "https://learngitbranching.js.org/"
    type: "interactive"
  - title: "Git in 100 Seconds"
    url: "https://www.youtube.com/watch?v=hwP7WQkmECE"
    type: "video"

quiz:
  enabled: true
  pass_score: 70
  max_attempts: 3
