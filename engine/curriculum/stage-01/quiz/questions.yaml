title: "Stage 01 Quiz — Git Foundations"
time_limit_minutes: 15
pass_score: 70
questions:
  - id: q1
    type: mcq
    question: |
      Which command stages ALL modified and new files in the current directory?
    options:
      - "A. git commit -a"
      - "B. git add ."
      - "C. git stage --all"
      - "D. git push"
    answer: 1   # index of correct option (0-based)
    points: 15

  - id: q2
    type: mcq
    question: |
      What does `git log --oneline` display?
    options:
      - "A. Full commit details including diff"
      - "B. Only the latest commit"
      - "C. Each commit on one line (short hash + message)"
      - "D. The working tree status"
    answer: 2
    points: 15

  - id: q3
    type: short
    question: |
      What is the purpose of a `.gitignore` file? Give two examples of files
      that should typically be ignored.
    keywords:
      - ignore
      - untracked
      - node_modules
      - .env
      - secrets
      - dependencies
      - build
    points: 20
    llm_grade: true

  - id: q4
    type: mcq
    question: |
      You are on branch `feature/login` and run `git merge main`. What happens?
    options:
      - "A. main is overwritten with feature/login changes"
      - "B. Changes from main are merged into feature/login"
      - "C. A new branch is created"
      - "D. The current branch is deleted"
    answer: 1
    points: 15

  - id: q5
    type: short
    question: |
      Explain the difference between `git fetch` and `git pull`.
      When would you prefer one over the other?
    keywords:
      - fetch
      - pull
      - merge
      - remote
      - local
      - update
      - review
    points: 20
    llm_grade: true

  - id: q6
    type: mcq
    question: |
      Which conventional commit type should you use for a bug fix?
    options:
      - "A. feat"
      - "B. fix"
      - "C. chore"
      - "D. refactor"
    answer: 1
    points: 15
