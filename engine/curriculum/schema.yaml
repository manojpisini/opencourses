# ═══════════════════════════════════════════════════════════════
# OPENCOURSE — Master Course Definition Schema
# This is the single source of truth for the entire course.
# ═══════════════════════════════════════════════════════════════

course:
  id: git-mastery
  title: "Git Mastery: From Zero to Contributor"
  version: "1.0.0"
  author: "@your-github-username"
  description: >
    A comprehensive course taking you from Git novice to confident open source
    contributor. Fully automated, self-paced, certificate-issuing. Built on
    GitHub infrastructure — no external tools, no paywalls.
  tags: [git, version-control, open-source, developer-tools]
  difficulty: beginner           # beginner | intermediate | advanced
  estimated_hours: 40
  language: en

  # Grading thresholds
  passing_grade: 80              # % to pass each assignment stage
  quiz_passing_grade: 75         # % to pass each quiz

  # Certificate config
  certificate:
    name: "Certified Git Professional"
    id_prefix: "CGM"             # e.g. CGM-2026-0047
    badge_color: "#6e40c9"
    template: templates/cert.svg
    open_badges: true            # emit Open Badges 3.0 JSON
    gpg_sign: true               # GPG sign the certificate
    publish_to: releases         # GitHub Releases

  prerequisites: []              # list of course repo URLs

  cohorts:
    enabled: true
    default_pacing: self-paced   # self-paced | structured

  gamification:
    xp_system: true
    achievements: true
    streaks: true
    leaderboard: true

# ═══════════════════════════════════════════════════════════════
# STAGES
# ═══════════════════════════════════════════════════════════════
stages:

  # ─── STAGE 01 ───────────────────────────────────────────────
  - id: stage-01
    title: "Git Fundamentals"
    description: "Understand what Git is, how it works, and create your first repository"
    branch: stage-01
    required: true
    unlocks: [stage-02]
    time_limit_days: 7
    content: curriculum/stage-01/meta.yaml
    assessment:
      assignment:
        type: assignment
        instructions: curriculum/stage-01/assignment/instructions.md
        starter: curriculum/stage-01/assignment/starter/
        tests: curriculum/stage-01/assignment/tests/
        grader: scripts/graders/stage-01.ts
        points: 100
        attempts_allowed: 3
        time_limit_days: 7
        grading_weights:
          correctness: 0.7
          code_quality: 0.3
        quality_checks:
          - tool: eslint
            config: .eslintrc.json
          - tool: complexity
            max_cyclomatic: 10
        regression_check: false
        mutation_testing: false
      quiz:
        questions: curriculum/stage-01/quiz/questions.yaml
        passing_score: 75
        attempts_allowed: 3
        randomize: true
        question_count: 10
        timed: false
    xp:
      pass_first_attempt: 125
      pass_subsequent: 100
      quiz_pass: 50
      speed_bonus_per_day_early: 10
      perfect_score_bonus: 25

  # ─── STAGE 02 ───────────────────────────────────────────────
  - id: stage-02
    title: "Branching & Merging"
    branch: stage-02
    required: true
    depends_on: [stage-01]
    unlocks: [stage-03]
    content: curriculum/stage-02/meta.yaml
    variants:
      standard:
        trigger: "stages['stage-01'].score < 90"
        branch: stage-02-standard
        grader: scripts/graders/stage-02-standard.ts
        points: 100
      advanced:
        trigger: "stages['stage-01'].score >= 90"
        branch: stage-02-advanced
        grader: scripts/graders/stage-02-advanced.ts
        points: 100
        bonus_points: 50
    assessment:
      assignment:
        type: assignment
        points: 100
        attempts_allowed: 3
        grading_weights:
          correctness: 0.6
          code_quality: 0.4
        regression_check: true
        mutation_testing: true
      quiz:
        questions: curriculum/stage-02/quiz/questions.yaml
        passing_score: 75
        attempts_allowed: 3
        randomize: true
        question_count: 10
        timed: false
    xp:
      pass_first_attempt: 150
      pass_subsequent: 125
      advanced_track_bonus: 50

  # ─── STAGE 03 ───────────────────────────────────────────────
  - id: stage-03
    title: "Collaboration & Remote Workflows"
    branch: stage-03
    required: true
    depends_on: [stage-02]
    unlocks: [stage-04]
    content: curriculum/stage-03/meta.yaml
    assessment:
      assignment:
        type: debugging
        points: 100
        attempts_allowed: 3
        regression_check: true
      quiz:
        questions: curriculum/stage-03/quiz/questions.yaml
        passing_score: 75
        attempts_allowed: 3
        randomize: true
        question_count: 10
        timed: true
        timed_minutes: 20
    xp:
      pass_first_attempt: 150
      pass_subsequent: 125

  # ─── STAGE 04 ───────────────────────────────────────────────
  - id: stage-04
    title: "Code Review Mastery"
    branch: stage-04
    required: true
    depends_on: [stage-03]
    unlocks: [stage-05]
    content: curriculum/stage-04/meta.yaml
    assessment:
      assignment:
        type: code-review
        points: 100
        attempts_allowed: 2
        known_bugs:
          - line: 14
            type: off-by-one
            points: 25
          - line: 27
            type: logic-error
            points: 25
          - line: 45
            type: missing-null-check
            points: 25
          - line: 62
            type: inefficient-algorithm
            points: 25
      quiz:
        questions: curriculum/stage-04/quiz/questions.yaml
        passing_score: 80
        attempts_allowed: 3
        randomize: true
        question_count: 10
        timed: true
        timed_minutes: 25

  # ─── STAGE 05 — FINAL PROJECT ───────────────────────────────
  - id: stage-05
    title: "Open Source Contribution — Final Project"
    branch: stage-05-final
    required: true
    depends_on: [stage-04]
    content: curriculum/stage-05/meta.yaml
    assessment:
      assignment:
        type: project
        points: 300
        attempts_allowed: 2
        peer_review:
          enabled: true
          reviewers_required: 2
          reviewer_pool: certified
          deadline_days: 5
          rubric: curriculum/stage-05/rubric.yaml
          calibration: true
        grading_weights:
          correctness: 0.3
          code_quality: 0.3
          documentation: 0.2
          peer_review: 0.2
    xp:
      pass_first_attempt: 400
      pass_subsequent: 300
      top_peer_review_score: 50

# ═══════════════════════════════════════════════════════════════
# GAMIFICATION
# ═══════════════════════════════════════════════════════════════
gamification:
  xp_levels:
    - name: "Newcomer"     min_xp: 0      badge: "🌱"
    - name: "Apprentice"   min_xp: 200    badge: "🔧"
    - name: "Practitioner" min_xp: 500    badge: "⚡"
    - name: "Professional" min_xp: 1000   badge: "🔥"
    - name: "Expert"       min_xp: 2000   badge: "💎"
    - name: "Master"       min_xp: 3500   badge: "👑"

  achievements:
    - id: first-blood
      name: "First Blood"
      description: "First in cohort to pass Stage 01"
      trigger: first-in-cohort
      stage: stage-01
      rare: true
      xp_bonus: 100
    - id: perfect
      name: "Perfectionist"
      description: "Score 100% on any stage"
      trigger: stage-score-equals-100
      rare: false
      xp_bonus: 50
    - id: speedrunner
      name: "Speedrunner"
      description: "Complete entire course in under 7 days"
      trigger: total-completion-days-lt-7
      rare: true
      xp_bonus: 200
    - id: iron-will
      name: "Iron Will"
      description: "Fail a stage 3 times then pass it"
      trigger: attempts-gte-3-then-pass
      rare: false
      xp_bonus: 75
    - id: sensei
      name: "Sensei"
      description: "Successfully mentor 5 students to certification"
      trigger: mentee-certifications-gte-5
      rare: true
      xp_bonus: 300
    - id: archaeologist
      name: "Archaeologist"
      description: "Find and fix a bug in the course content"
      trigger: meta-pr-bug-fix-merged
      rare: false
      xp_bonus: 150
    - id: guardian
      name: "Guardian"
      description: "Complete every stage on first attempt"
      trigger: all-stages-first-attempt
      rare: true
      xp_bonus: 250
    - id: reviewer
      name: "Reviewer"
      description: "Complete 10 peer reviews"
      trigger: peer-reviews-completed-gte-10
      rare: false
      xp_bonus: 100

  streak_rewards:
    7:  { type: xp, amount: 30,  label: "7-day streak bonus" }
    14: { type: xp, amount: 75,  label: "2-week streak bonus" }
    30: { type: badge, id: "streak-30", label: "Monthly Grinder" }
    course_complete_with_streak:
      type: cert-mention
      label: "Streak mentioned in certificate"

# ═══════════════════════════════════════════════════════════════
# SOCIAL
# ═══════════════════════════════════════════════════════════════
social:
  study_groups:
    enabled: true
    size: 4
    formation: skill-balanced
    formation_trigger: stage-02-start
  mentorship:
    enabled: true
    mentor_pool: certified
    mentee_trigger: stage-failed-twice
    match_by: timezone
    mentor_reward_xp: 50
  help_queue:
    enabled: true
    label: help-wanted
    sla_hours: 24
  cohort_discussions: true
  announcements_discussion: true

# ═══════════════════════════════════════════════════════════════
# INTEGRITY
# ═══════════════════════════════════════════════════════════════
integrity:
  plagiarism:
    enabled: true
    similarity_threshold: 0.85
    action: flag-for-review
  sandbox:
    enabled: true
    network: none
    memory_mb: 128
    timeout_seconds: 10
  tamper_detection:
    protect: ["tests/**", "grader/**", ".github/**"]
    action: auto-fail
  rate_limits:
    quiz_attempts_per_hour: 1
    pr_submissions_per_day: 3

# ═══════════════════════════════════════════════════════════════
# ANALYTICS
# ═══════════════════════════════════════════════════════════════
analytics:
  dropout_prediction:
    enabled: true
    signals:
      days_inactive: { weight: 0.3, threshold: 5 }
      failed_attempts: { weight: 0.4, threshold: 2 }
      help_issues:    { weight: 0.3, threshold: 2 }
    risk_threshold: 0.7
    intervention: auto-mentor-assign
  difficulty_calibration:
    enabled: true
    target_avg_score: 75
    target_dropout_rate: 0.15
    target_avg_attempts: 1.5
    review_trigger: thresholds_exceeded
  question_intelligence:
    enabled: true
    easy_threshold: 0.88
    hard_threshold: 0.25
    ambiguous_threshold: 0.45

# ═══════════════════════════════════════════════════════════════
# INTEROPERABILITY
# ═══════════════════════════════════════════════════════════════
interop:
  open_badges_v3: true
  audit_log: true
  xapi: false
