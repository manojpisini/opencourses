name: Peer Review Tally

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  tally:
    name: Tally peer review scores
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Tally peer reviews
        id: tally
        run: bun run scripts/cohort.ts --mode peer-tally
        env:
          GITHUB_TOKEN: ${{ secrets.COURSE_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REVIEWER: ${{ github.event.review.user.login }}
          REVIEW_STATE: ${{ github.event.review.state }}
          REQUIRED_REVIEWS: '2'

      - name: All reviews complete — trigger grade
        if: steps.tally.outputs.all_complete == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const score = '${{ steps.tally.outputs.peer_score }}';
            const summary = `${{ steps.tally.outputs.summary }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## 📊 Peer Review Complete\n\nAll required reviews have been submitted.\n\n**Peer score:** ${score}/100\n\n${summary}\n\nPeer review score has been recorded. Proceeding to final grading.`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: ['peer-review-complete']
            });
