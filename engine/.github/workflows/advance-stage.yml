name: Advance Stage

on:
  workflow_dispatch:
    inputs:
      student:
        description: GitHub username
        required: true
      stage:
        description: Stage just completed (e.g. stage-01)
        required: true
      trigger:
        description: What triggered this (assignment-pass | quiz-pass)
        required: true
        default: assignment-pass
      score:
        description: Score achieved (0-100)
        required: false
        default: '0'

permissions:
  issues: write
  contents: write

jobs:
  advance:
    name: Advance @${{ inputs.student }} past ${{ inputs.stage }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_BOT_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compute next state
        id: advance
        run: bun run scripts/advance.ts
        env:
          GITHUB_TOKEN: ${{ secrets.COURSE_BOT_TOKEN }}
          STUDENT: ${{ inputs.student }}
          STAGE: ${{ inputs.stage }}
          TRIGGER: ${{ inputs.trigger }}
          SCORE: ${{ inputs.score }}
          REPO: ${{ github.repository }}

      - name: Update enrollment issue labels
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN }}
          script: |
            const student = '${{ inputs.student }}';
            const stage = '${{ inputs.stage }}';
            const nextStage = '${{ steps.advance.outputs.next_stage }}';
            const enrollmentIssue = parseInt('${{ steps.advance.outputs.enrollment_issue }}');
            const allComplete = '${{ steps.advance.outputs.all_complete }}' === 'true';

            // Add completed label
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: enrollmentIssue,
              labels: [`${stage}-passed`]
            });

            // Remove in-progress label
            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: enrollmentIssue, name: `${stage}-unlocked`
              });
            } catch {}

            if (!allComplete && nextStage) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: enrollmentIssue,
                labels: [`${nextStage}-unlocked`]
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: enrollmentIssue,
                body: `### 🔓 ${nextStage.replace('stage-', 'Stage ')} Unlocked!\n\nGreat work on ${stage.replace('stage-', 'Stage ')}. Your next stage is ready.\n\n→ [View ${nextStage.replace('stage-', 'Stage ')} content](curriculum/${nextStage}/README.md)\n→ Open a PR titled \`[${nextStage.replace('stage-', 'Stage ').replace('s', 'S')}] @${student}\` when ready`
              });
            }

      - name: Issue certificate if all stages complete
        if: steps.advance.outputs.all_complete == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'issue-cert.yml', ref: 'main',
              inputs: {
                student: '${{ inputs.student }}',
                enrollment_issue: '${{ steps.advance.outputs.enrollment_issue }}'
              }
            });

      - name: Update leaderboard
        run: bun run scripts/leaderboard.ts
        env:
          GITHUB_TOKEN: ${{ secrets.COURSE_BOT_TOKEN }}
          STUDENT: ${{ inputs.student }}
          STAGE: ${{ inputs.stage }}
          SCORE: ${{ inputs.score }}
          REPO: ${{ github.repository }}

      - name: Append audit log
        run: bun run scripts/audit.ts
        env:
          EVENT_TYPE: stage-advance
          ACTOR: ${{ inputs.student }}
          STAGE: ${{ inputs.stage }}
          NEXT_STAGE: ${{ steps.advance.outputs.next_stage }}
          ALL_COMPLETE: ${{ steps.advance.outputs.all_complete }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
