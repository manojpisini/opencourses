name: Run Quiz

on:
  issues:
    types: [opened, labeled]

permissions:
  issues: write
  contents: read

jobs:
  quiz:
    name: Grade quiz attempt
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'quiz-attempt')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Parse and grade quiz
        id: quiz
        run: bun run scripts/quiz-engine.ts
        env:
          GITHUB_TOKEN: ${{ secrets.COURSE_BOT_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}

      - name: Post quiz results
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN }}
          script: |
            const passed = '${{ steps.quiz.outputs.passed }}' === 'true';
            const score = parseFloat('${{ steps.quiz.outputs.score }}');
            const stage = '${{ steps.quiz.outputs.stage }}';
            const attempt = '${{ steps.quiz.outputs.attempt }}';
            const report = `${{ steps.quiz.outputs.report }}`;

            const icon = passed ? '✅' : '❌';
            let body = `## ${icon} Quiz ${stage} — Results\n\n`;
            body += `**Score:** ${score.toFixed(1)}% | **Attempt:** ${attempt}\n\n`;
            body += report;

            if (passed) {
              body += `\n\n**Quiz passed! 🎉 Unlocking next stage...**`;
            } else {
              const attemptsLeft = 3 - parseInt(attempt);
              body += `\n\n**Not quite.** You have ${attemptsLeft} attempt${attemptsLeft !== 1 ? 's' : ''} remaining.`;
              if (attemptsLeft > 0) {
                body += `\nReview the flagged concepts and open a new quiz issue to retry.`;
              }
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: 'closed'
            });

      - name: Advance stage on quiz pass
        if: steps.quiz.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'advance-stage.yml',
              ref: 'main',
              inputs: {
                student: context.payload.issue.user.login,
                stage: '${{ steps.quiz.outputs.stage }}',
                trigger: 'quiz-pass',
                score: '${{ steps.quiz.outputs.score }}'
              }
            });

      - name: Append audit log
        if: always()
        run: bun run scripts/audit.ts
        env:
          EVENT_TYPE: quiz-attempt
          ACTOR: ${{ github.event.issue.user.login }}
          STAGE: ${{ steps.quiz.outputs.stage }}
          SCORE: ${{ steps.quiz.outputs.score }}
          PASSED: ${{ steps.quiz.outputs.passed }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
