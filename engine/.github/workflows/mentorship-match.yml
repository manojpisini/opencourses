name: Mentorship Match

on:
  schedule:
    - cron: '0 10 * * 1'   # every Monday at 10:00 UTC
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  match:
    name: Match at-risk students with mentors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run mentorship matching
        id: match
        run: bun run scripts/mentorship.ts --mode match
        env:
          GITHUB_TOKEN: ${{ secrets.COURSE_BOT_TOKEN }}
          REPO: ${{ github.repository }}
          RISK_THRESHOLD: '0.6'
          MAX_MENTEES_PER_MENTOR: '3'

      - name: Post match summary
        if: steps.match.outputs.matched_count != '0'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const matched = '${{ steps.match.outputs.matched_count }}';
            const pairs = `${{ steps.match.outputs.pairs }}`;
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `🤝 Mentorship Matches — ${new Date().toISOString().split('T')[0]}`,
              body: `## Weekly Mentorship Matching\n\n${matched} student${matched !== '1' ? 's have' : ' has'} been matched with a mentor this week.\n\n${pairs}\n\nMentors will receive a direct notification on their enrollment issue. Match expires in 30 days if no interaction is recorded.`,
              labels: ['mentorship', 'automated']
            });
