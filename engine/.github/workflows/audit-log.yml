name: Audit Log

on:
  workflow_dispatch:
    inputs:
      event_type:
        description: 'Audit event type'
        required: true
        type: string
      actor:
        description: 'GitHub username of the actor'
        required: true
        type: string
      subject:
        description: 'Subject (issue/PR number, username, etc.)'
        required: false
        type: string
      payload:
        description: 'JSON payload (stringified)'
        required: false
        type: string
        default: '{}'

permissions:
  contents: write

jobs:
  log:
    name: Append audit entry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_BOT_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Append audit entry
        run: bun run scripts/audit.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT_TYPE: ${{ inputs.event_type }}
          ACTOR: ${{ inputs.actor }}
          SUBJECT: ${{ inputs.subject }}
          PAYLOAD: ${{ inputs.payload }}
          RUN_ID: ${{ github.run_id }}

      - name: Commit audit log
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add audit/log.jsonl
          git diff --staged --quiet || git commit -m "audit: ${{ inputs.event_type }} by ${{ inputs.actor }} [skip ci]"
          git push
