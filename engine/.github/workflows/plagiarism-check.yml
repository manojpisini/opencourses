name: Plagiarism Check

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  contents: read

jobs:
  plagiarism:
    name: Similarity check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run similarity check
        id: check
        run: bun run scripts/plagiarism.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPO: ${{ github.repository }}
          SIMILARITY_THRESHOLD: '0.85'

      - name: Flag if similarity too high
        if: steps.check.outputs.flagged == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const similarity = '${{ steps.check.outputs.similarity }}';
            const matches = `${{ steps.check.outputs.matches }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `## ⚠️ Similarity Flag — Manual Review Required\n\nThis submission has a similarity score of **${similarity}%**, above the threshold of 85%.\n\n**Note:** This is an automated flag, not an accusation. The instructor will review before any action is taken.\n\nMatched against:\n${matches}\n\nThis PR is on hold pending review.`
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.payload.pull_request.number, labels: ['plagiarism-flag']
            });
