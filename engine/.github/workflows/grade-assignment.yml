name: Grade Assignment

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    outputs:
      valid: ${{ steps.validate.outputs.valid }}
      stage: ${{ steps.validate.outputs.stage }}
      student: ${{ steps.validate.outputs.student }}
      attempt: ${{ steps.validate.outputs.attempt }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate PR
        id: validate
        run: bun run scripts/validate.ts --mode pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}

  grade:
    name: Grade submission
    needs: validate
    runs-on: ubuntu-latest
    if: needs.validate.outputs.valid == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build grading sandbox image
        run: docker build -t opencourse-sandbox ./sandbox

      - name: Run grading in sandbox
        id: grade
        run: |
          docker run \
            --network none \
            --memory 128m \
            --cpus 0.5 \
            --read-only \
            --tmpfs /tmp \
            --user 1001:1001 \
            -e STAGE=${{ needs.validate.outputs.stage }} \
            -v ${{ github.workspace }}:/workspace:ro \
            -v /tmp/results:/results \
            opencourse-sandbox \
            bun run /workspace/scripts/grade.ts

          echo "score=$(cat /tmp/results/score.json | jq .final_score)" >> $GITHUB_OUTPUT
          echo "passed=$(cat /tmp/results/score.json | jq .passed)" >> $GITHUB_OUTPUT

      - name: Post grading report
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN }}
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/results/report.json', 'utf8'));
            const passed = ${{ steps.grade.outputs.passed }};
            const score = ${{ steps.grade.outputs.score }};
            const stage = '${{ needs.validate.outputs.stage }}';
            const student = '${{ needs.validate.outputs.student }}';
            const attempt = '${{ needs.validate.outputs.attempt }}';

            // Build markdown report
            const statusIcon = passed ? '✅ PASSED' : '❌ FAILED';
            let comment = `## 📊 ${stage} — Grading Report\n\n`;
            comment += `**Student:** @${student} | **Attempt:** ${attempt}/3 | **Score: ${score.toFixed(1)}% ${statusIcon}**\n\n---\n\n`;
            comment += report.markdown;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });

      - name: Merge PR on pass and advance stage
        if: steps.grade.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN }}
          script: |
            await github.rest.pulls.merge({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              merge_method: 'squash'
            });

      - name: Trigger stage advancement
        if: steps.grade.outputs.passed == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.COURSE_BOT_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'advance-stage.yml',
              ref: 'main',
              inputs: {
                student: '${{ needs.validate.outputs.student }}',
                stage: '${{ needs.validate.outputs.stage }}',
                score: '${{ steps.grade.outputs.score }}'
              }
            });

      - name: Append audit log
        if: always()
        run: bun run scripts/audit.ts
        env:
          EVENT_TYPE: grade-assignment
          ACTOR: ${{ needs.validate.outputs.student }}
          STAGE: ${{ needs.validate.outputs.stage }}
          SCORE: ${{ steps.grade.outputs.score }}
          PASSED: ${{ steps.grade.outputs.passed }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
