name: Build README

on:
  push:
    branches: [main]
    paths:
      - 'curriculum/**'
      - 'scripts/build.ts'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Regenerate README, PLAYLIST, CURRICULUM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.COURSE_BOT_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Validate all YAML against schema
        run: bun run scripts/validate.ts --mode schema

      - name: Build generated files
        run: bun run scripts/build.ts
        env:
          REPO: ${{ github.repository }}

      - name: Commit updated files
        run: |
          git config user.name "opencourse-bot[bot]"
          git config user.email "opencourse-bot[bot]@users.noreply.github.com"
          git add README.md PLAYLIST.md CURRICULUM.md
          git diff --staged --quiet || git commit -m "chore: rebuild README, PLAYLIST, CURRICULUM [skip ci]"
          git push
