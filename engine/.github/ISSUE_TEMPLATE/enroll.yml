name: 📚 Enroll in a Course
description: Start your learning journey — enroll in an OpenCourse
title: "[Enrollment] @YOUR_USERNAME — COURSE_NAME"
labels:
  - enrollment-request
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Welcome to OpenCourses! 🎉
        Fill out the form below to enroll. An automated welcome message will be posted within minutes.

  - type: input
    id: course
    attributes:
      label: Course
      description: Which course do you want to enroll in?
      placeholder: "e.g. git-mastery, rust-fundamentals, docker-fundamentals"
    validations:
      required: true

  - type: dropdown
    id: track
    attributes:
      label: Track
      description: Which learning track does this course belong to?
      options:
        - foundations
        - systems
        - web
        - devops
        - data
        - security
        - open-source
        - ai-ml
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: Goal
      description: What do you hope to achieve by completing this course? (optional, helps us personalize your experience)
      placeholder: "e.g. I want to get comfortable with Git before my first open-source contribution"
    validations:
      required: false

  - type: dropdown
    id: experience
    attributes:
      label: Experience Level
      description: Your current experience with this topic
      options:
        - Complete beginner
        - Some exposure
        - Intermediate
        - Advanced (refresher)
    validations:
      required: true

  - type: input
    id: availability
    attributes:
      label: Weekly Availability
      description: How many hours per week can you dedicate to this course?
      placeholder: "e.g. 5 hours/week"
    validations:
      required: false

  - type: checkboxes
    id: agreements
    attributes:
      label: Agreements
      options:
        - label: I will submit my own original work
          required: true
        - label: I understand that automated grading runs in a sandbox
          required: true
        - label: I have read the [Code of Conduct](../CODE_OF_CONDUCT.md)
          required: true
