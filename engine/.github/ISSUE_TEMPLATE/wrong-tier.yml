name: ⚠️ Wrong Tier / Grade Dispute
description: Dispute an automated grade or wrong difficulty classification
title: "[Dispute] Stage 0N — @YOUR_USERNAME"
labels:
  - grade-dispute
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Grade Dispute
        If you believe the autograder made an error, describe it here. An instructor will review within 48 hours.

  - type: input
    id: stage
    attributes:
      label: Stage
    validations:
      required: true

  - type: input
    id: pr_url
    attributes:
      label: PR URL
      placeholder: "https://github.com/..."
    validations:
      required: true

  - type: input
    id: score_received
    attributes:
      label: Score received
      placeholder: "e.g. 60/100"
    validations:
      required: true

  - type: input
    id: score_expected
    attributes:
      label: Score expected
      placeholder: "e.g. 85/100"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why do you believe the grade is incorrect?
      description: Be specific — reference test names, output, or grader errors
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Paste test output, code snippets, or links that support your case
      render: shell
    validations:
      required: false
