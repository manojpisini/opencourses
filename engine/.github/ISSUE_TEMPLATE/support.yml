name: 💬 Get Help
description: Ask a question or get unstuck on an assignment
title: "[Help] Stage 0N — Brief description"
labels:
  - help-wanted
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## Need Help? We've Got You!
        Describe what you're stuck on and we'll get back to you — or another student may help first! 👥

  - type: input
    id: stage
    attributes:
      label: Stage
      placeholder: "e.g. Stage 02 — Debugging Assignment"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the task or goal you're working towards
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What have you tried?
      description: Share what you've already attempted — this helps others help you faster
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error message or unexpected output
      description: Paste any error messages or surprising output here
      render: shell
    validations:
      required: false

  - type: textarea
    id: code
    attributes:
      label: Relevant code snippet
      description: Paste the relevant code you're working with
      render: typescript
    validations:
      required: false

  - type: dropdown
    id: urgency
    attributes:
      label: Urgency
      options:
        - Low — just curious
        - Medium — stuck but can continue
        - High — completely blocked
    validations:
      required: true
